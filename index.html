<!DOCTYPE html>
<html lang="zh" style="background:#0d0906;color-scheme:dark;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寄魂志</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0d0906;
    --paper: #f0e6d3;
    --aged: #e8d5b7;
    --red: #c04040;
    --red-dim: #8b1a1a;
    --gold: #c8a040;
    --gold-light: #d4a017;
    --ghost: rgba(192,64,64,0.08);
    --fade: #6b5a47;
    --dim: #b09888;
  }

  html { background: #0d0906 !important; }
  * { -webkit-font-smoothing: antialiased; }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0906 !important;
    background-color: #0d0906 !important;
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    color: #f0e6d3;
  }

  /* Animated background */
  .bg-layer {
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(139,26,26,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(184,134,11,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, rgba(139,26,26,0.04) 0%, transparent 40%);
    animation: breathe 8s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes breathe {
    0% { opacity: 0.6; }
    100% { opacity: 1; }
  }

  /* Floating ink particles */
  .particle {
    position: fixed;
    width: 1px;
    height: 1px;
    background: rgba(139,26,26,0.3);
    border-radius: 50%;
    pointer-events: none;
    animation: float linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-10vh) translateX(20px); opacity: 0; }
  }

  /* Main container */
  #game-wrap {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Title screen */
  /* Portrait overlay on title screen */
  .portrait-wrap {
    position: absolute;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .portrait-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
    opacity: 0.18;
    filter: sepia(60%) saturate(60%) brightness(0.5) contrast(1.3);
    mix-blend-mode: luminosity;
    animation: portraitReveal 4s ease both;
  }
  .portrait-vignette {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 70% at 50% 35%, transparent 20%, rgba(13,9,6,0.55) 65%, rgba(13,9,6,0.97) 100%),
      linear-gradient(to bottom, rgba(13,9,6,0.7) 0%, transparent 25%, transparent 65%, rgba(13,9,6,0.95) 100%);
  }
  @keyframes portraitReveal {
    0%   { opacity: 0; filter: sepia(60%) saturate(60%) brightness(0.2) contrast(1.3); }
    40%  { opacity: 0.10; }
    100% { opacity: 0.18; filter: sepia(60%) saturate(60%) brightness(0.5) contrast(1.3); }
  }

  #title-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    z-index: 10;
    transition: opacity 1.5s ease;
  }

  .title-decoration {
    position: relative;
    z-index: 2;
    color: var(--red);
    font-size: 12px;
    letter-spacing: 8px;
    opacity: 0.6;
    animation: fadeInUp 2s ease 0.5s both;
    font-family: 'Noto Serif SC', serif;
    font-weight: 300;
  }

  .main-title {
    position: relative;
    z-index: 2;
    font-family: 'Ma Shan Zheng', cursive;
    font-size: clamp(64px, 12vw, 120px);
    color: var(--paper);
    letter-spacing: 0.2em;
    line-height: 1;
    margin: 20px 0 16px;
    animation: fadeInUp 2s ease 0.8s both;
    text-shadow: 0 0 40px rgba(139,26,26,0.4), 0 0 80px rgba(139,26,26,0.15);
    position: relative;
  }

  .main-title::after {
    content: '寄魂志';
    position: absolute;
    inset: 0;
    color: var(--red);
    opacity: 0.15;
    filter: blur(8px);
    animation: titleGlow 4s ease-in-out infinite alternate;
  }

  @keyframes titleGlow {
    0% { opacity: 0.1; filter: blur(8px); }
    100% { opacity: 0.25; filter: blur(4px); }
  }

  .title-sub {
    position: relative;
    z-index: 2;
    font-size: 13px;
    color: var(--dim);
    letter-spacing: 4px;
    font-weight: 300;
    animation: fadeInUp 2s ease 1.1s both;
    margin-bottom: 60px;
    font-style: italic;
  }

  .title-quote {
    position: relative;
    z-index: 2;
    font-size: 14px;
    color: var(--red);
    opacity: 0.7;
    letter-spacing: 3px;
    animation: fadeInUp 2s ease 1.4s both;
    margin-bottom: 80px;
    position: relative;
    padding: 0 20px;
  }

  .title-quote::before, .title-quote::after {
    content: '◆';
    font-size: 8px;
    opacity: 0.5;
    margin: 0 12px;
  }

  .start-btn {
    position: relative;
    z-index: 2;
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    color: var(--paper);
    background: transparent;
    border: 1px solid rgba(245,237,224,0.2);
    padding: 14px 48px;
    cursor: pointer;
    letter-spacing: 6px;
    transition: all 0.4s ease;
    animation: fadeInUp 2s ease 1.8s both;
    position: relative;
    overflow: hidden;
  }

  .start-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(139,26,26,0.1), transparent);
    transform: translateX(-100%);
    transition: transform 0.6s ease;
  }

  .start-btn:hover::before { transform: translateX(100%); }
  .start-btn:hover {
    border-color: rgba(139,26,26,0.6);
    color: var(--red);
    text-shadow: 0 0 12px rgba(139,26,26,0.4);
    box-shadow: 0 0 20px rgba(139,26,26,0.1);
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Horizontal divider */
  .title-line {
    position: relative;
    z-index: 2;
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 auto 24px;
    animation: fadeInUp 2s ease 1.2s both;
    opacity: 0.5;
  }

  /* Game screen */
  #game-screen {
    display: none;
    width: 100%;
    height: 100vh;
    flex-direction: row;
    align-items: stretch;
    background: #0d0906 !important;
  }

  #game-screen.active {
    display: flex;
  }

  /* Left panel - decoration */
  .side-panel {
    width: 48px;
    background: #0d0906 !important;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .side-panel span {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 11px;
    color: rgba(139,26,26,0.2);
    writing-mode: vertical-rl;
    letter-spacing: 3px;
  }

  /* Main game area */
  .game-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 780px;
    margin: 0 auto;
    padding: 0 24px;
    height: 100vh;
    overflow: hidden;
    background: #0d0906 !important;
  }

  /* Header */
  .game-header {
    padding: 24px 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(192,64,64,0.2);
    flex-shrink: 0;
    background: #0d0906 !important;
  }

  .header-title {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 22px;
    color: var(--paper);
    letter-spacing: 0.3em;
    opacity: 0.9;
  }

  .chapter-tag {
    font-size: 11px;
    color: var(--red);
    letter-spacing: 3px;
    opacity: 0.7;
    font-weight: 300;
  }

  .status-bar {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .status-item {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--red);
    opacity: 0.6;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.3); }
  }

  /* Scroll area */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    padding: 32px 0 16px;
    scrollbar-width: thin;
    scrollbar-color: rgba(192,64,64,0.3) transparent;
    background: #0d0906 !important;
  }

  .scroll-area::-webkit-scrollbar { width: 3px; }
  .scroll-area::-webkit-scrollbar-track { background: transparent; }
  .scroll-area::-webkit-scrollbar-thumb { background: rgba(139,26,26,0.2); border-radius: 2px; }

  /* Text blocks */
  .scene-block {
    margin-bottom: 0;
    animation: textReveal 0.8s ease both;
  }

  @keyframes textReveal {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .scene-location {
    font-size: 11px;
    color: #c8a040;
    letter-spacing: 4px;
    opacity: 1;
    margin-bottom: 20px;
    padding-left: 2px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .scene-location::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(184,134,11,0.2), transparent);
  }

  .narration {
    font-size: 15px;
    color: #f0e6d3;
    line-height: 2.2;
    font-weight: 400;
    letter-spacing: 0.05em;
    margin-bottom: 20px;
    opacity: 1;
  }

  .narration em {
    color: #d4bfa0;
    font-style: normal;
    opacity: 1;
  }

  .narration strong {
    color: #f5ede0;
    font-weight: 600;
  }

  /* Inner thought */
  .inner-thought {
    font-size: 14px;
    color: #e06060;
    line-height: 2;
    letter-spacing: 0.08em;
    padding: 16px 20px;
    margin: 20px 0;
    border-left: 2px solid rgba(200,60,60,0.5);
    background: rgba(139,26,26,0.08);
    font-style: italic;
    opacity: 1;
    position: relative;
  }

  .inner-thought::before {
    content: '内心';
    position: absolute;
    top: -10px;
    left: 16px;
    font-size: 9px;
    color: var(--red-dim);
    letter-spacing: 3px;
    background: #0d0906 !important;
    padding: 0 6px;
    opacity: 0.7;
    font-style: normal;
  }

  /* Dialogue */
  .dialogue-wrap {
    margin: 16px 0;
  }

  .speaker-tag {
    font-size: 11px;
    color: #c8a040;
    letter-spacing: 3px;
    opacity: 1;
    margin-bottom: 6px;
  }

  .dialogue {
    font-size: 15px;
    color: #e8d5b0;
    line-height: 1.9;
    letter-spacing: 0.05em;
    padding-left: 16px;
    border-left: 1px solid rgba(200,160,60,0.3);
    font-weight: 400;
  }

  /* Divider */
  .section-div {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px 0;
    opacity: 0.4;
  }

  .section-div::before, .section-div::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(139,26,26,0.3), transparent);
  }

  .section-div span {
    font-size: 10px;
    color: var(--red);
    letter-spacing: 3px;
  }

  /* Atmosphere note */
  .atmos {
    font-size: 13px;
    color: #a08878;
    letter-spacing: 0.1em;
    font-style: italic;
    text-align: center;
    opacity: 1;
    margin: 12px 0;
    line-height: 1.8;
  }

  /* Choice area */
  .choice-area {
    flex-shrink: 0;
    padding: 20px 0 28px;
    border-top: 1px solid rgba(192,64,64,0.2);
    background: #0d0906 !important;
  }

  .choice-header {
    font-size: 11px;
    color: #a08878;
    letter-spacing: 4px;
    margin-bottom: 16px;
    opacity: 1;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .choice-btn {
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    color: #f0e6d3;
    background: transparent;
    border: 1px solid rgba(245,237,224,0.15);
    padding: 14px 20px;
    text-align: left;
    cursor: pointer;
    letter-spacing: 0.05em;
    line-height: 1.7;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .choice-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(139,26,26,0.05);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }

  .choice-btn:hover::before { transform: scaleX(1); }

  .choice-btn:hover {
    border-color: rgba(200,80,80,0.5);
    color: #f5ede0;
    padding-left: 28px;
    background: rgba(139,26,26,0.08);
  }

  .choice-btn .choice-num {
    color: #c05050;
    opacity: 1;
    margin-right: 12px;
    font-size: 11px;
    letter-spacing: 2px;
  }

  .choice-btn.disabled {
    opacity: 0.3;
    pointer-events: none;
  }

  /* Footer */
  .game-footer {
    padding: 10px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    background: #0d0906 !important;
    opacity: 0.6;
  }

  .footer-dec {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 3px;
  }

  /* Transition overlay */
  #transition {
    position: fixed;
    inset: 0;
    background: #0d0906 !important;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  #transition.active { opacity: 1; pointer-events: all; }

  /* Alert / special text */
  .highlight-text {
    color: #e05555;
    font-weight: 600;
  }

  /* Chapter title */
  .chapter-title {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 28px;
    color: #f5ede0;
    letter-spacing: 0.4em;
    text-align: center;
    margin: 20px 0 8px;
    opacity: 1;
    text-shadow: 0 0 20px rgba(139,26,26,0.3);
  }

  .chapter-sub {
    font-size: 12px;
    color: #a08878;
    letter-spacing: 5px;
    text-align: center;
    opacity: 1;
    margin-bottom: 32px;
  }

  /* Scroll indicator */
  .scroll-hint {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 3px;
    opacity: 0;
    text-align: center;
    margin-top: 8px;
    transition: opacity 0.5s;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 0; }
    50% { opacity: 0.4; }
  }

  .scroll-hint.visible { opacity: 0.4; }

  /* Responsive */
  @media (max-width: 600px) {
    .game-main { padding: 0 16px; }
    .narration { font-size: 14px; line-height: 2; }
    .side-panel { display: none; }
    .main-title { font-size: 64px; }
  }

  /* Special: name input */
  .name-input-wrap {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin: 16px 0;
  }

  .name-input {
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    color: #f0e6d3;
    background: rgba(255,255,255,0.04);
    border: none;
    border-bottom: 1px solid rgba(192,64,64,0.4);
    padding: 10px 4px;
    width: 200px;
    outline: none;
    letter-spacing: 3px;
    caret-color: #c04040;
  }

  .name-input::placeholder { color: var(--dim); opacity: 0.4; }

  .name-confirm {
    font-family: 'Noto Serif SC', serif;
    font-size: 12px;
    color: var(--red);
    background: transparent;
    border: 1px solid rgba(139,26,26,0.25);
    padding: 8px 24px;
    cursor: pointer;
    letter-spacing: 4px;
    width: fit-content;
    transition: all 0.3s ease;
  }

  .name-confirm:hover {
    background: rgba(139,26,26,0.08);
    border-color: rgba(139,26,26,0.5);
  }

  /* GLOBAL DARK OVERRIDE */
  html, body, #game-wrap, #game-screen, #title-screen,
  .game-main, .game-header, .game-footer, .scroll-area,
  .choice-area, .side-panel, .name-input-wrap {
    background-color: #0d0906 !important;
  }
  #game-screen.active { background: #0d0906 !important; }
</style>
</head>

  <!-- Game Screen -->
  <div id="game-screen">
    <div class="side-panel">
      <span id="side-chapter">第一幕</span>
    </div>

    <div class="game-main">
      <div class="game-header">
        <div>
          <div class="header-title">寄魂志</div>
          <div class="chapter-tag" id="chapter-tag">第一幕 · 学堂风波</div>
        </div>
        <div class="status-bar">
          <div class="status-item">
            <div class="status-dot"></div>
            <span id="player-name-display">苏鸢</span>
          </div>
          <div class="status-item" style="color: var(--red); opacity:0.5;">
            <span>灵异体</span>
          </div>
        </div>
      </div>

      <div class="scroll-area" id="scroll-area">
        <div id="story-content"></div>

      </div>

<script>
  // Particles
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.width = p.style.height = (Math.random() * 3 + 1) + 'px';
    p.style.animationDuration = (Math.random() * 20 + 15) + 's';
    p.style.animationDelay = (Math.random() * 15) + 's';
    document.body.appendChild(p);
  }

  let playerName = '苏鸢';
  let currentScene = 0;

  function startGame() {
    const ts = document.getElementById('title-screen');
    ts.style.opacity = '0';
    ts.style.pointerEvents = 'none';
    setTimeout(() => {
      ts.style.display = 'none';
      document.getElementById('game-screen').classList.add('active');
      loadScene(0);
    }, 1500);
  }

  function transition(fn) {
    const t = document.getElementById('transition');
    t.classList.add('active');
    setTimeout(() => {
      fn();
      t.classList.remove('active');
    }, 800);
  }

  function loadScene(id) {
    currentScene = id;
    document.getElementById('scene-counter').textContent = '场景 ' + (id + 1);
    const scene = scenes[id];
    if (!scene) return;

    // Update header
    if (scene.chapter) {
      document.getElementById('chapter-tag').textContent = applyName(scene.chapter);
      document.getElementById('side-chapter').textContent = scene.chapterShort || '第一幕';
    }

    // Render content
    const content = document.getElementById('story-content');
    content.innerHTML = '';
    renderContent(scene.content, content);

    // Render choices
    const choicesEl = document.getElementById('choices-container');
    choicesEl.innerHTML = '';
    if (scene.choices) {
      scene.choices.forEach((c, i) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = `<span class="choice-num">0${i+1}</span>${applyName(c.text)}`;
        btn.onclick = () => {
          btn.style.borderColor = 'rgba(139,26,26,0.5)';
          btn.style.color = 'var(--red)';
          setTimeout(() => transition(() => {
            if (c.next === 'name_input') {
              showNameInput();
            } else {
              loadScene(c.next);
            }
          }), 200);
        };
        choicesEl.appendChild(btn);
      });
    }

    // Scroll to top
    document.getElementById('scroll-area').scrollTop = 0;
  }

  function showNameInput() {
    const choicesEl = document.getElementById('choices-container');
    choicesEl.innerHTML = `
      <div class="name-input-wrap">
        <div class="atmos">她用了哪个名字……</div>
        <input class="name-input" id="name-input" placeholder="苏鸢" maxlength="6" />

    });
  }

  function confirmName() {
    const val = document.getElementById('name-input').value.trim();
    if (val) playerName = val;
    document.getElementById('player-name-display').textContent = playerName;
    transition(() => loadScene(1));
  }

  function applyName(text) {
    if (!text) return text;
    return text.replace(/苏鸢/g, playerName);
  }

  function renderContent(blocks, container) {
    blocks.forEach((block, i) => {
      const el = document.createElement('div');
      el.style.animationDelay = (i * 0.12) + 's';

      if (block.type === 'location') {
        el.className = 'scene-location';
        el.textContent = applyName(block.text);
      } else if (block.type === 'chapter-title') {
        el.className = 'scene-block';
        el.innerHTML = `<div class="chapter-title">${applyName(block.text)}</div><div class="chapter-sub">${applyName(block.sub || '')}</div>`;
      } else if (block.type === 'narration') {
        el.className = 'narration scene-block';
        el.innerHTML = applyName(block.text);
      } else if (block.type === 'thought') {
        el.className = 'inner-thought scene-block';
        el.innerHTML = applyName(block.text);
      } else if (block.type === 'dialogue') {
        el.className = 'dialogue-wrap scene-block';
        el.innerHTML = `<div class="speaker-tag">${applyName(block.speaker)}</div><div class="dialogue">「${applyName(block.text)}」</div>`;
      } else if (block.type === 'div') {
        el.className = 'section-div';
        el.innerHTML = `<span>${block.text || '◆'}</span>`;
      } else if (block.type === 'atmos') {
        el.className = 'atmos scene-block';
        el.textContent = applyName(block.text);
      }

      container.appendChild(el);
    });
  }

        { type: 'narration', text: '那枚裂了的玉坠压在她的手腕内侧，硌着皮肉。' },
        { type: 'narration', text: '她没有哭，没有分神，一笔一划，工工整整。' },
        { type: 'atmos', text: '夫子讲到兴处，击掌叫好，无人注意到她。' },
        { type: 'narration', text: '贺珩坐在前三排，斜靠着白鹿，时不时低声说些什么逗她笑。' },
        { type: 'narration', text: '苏鸢抬起眼，扫了他们一眼，又低下头。' },
        { type: 'thought', text: '不急。\n课一散，他总要经过后门。\n那条路只有一条，我先过去等着。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '课散得比预想早。' },
        { type: 'narration', text: '苏鸢收好书，快了两步，先他们一步到了后廊——然后她估算着时间，停在了廊道转角，等。' },
        { type: 'narration', text: '贺珩和白鹿有说有笑地走来了。' },
        { type: 'narration', text: '苏鸢走出来，正正好好撞在贺珩面前，低头，眼眶泛红，软软叫了一声：' },
        { type: 'dialogue', speaker: '苏鸢', text: '贺……贺公子。' },
        { type: 'narration', text: '她把那枚裂开的玉坠举起来，声音压得很低，微微颤着。' },
        { type: 'dialogue', speaker: '苏鸢', text: '这个……能请你跟我说说……是怎么坏的吗。' },
        { type: 'narration', text: '白鹿皱眉，要开口，贺珩却一时语塞——他记得今早，但他没料到她来找他，更没料到她这幅神情。' },
        { type: 'narration', text: '他叹了口气，甩开白鹿，低声道：' },
        { type: 'dialogue', speaker: '贺珩', text: '……跟我来。' },
        { type: 'narration', text: '于是她跟着他，走进了那条没人的后廊。' },
        { type: 'thought', text: '很好，进来了。\n\n接下来，就是我的场子了。' },
      ],
      choices: [
        { text: '继续往下看——', next: 4 },
      ]
    },
    // Scene 6
    6: {
      chapter: '第一幕 · 学堂风波',
      content: [
        { type: 'location', text: '清源书院 · 西角藤墙处 → 讲堂外' },
        { type: 'narration', text: '脚步声近了。' },
        { type: 'narration', text: '苏鸢收了刀，快过闪电——袖落，刀消，她退开半步，眼眶蓄起泪，肩膀微微抖着。' },
        { type: 'narration', text: '如此丝滑，如此自然，<em>仿佛方才什么都没发生过。</em>' },
        { type: 'narration', text: '来的是讲《礼》的苏夫子，他年纪不小了，向来看不惯贺珩行事，今日巡院途中听见动静，绕过来一看——' },
        { type: 'narration', text: '只见苏鸢红着眼眶，低着头，贺珩面色不大好看地靠着藤墙，两人对峙着，气氛僵硬。' },
        { type: 'dialogue', speaker: '苏夫子', text: '这是怎么了？' },
        { type: 'narration', text: '苏鸢抬起头，泪水恰到好处地滑下来，将那枚裂了的玉坠递过去，声音哽咽。' },
        { type: 'dialogue', speaker: '苏鸢', text: '夫子，这是……这是我姐姐临终前留给我的，唯一一件……贺公子今早拿去把玩，失手落地，坏了……学生不敢声张，只是……只是……' },
        { type: 'narration', text: '她说不下去了，又低下头去哭。' },
        { type: 'narration', text: '苏夫子的脸色当场沉了下来，目光转向贺珩。' },
        { type: 'dialogue', speaker: '苏夫子', text: '贺珩，可有此事？' },
        { type: 'narration', text: '贺珩张了张口，有一千句辩解，但看着苏鸢那副模样，又看着夫子的神情——他认得出这位老夫子护短的脾气——终究一个字都没能说出来。' },
        { type: 'narration', text: '他沉默，沉默本身就是认罪。' },
        { type: 'narration', text: '苏夫子叹了口气，转身，语气严肃：' },
        { type: 'dialogue', speaker: '苏夫子', text: '此事我会告知你父亲。你且回去等着罢。' },
        { type: 'narration', text: '贺珩的脸色瞬间变了。' },
        { type: 'narration', text: '他下意识抬头，对上苏鸢的目光。' },
        { type: 'narration', text: '苏鸢低着头，睫毛微垂，什么都看不出来。' },
        { type: 'thought', text: '第一步，走完了。\n\n接下来——' },
        { type: 'div', text: '· 退亲 ·' },
        { type: 'narration', text: '三日后，苏鸢以"不堪相配"为由，登门贺府，要求退亲。' },
      ],
      choices: [
        { text: '前往贺府，亲见贺老太爷——', next: 7 },
      ]
    },
    // Scene 7
    7: {
      chapter: '第一幕 · 退亲',
      content: [
        { type: 'location', text: '贺府 · 正堂 · 午后' },
        { type: 'narration', text: '贺府的正堂宽敞得过分，梁上挂着贺崇玄手书的匾额，笔力苍劲，<em>气压逼人。</em>' },
        { type: 'narration', text: '正中太师椅上坐着贺老太爷——贺崇玄。' },
        { type: 'narration', text: '他年岁不小了，须发半白，穿一件灰色长袍，面容平和，像一尊供奉多年的神像——看着慈善，却让苏鸢从踏入院门起，就隐约觉得脊背有什么东西在游走。' },
        { type: 'thought', text: '……他在看我。\n\n不只是看，是在……探。' },
        { type: 'narration', text: '贺珩站在一侧，脸色很难看，时不时用眼神向苏鸢示意，意思是"你快别说了"。' },
        { type: 'narration', text: '苏鸢端正地跪坐，把早已备好的说辞慢慢道来：她出身浅薄，本就是从外地流落到这座城的孩子，多亏了夫子收留，老太爷赏识，才能留在学堂读书，成为贺家的准儿媳。小时候不懂事，如今长大了，越来越清楚，自己资质平庸，配不上贺家门楣，恳请老太爷成全，放她离去。' },
        { type: 'narration', text: '她说得诚恳，神情里有三分赧然，七分固执。' },
        { type: 'narration', text: '贺崇玄没说话，只是看着她，半晌，笑了。' },
        { type: 'narration', text: '那笑容慈和，像极了一位德高望重的长者在欣赏晚辈。' },
        { type: 'dialogue', speaker: '贺崇玄', text: '丫头，你说你配不上贺家，依我看，是贺家配不上你才是。' },
        { type: 'narration', text: '苏鸢低下头，做出一副受宠若惊的模样。' },
        { type: 'narration', text: '贺崇玄的目光没有离开她片刻。' },
        { type: 'thought', text: '他不打算放我走。\n\n我知道。\n我早就知道。\n\n问题是——他究竟知道多少？' },
        { type: 'narration', text: '贺崇玄最终拍板：婚事不退，再议。他当场斥了贺珩，声称若再有此等不成器的行径，打断他双腿也不为过。' },
        { type: 'narration', text: '苏鸢道谢，起身，告辞。' },
        { type: 'narration', text: '她走过贺府那条青石铺就的甬道，两侧是回廊，是亭台，是游廊雕栏。' },
        { type: 'narration', text: '从她身后袭来的，是风。' },
        { type: 'narration', text: '不对——' },
        { type: 'narration', text: '<span class="highlight-text">是一枚细长的珠钗，直奔她后颈。</span>' },
        { type: 'narration', text: '苏鸢侧身，右手反扣，钗尖停在她指间，一丝未进。' },
        { type: 'narration', text: '她转过身。' },
        { type: 'narration', text: '廊柱后，白鹿站着，面色铁青，手已经空了。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '苏鸢低头看了看手里的钗，走过去，将它不紧不慢地插回白鹿发间，声音轻得像在说家常：' },
        { type: 'dialogue', speaker: '苏鸢', text: '这钗式样好，戴着可惜，别乱扔。' },
        { type: 'narration', text: '白鹿僵在那里，动弹不得。' },
        { type: 'narration', text: '苏鸢凑近她，声音压低。这是她第一次这样近地看白鹿——大眼睛，皮肤白皙细腻，短发烫成西洋贵族小姐的卷，压在耳侧，衬得五官愈发明艳，甚至有些尖锐，像一把刀，把光都往自己身上揽。苏鸢想，如果她不是贺珩的白鹿，不是贺家的眼中钉，她或许会觉得这女孩生得真是好看。：' },
        { type: 'dialogue', speaker: '苏鸢', text: '你想进这家门，是迟早的事，没人拦你。但若再闹——你明白的，到时候谁都没有好结果。' },
        { type: 'narration', text: '她退开，抬起头，嘴角带笑。' },
        { type: 'narration', text: '然后转身走了。' },
        { type: 'narration', text: '走上那条青石道，走出贺府朱漆大门。' },
        { type: 'narration', text: '日光铺在她身上，她的影子很长。' },
        { type: 'narration', text: '她想起方才那个老人的眼神——那双眼睛里，有一种让她汗毛倒竖的东西。<em>不是恶意，是……兴趣。</em>' },
        { type: 'thought', text: '他知道的。\n也许不是全部，但他知道。\n\n我的体质，我体内的东西——\n\n他知道。\n\n那我更不能离开这里。\n\n姐姐，我来了。' },
        { type: 'div', text: '· 第一幕终 ·' },
        { type: 'atmos', text: '选择的时刻，到来了。' },
      ],
      choices: [
        { text: '【嫁入线】设法留下，嫁入贺家——这是距离他最近的路。', next: 8 },
        { text: '【不嫁入线】先离开，寻找盟友，从外围掘开这堵墙。', next: 9 },
      ]
    },

    8: {

      content: [
        { type: 'chapter-title', text: '第二幕', sub: '— 入府蛰伏 —' },
        { type: 'atmos', text: '嫁入线已开启。' },
        { type: 'narration', text: '你选择了最近的那条路——也是最危险的那条。' },
        { type: 'narration', text: '贺府的门为你开着，但门里每一寸空气都带着试探。' },
        { type: 'narration', text: '<em>你的猎物在里面，你的仇也在里面。</em>' },

    // Scene 9
    9: {
      chapter: '第二幕 · 街市意外',
      chapterShort: '第二幕',
      content: [
        { type: 'chapter-title', text: '第二幕', sub: '— 街市意外 —' },
        { type: 'location', text: '清源书院附近 · 街市 · 午后' },
        { type: 'narration', text: '退亲之后第四日，苏鸢去书院办手续，在街市穿行，手里提着一包书。' },
        { type: 'narration', text: '那条街平日人不多，今天却堵了个结实——前头有人吵架，推搡声、摔东西的声音，人群向两侧涌。' },
        { type: 'narration', text: '苏鸢侧身想让路，人群忽然一阵急乱，有人撞上她，她往旁边跌了半步，被人群推着，踩进了路边坏了的石板缝里——' },
        { type: 'narration', text: '石板下是空的，右脚整个踩空，硌到了什么，膝盖磕在台阶上，手臂蹭过墙角。' },
        { type: 'narration', text: '她站稳，低头看——膝盖的伤不深，但手臂被刮出一道口子，血慢慢渗出来，把袖子洇湿了一块。' },
        { type: 'thought', text: '不重，但要处理。\n\n血渗得快，不能就这样走回去。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '正在这时，人群散开，苏鸢看见沈时序从书院方向走来，手里抱着几册书，显然是刚出来，正好撞上这一幕。' },
        { type: 'narration', text: '他走过来，目光在她手臂的伤口上停了一下——然后，极短的一瞬，他的眼睛在她脸上停留了比看伤口更长的时间，像是认出什么，又不确定，随即压下去了。他没有说"你还好吗"，只是：' },
        { type: 'dialogue', speaker: '沈时序', text: '书院备了药，跟我来。' },
        { type: 'narration', text: '苏鸢看着他，又看了看四周——' },
        { type: 'narration', text: '街角处有块招牌，"济安医馆"，开了很多年的馆子。' },
        { type: 'narration', text: '再往前，是今天热闹的集市，她本来就要去买几样东西。' },
        { type: 'narration', text: '而沈时序还在等她，眼神平静，不催，也不走。' },
        { type: 'narration', text: '还有一种感觉——若有若无的，从人群散去后，就一直没有消失，像是某处有什么东西，还没有现身。' },
        { type: 'thought', text: '不大的伤，几条路都能走。\n\n但往哪里走，之后遇见的，就全然不同了。' },
      ],
      choices: [
        { text: '跟沈时序回书院——正好，有些话也想问问他。', next: 100 },
        { text: '「不用麻烦，我自己去医馆。」——街角就有一家，顺路。', next: 700 },
        { text: '「没事，先去集市把东西买完。」——这点小伤不碍事。', next: 80 },
      ]
    },

    // Scene 100: 受伤后·书院处理伤口·沈时序初印象
    100: {
      chapter: '第二幕 · A线 · 君子有刃',
      chapterShort: '第二幕',
      content: [
        { type: 'location', text: '清源书院 · 后院药房 · 午后' },
        { type: 'narration', text: '沈时序没有多问她受的什么伤，也没有问她为什么在那条街上。' },
        { type: 'narration', text: '只是说"跟我来"，往书院方向走，步子不快不慢，回头确认她跟上了，就继续走。' },
        { type: 'narration', text: '苏鸢跟着他穿过书院的侧门，拐进后院，角落里有一间不起眼的药房，沈时序推开门，取了药箱，放在矮桌上。' },
        { type: 'narration', text: '他处理伤口的手法，不是读书人的手法。' },
        { type: 'narration', text: '是那种处理过很多次、很多种伤口，已经形成肌肉记忆的手法——清创，上药，包扎，每个步骤衔接得干净，力道稳。' },
        { type: 'thought', text: '……他不是第一次做这种事。\n\n这双手，见过的伤，不只是读书写字的伤。' },
        { type: 'narration', text: '苏鸢安静地让他处理，没有说话，只是低着头，眼角余光把他看了一遍。' },
        { type: 'narration', text: '银白发束被深色布条压着，几缕散在耳侧，在这样近的距离，那个颜色更显得不真实，像某种只存在于志怪里的人。' },
        { type: 'narration', text: '皮肤白，眉骨清，眼睫在低头时压下来，遮住了眼睛的颜色——苏鸢只在人群里远远见过他那双眼，今天是第一次这么近地确认：蓝的，深蓝，像深水。' },
        { type: 'narration', text: '她快速移开目光，看向别处。' },
        { type: 'thought', text: '看什么看。\n\n专心想事情。' },
        { type: 'narration', text: '沈时序把最后一道纱布打好结，没有立刻松手，只是说：' },
        { type: 'dialogue', speaker: '沈时序', text: '今天集市那边起了什么冲突？' },
        { type: 'dialogue', speaker: '苏鸢', text: '不知道，我路过时已经在乱了。' },
        { type: 'narration', text: '他抬起眼，很短地看了她一下，没有追问，放开她的手腕，收拾药箱。' },
        { type: 'narration', text: '苏鸢把手臂收回来，试了试活动，不碍事，站起来要道谢——' },
        { type: 'narration', text: '沈时序已经转身，把药箱放回原位，声音平淡地说：' },
        { type: 'dialogue', speaker: '沈时序', text: '你说有话想问我。' },
        { type: 'narration', text: '苏鸢停住。' },
        { type: 'narration', text: '他背对着她，整理架上的药瓶，手上的动作没停：' },
        { type: 'dialogue', speaker: '沈时序', text: '在这里说，没人。' },
        { type: 'thought', text: '……他记住了。\n\n我在街上说的那句"正好有话想问"，\n随口说的，他记住了。\n\n而且——他把我带来的地方，\n是后院药房，不是人多的地方。\n\n是他提前就想好了？\n\n……这个人，\n细心得有点危险。' },
        { type: 'narration', text: '苏鸢在矮桌旁重新坐下，垂着手，用那副惯常的、略带困惑的神情开口：' },
        { type: 'dialogue', speaker: '苏鸢', text: '……沈师兄，你对贺家……知道多少？' },
        { type: 'narration', text: '沈时序的手，在架上停了一下，然后转过身，眼神里有什么东西沉下去，看着她，很认真地，重新评估了一遍。' },
        { type: 'narration', text: '然后他走过来，在她对面坐下，从袖里取出一本书，放在两人之间。' },
        { type: 'narration', text: '《寄魂异录》。刻本旧，封面磨损，扉页上有一行小字：' },
        { type: 'atmos', text: '「凡灵异体者，生有余魂附身，死则诸魂俱散，宜慎之又慎。」' },
        { type: 'narration', text: '苏鸢看着那行字，手指微微收紧。她抬起眼，直直地看向沈时序。' },
        { type: 'narration', text: '他也在看她，神情一如既往温和，但眼底有什么东西沉着——<em>不是威胁，更像是某种告知。</em>' },
        { type: 'dialogue', speaker: '沈时序', text: '书院近来不太平。上月失踪的两个女学生，官府结案说是自行离院，但我查过——失踪前，两人都去过贺府做客。' },
      ],
      choices: [
        { text: '「沈师兄，你为什么告诉我这些？」——直接问，看他如何接。', next: 11 },
        { text: '低头，把书推回去，轻声说「我不明白师兄的意思」——先看他底牌。', next: 12 },
      ]
    },

    // Scene 10
    10: {
      chapter: '第二幕 · A线 · 君子有刃',
      chapterShort: '第二幕',
      content: [
        { type: 'chapter-title', text: '第二幕', sub: '— 君子有刃 —' },
        { type: 'location', text: '清源书院 · 藏书楼三层 · 黄昏' },
        { type: 'narration', text: '从贺府回来的那日傍晚，苏鸢一个人坐在藏书楼最里头，把那枚裂了的玉坠摊在膝上，看了很久。' },
        { type: 'narration', text: '楼上无人。黄昏的光从窗棂斜进来，把灰尘照得像细碎的金粉，悬在半空中，不落不散。' },
        { type: 'narration', text: '她在想贺崇玄的眼睛。' },
        { type: 'thought', text: '那种眼神……\n\n不是长辈打量晚辈，也不是老人看年轻女孩。\n\n是……研究。\n像在看一件器物，估量它还能用多久。' },
        { type: 'narration', text: '脚步声从楼梯口传来，轻而稳，是惯于走夜路的人才有的步法。' },
        { type: 'narration', text: '苏鸢没动，只是把玉坠握进掌心，低下头，换回那副惯常的神情。' },
        { type: 'narration', text: '来人在她斜对面的书架前停下，取了一本书，随手翻开。然后，没有走。' },
        { type: 'narration', text: '沉默了片刻，对方开口，声音低而平：' },
        { type: 'dialogue', speaker: '沈时序', text: '从贺府回来了？' },
        { type: 'narration', text: '苏鸢抬起头。' },
        { type: 'narration', text: '她认得他。书院高一级的师兄，沈时序。' },
        { type: 'narration', text: '这是她第一次，在这么近的距离，认真地看他。灯下的光把他照得清楚——' },
        { type: 'narration', text: '银白色的头发，用深色布条束成公差的发式，压得整齐，但几缕散在耳侧，怎么也藏不住那个颜色。这颜色生得太特异，苏鸢头一回见时以为是染的，后来才信是真的。' },
        { type: 'narration', text: '眉骨清冽，眼睛是蓝的——不是浅蓝，是深处带着墨色的那种，像冬日里结过冰的潭水，往里看，看不到底。' },
        { type: 'narration', text: '皮肤白，人高，身形窄而直，不是练武的体格，但肩背的线条有种说不清楚的张力，像弓悬而未发。长相偏古典，俊，但不是那种叫人一眼挪不开的俊——是越看越有什么东西没看全的那种，叫人想再看一眼。' },
        { type: 'thought', text: '少年感。\n\n这是苏鸢给他的第一个判断，也是最准确的。\n\n二十出头的年纪，站在书架旁，捧着书，眉目温和，像清源书院里任何一个用功的学生。\n\n但他刚才那句话——' },
        { type: 'narration', text: '<em>平静得像是早就知道她去过哪里。</em>' },
        { type: 'thought', text: '……他怎么知道我今日去了贺府？\n\n他一直在注意我？\n还是……有人告诉他？' },
        { type: 'narration', text: '苏鸢的眼神没变，只是慢慢地、困惑地眨了一下眼，做出一副没听懂的模样。' },
        { type: 'dialogue', speaker: '苏鸢', text: '沈师兄……您是在问我吗？' },
        { type: 'narration', text: '沈时序低头翻书，没有看她，嘴角轻轻动了一下，像是在笑，又什么都没说。' },
        { type: 'narration', text: '过了一会儿，他合上书，转身，走到她对面坐下。' },
        { type: 'narration', text: '然后他把书推过来——不是随便取的一本，是《寄魂异录》，刻本旧，封面磨损，扉页上有一行小字，是前人的批注：' },
        { type: 'atmos', text: '「凡灵异体者，生有余魂附身，死则诸魂俱散，宜慎之又慎。」' },
        { type: 'narration', text: '苏鸢看着那行字，手指微微收紧。' },
        { type: 'narration', text: '她抬起眼，直直地看向沈时序。' },
        { type: 'narration', text: '他也在看她，神情一如既往地温和，但眼底有什么东西沉着——不是威胁，<em>更像是某种……告知。</em>' },
        { type: 'dialogue', speaker: '沈时序', text: '书院近来不太平。上月失踪的两个女学生，官府结案说是自行离院，但我查过了——' },
        { type: 'narration', text: '他顿了一下。' },
        { type: 'dialogue', speaker: '沈时序', text: '失踪前，两人都去过贺府做客。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '苏鸢坐在那里，听完，低下头，沉默了很长时间。' },
        { type: 'narration', text: '外头的光更暗了，藏书楼的角落里像是聚着什么，无声无息地浮动。' },
        { type: 'thought', text: '他在查贺家。\n\n他知道的，比他说出来的多。\n\n问题是……他为什么告诉我？\n\n他知道我与贺家的关系，却把这个递给我看——\n\n他是在试探？还是……在邀我入局？' },
        { type: 'narration', text: '她捏着那本书，慢慢抬起头，露出一个浅浅的、有些茫然的笑。' },
      ],
      choices: [
        { text: '「沈师兄，你为什么告诉我这些？」——直接问，看他如何接。', next: 11 },
        { text: '低头，把书推回去，轻声说「我不明白师兄的意思」——继续装不懂，先看他底牌。', next: 12 },
      ]
    },
    // Scene 11
    11: {
      chapter: '第二幕 · A线 · 君子有刃',
      content: [
        { type: 'location', text: '清源书院 · 藏书楼三层 · 夜色将至' },
        { type: 'dialogue', speaker: '苏鸢', text: '沈师兄，你为什么告诉我这些？' },
        { type: 'narration', text: '她没有用那副软糯的声音，这句话问得很平，很直，不像平时的苏鸢。' },
        { type: 'narration', text: '沈时序没有意外的神情。' },
        { type: 'narration', text: '他只是看着她，停顿了三息，然后说：' },
        { type: 'dialogue', speaker: '沈时序', text: '因为你今天去退亲，贺崇玄没有放你走。' },
        { type: 'narration', text: '苏鸢的呼吸轻轻滞了一下。' },
        { type: 'dialogue', speaker: '沈时序', text: '一个他亲口定下的亲事，无论对方如何要求，他都不会松口——除非他还没从对方身上得到他想要的东西。' },
        { type: 'narration', text: '他的声音始终很平，像是在讲一件与自己无关的旧案。' },
        { type: 'dialogue', speaker: '沈时序', text: '苏姑娘，你身上有他想要的东西，你自己清楚。' },
        { type: 'narration', text: '苏鸢没动。' },
        { type: 'narration', text: '她看着他，他也看着她，两个人像是在隔着一张棋盘，互相确认对方落了哪颗子。' },
        { type: 'thought', text: '他知道我是灵异体。\n\n……他知道多少？\n\n他说"你自己清楚"——他没有把话说透，是因为他还不确定我清楚到哪一步，\n还是他故意留了余地，让我自己开口？' },
        { type: 'narration', text: '沈时序忽然开口，打断了她的思绪：' },
        { type: 'dialogue', speaker: '沈时序', text: '我不是贺家的人。' },
        { type: 'narration', text: '他说得很轻，像是随口补了一句，却字字落地有声。' },
        { type: 'dialogue', speaker: '沈时序', text: '我查贺家，不是第一天了。如果你愿意，我们可以——' },
        { type: 'narration', text: '话音未落，楼梯口忽然传来脚步声。' },
        { type: 'narration', text: '沈时序当即闭口，低下头，将那本《寄魂异录》不动声色地抽走，换了一本《诗余话》摆在桌上。' },
        { type: 'narration', text: '苏鸢几乎同一瞬间低下头，捏起桌角随意放着的一支笔，像是在看笔尖。' },
        { type: 'narration', text: '进来的是书院的小厮，送灯油的，左右看了看，道了声「打扰」，放下油壶就走了。' },
        { type: 'narration', text: '脚步声远去。' },
        { type: 'narration', text: '灯芯在无风的室内微微跳了一下。' },
        { type: 'narration', text: '苏鸢放下笔，缓缓抬起头，对上沈时序的眼睛。' },
        { type: 'narration', text: '他刚才说——<span class="highlight-text">「如果你愿意，我们可以——」</span>' },
        { type: 'thought', text: '可以什么？\n\n合作。\n\n他想说的，是合作。' },
      ],
      choices: [
        { text: '「沈师兄刚才没说完。」——低声接话，示意他继续。', next: 12 },
        { text: '沉默，把那本《寄魂异录》推回他面前——以行动代替表态。', next: 12 },
      ]
    },
    // Scene 12
    12: {
      chapter: '第二幕 · A线 · 君子有刃',
      content: [
        { type: 'location', text: '清源书院 · 藏书楼三层 · 夜色将至' },
        { type: 'narration', text: '苏鸢低下头，把那本书推了回去，声音轻轻的。' },
        { type: 'dialogue', speaker: '苏鸢', text: '……我不明白师兄的意思。' },
        { type: 'narration', text: '沈时序没有接书。' },
        { type: 'narration', text: '那本《寄魂异录》就那样搁在两人之间，扉页上那行批注朝上，安安静静地摊着。' },
        { type: 'narration', text: '沈时序看了她一会儿，然后说：' },
        { type: 'dialogue', speaker: '沈时序', text: '没关系，不明白也无妨。' },
        { type: 'narration', text: '他站起来，整了整袖口，准备离开。' },
        { type: 'narration', text: '走到楼梯口，脚步顿了一下，背对着她说：' },
        { type: 'dialogue', speaker: '沈时序', text: '书你拿着。看不看，随你。' },
        { type: 'narration', text: '然后他下楼去了，脚步声轻稳，渐渐听不见。' },
        { type: 'narration', text: '苏鸢一个人坐着，盯着那本书。' },
        { type: 'thought', text: '他……没有生气，也没有追问。\n\n只是留下了书。\n\n这个人……\n\n要么是真的不在乎，\n要么……他已经猜到了我会装不懂，\n提前把后手留好了。' },
        { type: 'narration', text: '她最终把书拿起来，揣进袖里。' },
        { type: 'narration', text: '第二日一早，她在回廊上撞见沈时序，他对她点了个头，如常打招呼，什么都没提。' },
        { type: 'narration', text: '然后第三日，第四日，他每次经过她身边，都是那副温和平静的样子，像是什么都没发生过。' },
        { type: 'narration', text: '直到第五日——' },
        { type: 'narration', text: '书院后墙外的巷子里，有人悄声叫住了她。' },
        { type: 'narration', text: '是沈时序，便服，腰间没了那块书院的玉牌，换了一个她看不出来历的暗纹铜扣。' },
        { type: 'thought', text: '……那枚铜扣。\n\n我在哪里见过这纹样？' },
        { type: 'dialogue', speaker: '沈时序', text: '今夜，旧城东巷第三口井旁，有个案子。' },
        { type: 'narration', text: '他说完，转身就走，只留了这一句。' },
        { type: 'div', text: '◆' },
        { type: 'atmos', text: '今夜，你去不去？' },
      ],
      choices: [
        { text: '去——跟上他，今夜亲眼看清那口井。', next: 13 },
        { text: '去，但不露面——在暗处跟着，先观察再说。', next: 13 },
      ]
    },
    // Scene 13
    13: {
      chapter: '第二幕 · A线 · 东巷井鬼',
      chapterShort: '第二幕',
      content: [
        { type: 'location', text: '旧城东巷 · 第三口井旁 · 亥时' },
        { type: 'narration', text: '月色很薄，被云压着，透不出多少光。' },
        { type: 'narration', text: '东巷里的青石板路潮湿，井台上的青苔黑而深，井绳垂在那里，纹丝不动。' },
        { type: 'narration', text: '苏鸢站在巷口阴影里，看着那口井，体内某个地方，像是有什么在轻轻拨动——寄宿的魂魄在对周遭回应，安静的，但清晰。' },
        { type: 'thought', text: '气息不对。\n\n这里有什么东西。\n\n而且……不只是气息——\n是某种更具体的东西，压在这条巷子里，连空气都是黏的。' },
        { type: 'narration', text: '沈时序从另一侧走来，便服，腰间系了一根细布带，手里拿着一盏遮光的小灯，光线压得极低。他走路没什么声音，出现在苏鸢旁边时，她几乎没有提前察觉。' },
        { type: 'thought', text: '……这步子。\n\n书院里那个温和的师兄，不是他的全部。' },
        { type: 'narration', text: '他在她身旁站定，低声道：' },
        { type: 'dialogue', speaker: '沈时序', text: '三日前有居民来报，每夜亥时后，这口井里传出哭声。官府来查，说是风过井口，结案了。两月前失踪的女学生宋微，家住巷尾。' },
        { type: 'narration', text: '苏鸢点头，没有多问，只是走近了那口井，把手贴上井台的石沿——' },
        { type: 'narration', text: '冷。是那种超出石头本该有的冷，像是下面有什么在往外散着什么，源源不断。' },
        { type: 'narration', text: '然后，井里传来了声音。' },
        { type: 'atmos', text: '不是哭声——是某种更低沉、更零碎的呜咽，夹杂着什么东西在水面上漂浮摩挲的声音，湿的，近的，像从墙壁里渗出来的一样。' },
        { type: 'narration', text: '苏鸢的手心出了一层薄汗。' },
        { type: 'narration', text: '体内那缕魂魄——猛地一动。不是姐姐，是另一个，是宋微留下的那一缕，在对井底的东西做出回应。' },
        { type: 'thought', text: '她认得那口井里的东西。\n\n……那东西，也认得她。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '苏鸢蹲下，掌心贴石沿，闭上眼，把那缕魂魄向外延伸，如丝线探入黑水。' },
        { type: 'atmos', text: '——冷。暗。有人在哭，没有眼泪，只有声音，一遍一遍的。' },
        { type: 'atmos', text: '——「……地下，地下有……」' },
        { type: 'narration', text: '然后，那声音忽然变了。' },
        { type: 'narration', text: '变成了另一种声音，不是哭，是呼——是某种极度渴望的、向外抓取的声音，像溺水的人找到了一根绳子——' },
        { type: 'narration', text: '苏鸢感到有什么东西，顺着她延伸出去的那根线，猛地往回扯。' },
        { type: 'narration', text: '她的整个身体往前倾，膝盖磕上井台边沿，右手几乎整个探进了井口——' },
        { type: 'narration', text: '然后有一只手，抓住了她的手腕。' },
        { type: 'narration', text: '把她从井口拉开，拉离了那个东西的扯动范围，用力但没有疼，干净利落。' },
        { type: 'narration', text: '是沈时序。他单膝落在地上，把她拽回来，灯放在旁边，另一只手已经从腰间取出了一道符——不是书院里练字用的那种，是画了细密纹路的，墨色极深，纸张发黄，一看就是用过多次的旧符。' },
        { type: 'narration', text: '他把符纸盖在井沿上，压上手掌，低声说了几个字。' },
        { type: 'narration', text: '苏鸢听不清，但能看见——井口涌上来的那股寒气，像被什么东西推回去，往下退了。' },
        { type: 'narration', text: '退了很慢，退了很长时间，然后，那口井，又恢复了死寂。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '苏鸢坐在井台边的地上，手腕上还留着他抓握的余温。她低头，发现右手的指尖上，有几道细痕，是被井沿的石头磕的，不深，但渗出了细密的血珠。' },
        { type: 'narration', text: '沈时序蹲在她面前，看了一眼那几道痕，从袖中取出一小块布，递给她，没有说话。' },
        { type: 'narration', text: '苏鸢接过来，包上，然后抬起头，第一次，以完全平等的目光看着他：' },
        { type: 'dialogue', speaker: '苏鸢', text: '那道符，你用的是哪家的术？' },
        { type: 'narration', text: '沈时序把那张符纸从井沿上取下来，折叠收好，嘴角有一点点动：' },
        { type: 'dialogue', speaker: '沈时序', text: '家传的。' },
        { type: 'dialogue', speaker: '苏鸢', text: '镇异司的家传，还是你自己的家传？' },
        { type: 'narration', text: '他转过脸，正式地看了她一眼——那双蓝眸在夜里，比白天更深，更难读。' },
        { type: 'dialogue', speaker: '沈时序', text: '你比我以为的更快。' },
        { type: 'dialogue', speaker: '苏鸢', text: '你也是。' },
        { type: 'narration', text: '两句话，算是彼此揭了一张底牌，两个人都没有再追问，默契地站起来，拍掉膝盖上的土。' },
        { type: 'narration', text: '沈时序把灯重新提起来，往巷子深处走了两步，回头：' },
        { type: 'dialogue', speaker: '沈时序', text: '她说的"地下"，我知道在哪里。跟我来。' },
        { type: 'thought', text: '家传的术，旧符，一出手就知道这种东西怎么处理——\n\n沈时序，你在镇异司里是什么位置，\n我越来越好奇了。' },
      ],
      choices: [
        { text: '跟上去——「地下，是贺家的废宅？」', next: 14 },
        { text: '跟上去，什么都不问——先看，再说。', next: 14 },
      ]
    },
    14: {
      chapter: '第二幕 · A线 · 君子有刃',
      content: [
        { type: 'location', text: '贺家废置老宅 · 地窖入口 · 亥时深' },
        { type: 'narration', text: '老宅的门锁已经锈死，沈时序从腰间摸出一把细钩，三下两下拨开，没发出任何声音。' },
        { type: 'thought', text: '……这手法，不是寻常读书人会的。' },
        { type: 'narration', text: '苏鸢看着他，沈时序像是感觉到了目光，偏头，说了句：' },
        { type: 'dialogue', speaker: '沈时序', text: '年少时学的杂艺，别多想。' },
        { type: 'narration', text: '苏鸢没有追问，跟着他走了进去。' },
        { type: 'narration', text: '院子里荒草没膝，废宅的正房门板半开，里头是扑面的霉气和腐木的气味。' },
        { type: 'narration', text: '沈时序举灯照了一圈，摇摇头，转向西侧——那里有一块地面的纹路与周边不同，砖缝里有新土。' },
        { type: 'narration', text: '苏鸢走上去，蹲下，手指沿缝隙摸了一圈。' },
        { type: 'thought', text: '有人近期动过这里。\n\n而且……' },
        { type: 'narration', text: '她体内的魂魄又动了，这一次更剧烈，像有什么在地下挣扎，要往上冒。' },
        { type: 'narration', text: '她站起身，声音很平：' },
        { type: 'dialogue', speaker: '苏鸢', text: '下面有入口。' },
        { type: 'narration', text: '两人找到了地窖的翻板，拉开，一股夹杂着草木灰和某种刺鼻药气的冷风从下面涌上来。' },
        { type: 'narration', text: '沈时序先下，在下面站稳了，抬手，苏鸢跟着落下。' },
        { type: 'narration', text: '地窖比预想的深，也比预想的大。' },
        { type: 'narration', text: '灯光照出去——' },
        { type: 'narration', text: '四壁上，挂着符纸。密密麻麻，从顶垂到底，墨迹有新有旧。' },
        { type: 'narration', text: '正中的地面上，画着一个阵，用朱砂，圆形，中间刻着苏鸢认不出来的字符。' },
        { type: 'narration', text: '但她认得那种字符的气息。' },
        { type: 'thought', text: '招魂阵。\n\n这是招魂阵。\n\n而且……不是民间的那种，不是祭祖用的，是——\n\n是强制性的。\n\n强制召回魂魄，强制留存，强制……用。' },
        { type: 'narration', text: '角落里，有一个翻倒的木架，架上原本放着的东西散落一地——瓷瓶，细针，还有一沓纸，纸上写满了密密麻麻的记录。' },
        { type: 'narration', text: '苏鸢捡起一张，凑近灯光，看了一眼——' },
        { type: 'narration', text: '<span class="highlight-text">「实验体第十七例，灵异体，女，十九岁，导魂成功，宿主存活率：零。」</span>' },
        { type: 'narration', text: '她的呼吸，停了一秒。' },
        { type: 'narration', text: '沈时序从她手里接过那张纸，看完，将它叠好，放进衣内。脸色没有太大变化，但下颌的线条绷紧了。' },
        { type: 'dialogue', speaker: '沈时序', text: '这是我找到的第三处这样的地方。' },
        { type: 'narration', text: '第三处。' },
        { type: 'narration', text: '苏鸢重复了这两个字，在心里，没有说出来。' },
        { type: 'thought', text: '第三处。\n\n那前两处的实验体……\n\n是谁。\n\n是多少人。\n\n宿主存活率：零。\n\n……姐姐。\n\n姐，你是第几例。' },
        { type: 'narration', text: '她没有哭。' },
        { type: 'narration', text: '她只是站在那个招魂阵中央，低着头，握紧了掌心里那枚裂了缝的玉坠，直到指节发白。' },
        { type: 'narration', text: '沈时序没有催她，也没有说话，只是拿着灯，在她身旁站着。' },
        { type: 'narration', text: '不近，不远。' },
        { type: 'atmos', text: '刚刚好。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '片刻之后，苏鸢抬起头。' },
        { type: 'narration', text: '她的眼睛是干的，表情是平的，声音是稳的。' },
        { type: 'dialogue', speaker: '苏鸢', text: '沈师兄。我想和你合作。' },
        { type: 'narration', text: '沈时序看着她，那双眼睛里，这回没有压制，有什么东西安静地浮在水面上，<em>他点了头。</em>' },
        { type: 'dialogue', speaker: '沈时序', text: '好。' },
        { type: 'div', text: '· 合作正式确立 ·' },
        { type: 'narration', text: '从那晚之后，苏鸢有了一个同行的人。' },
        { type: 'narration', text: '她不确定她信任他，也不确定他完全信任她——但他们有同一个方向，暂时，这就够了。' },
        { type: 'thought', text: '沈时序……\n\n你究竟是什么人。\n\n我会慢慢看清楚的。' },
        { type: 'atmos', text: '—— 第二幕 A线 · 第一章 完 ——' },
      ],
      choices: [
        { text: '「沈师兄，你查贺家，是公事还是私事？」——试探他的真实动机。', next: 101 },
        { text: '什么都不问，先离开此处，各自回去——信任要用时间换。', next: 90 },
      ]
    },
    // Scene 101: 地窖后·公事私事·第一次回答
    101: {
      chapter: '第二幕 · A线 · 君子有刃',
      content: [
        { type: 'location', text: '贺家废宅 · 地窖出口 · 亥时深' },
        { type: 'narration', text: '两人从地窖里出来，废宅的荒草在夜风里轻轻响，头顶月色薄，把院子照得明暗不定。' },
        { type: 'narration', text: '苏鸢站在院中，没有马上走，把那句话直接问了出去：' },
        { type: 'dialogue', speaker: '苏鸢', text: '沈师兄，你查贺家，是公事还是私事？' },
        { type: 'narration', text: '沈时序提着灯，在她侧前方站着，听见这句话，没有立刻回答。' },
        { type: 'narration', text: '他低下头，看了一眼手里那盏灯，火芯在夜风里摇了一下，他用手虚虚拢着灯罩，把它稳住。' },
        { type: 'narration', text: '然后，他说：' },
        { type: 'dialogue', speaker: '沈时序', text: '公事。' },
        { type: 'narration', text: '顿了一下：' },
        { type: 'dialogue', speaker: '沈时序', text: '也有私事。' },
        { type: 'narration', text: '他转过脸，在夜色里看着她，声音压得很低：' },
        { type: 'dialogue', speaker: '沈时序', text: '我所在的地方，负责追查民间异常的灵异案件，《寄魂典》在我们的视野里很久了，这是公事。' },
        { type: 'narration', text: '他停了一停，把视线移开，落在废宅倾颓的门框上：' },
        { type: 'dialogue', speaker: '沈时序', text: '私事——暂时不说。' },
        { type: 'thought', text: '「我所在的地方」——\n\n不是"官府"，不是"衙门"，\n是"我所在的地方"。\n\n这个措辞，是上位者的习惯。\n\n或者——接班人的习惯。\n\n他是镇异司的人。\n\n但他在镇异司里，是什么位置？' },
        { type: 'narration', text: '苏鸢点了点头，没有追问私事，只说：' },
        { type: 'dialogue', speaker: '苏鸢', text: '私事等你想说的时候再说。' },
        { type: 'narration', text: '沈时序侧过脸，在夜色里看了她一眼，那双蓝眸里有什么东西，很短地，松动了一下。' },
        { type: 'dialogue', speaker: '沈时序', text: '……谢谢。' },
        { type: 'narration', text: '两个字，说得极轻，在废宅的夜风里几乎听不见，但苏鸢听见了。' },
        { type: 'thought', text: '谢什么。\n\n谢我没追问？\n\n……\n\n沈时序，你身上，\n也有不想轻易说出口的事。\n\n我们，原来是一样的。' },
      ],
      choices: [
        { text: '继续——去镇异司，第一次踏进那个地方', next: 90 },
      ]
    },

    // Scene 90: 镇异司 · 群像
    90: {
      chapter: '第二幕 · A线 · 镇异司',
      chapterShort: '第二幕',
      content: [
        { type: 'location', text: '镇异司 · 分堂外院 · 翌日午前' },
        { type: 'narration', text: '苏鸢是第一次，也是借着送文书的名义，踏进镇异司的外院。' },
        { type: 'narration', text: '比她想象的要朴素——没有衙门的肃杀气，院里堆着几个木箱，一个人坐在台阶上擦刀，另一个趴在桌上补一份残破的符纸，两人都没有抬头。' },
        { type: 'narration', text: '墙上钉着一排钩，挂着各色器物：铜铃，黑布袋，几把形制奇怪的钩镰，还有一排符筒，像书院里挂毛笔的架子，但里头的东西，苏鸢一样都叫不出名字。' },
        { type: 'thought', text: '这里和衙门不一样。\n\n衙门是做给人看的——威仪，规矩，层层叠叠。\n\n这里是做给事情用的。' },
        { type: 'narration', text: '擦刀的人终于抬头，是个二十出头的女子，短发，眉间有一道细疤，看了苏鸢一眼，目光移向她手里的文书：' },
        { type: 'dialogue', speaker: '镇异司·徐霜', text: '找谁的？' },
        { type: 'dialogue', speaker: '苏鸢', text: '沈……沈队长。' },
        { type: 'narration', text: '"队长"两个字叫出来，那个补符纸的人头也没抬地接了一句：' },
        { type: 'dialogue', speaker: '镇异司·阿朔', text: '在里头。不过你最好等，他正在问人。' },
        { type: 'dialogue', speaker: '苏鸢', text: '问人？' },
        { type: 'narration', text: '"问"字里头有什么意思，那人没说，但苏鸢听见里屋传来的声音——不是打，不是吓，只是沈时序的声音，低而平，在问某个人一连串的问题，没有停顿，没有起伏，问得密不透风，对方根本找不到缝隙说谎。' },
        { type: 'thought', text: '……原来这就是他"问人"的方式。\n\n比拍桌子更难熬——\n那种平静，让人感觉无论怎么回答，他都已经知道答案了。' },
        { type: 'narration', text: '约一刻钟后，里屋的门开了，出来一个面色苍白的中年男人，眼睛不敢往任何方向看，脚步匆忙地走了。' },
        { type: 'narration', text: '沈时序跟着出来，换了一件整齐的公服，束发，玄色领口，与书院里那件洗旧的外袍完全是两个人。' },
        { type: 'narration', text: '他看见苏鸢，走过来，接过文书，低头翻了一眼，然后抬起眼，在院里稍微扫了一圈——' },
        { type: 'dialogue', speaker: '沈时序', text: '看完了？' },
        { type: 'narration', text: '苏鸢没有否认，只是说：' },
        { type: 'dialogue', speaker: '苏鸢', text: '墙上那排钩镰，是专门用来对付什么的？' },
        { type: 'narration', text: '那个叫徐霜的女子抬起头，看了苏鸢一眼，看了沈时序一眼，又低下头，继续擦刀，嘴角动了一下，像是憋了一个字没说出来。' },
        { type: 'narration', text: '沈时序指了指其中最短的一把：' },
        { type: 'dialogue', speaker: '沈时序', text: '勾缚类的异灵，靠近会往人身上缠，钩镰可以在不伤宿体的情况下割断。' },
        { type: 'dialogue', speaker: '苏鸢', text: '割断了之后呢？' },
        { type: 'dialogue', speaker: '沈时序', text: '再用符封，或者引散。看情况。' },
        { type: 'narration', text: '补符纸的那个——苏鸢听人叫他阿朔——忽然插话：' },
        { type: 'dialogue', speaker: '镇异司·阿朔', text: '"引散"是上队长做的最好的，我们几个加一起，成功率还没他高。' },
        { type: 'dialogue', speaker: '镇异司·徐霜', text: '大嘴巴。' },
        { type: 'dialogue', speaker: '镇异司·阿朔', text: '事实而已——' },
        { type: 'narration', text: '沈时序没有参与这段对话，只是转头，看苏鸢，神情没什么变化，但眼里，有一点点什么东西，是苏鸢以前没有在他脸上见过的——' },
        { type: 'atmos', text: '很淡，但是真实的，松弛。' },
        { type: 'thought', text: '这里是他真正待着的地方。\n\n书院那个沈时序是壳，\n这里才是他原来的样子。\n\n这两者之间的反差，\n比我以为的，更有意思。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '离开前，徐霜叫住了苏鸢，把一支符筒塞给她，说：' },
        { type: 'dialogue', speaker: '镇异司·徐霜', text: '上队长查的那个案子，我们都知道你在帮。你要是遇见什么压不住的东西，把这个摔在地上，里面有个小阵，能拖一会儿。' },
        { type: 'narration', text: '她说完，低下头，继续擦刀，口气是平的，像在说"门口放了把伞"一样，没有任何郑重其事的成分。' },
        { type: 'narration', text: '苏鸢捏着那个符筒，走出院门，在门槛外停了一下。' },
        { type: 'thought', text: '镇异司的人，\n\n不是她以为的那种。\n\n比衙门的人更散，更随意，更自成一块——\n但那个院子里，每一件挂着的器物都擦得干净，\n补符纸的人眼睛不抬，但手上从来没停过。\n\n这些人，是真的在干事的。\n\n沈时序在这里面，\n是"队长"。\n\n……我需要重新估一估他。' },
      ],
      choices: [
        { text: '继续——当夜外围摸底，苏鸢与沈时序的配合愈发默契。', next: 15 },
      ]
    },

    // Scene 15
    15: {
      chapter: '第二幕 · A线 · 君子有刃',
      content: [
        { type: 'location', text: '贺家废置老宅 · 外墙 · 亥时' },
        { type: 'dialogue', speaker: '苏鸢', text: '先不急。今夜摸底，明日再动。' },
        { type: 'narration', text: '沈时序停步，回头看了她一眼，随即点头，没有多说。' },
        { type: 'narration', text: '两人在老宅外墙绕了一圈。' },
        { type: 'narration', text: '沈时序记地形，苏鸢感气息——她没有告诉他她在做什么，但她感觉到了：宅子地下有东西，沉的，冷的，是被强行压住的魂魄残迹。' },
        { type: 'thought', text: '不止一个。\n\n这里压着的，不止一个人的痕迹。' },
        { type: 'narration', text: '她把这件事告诉了沈时序，只说"地下气息不对，不像正常的宅邸"，没有说自己是怎么感知到的。' },
        { type: 'narration', text: '沈时序沉默了一阵，在外墙的暗处停下来，低声说：' },
        { type: 'dialogue', speaker: '沈时序', text: '明日我去查这处宅子的地契和来历，你……若方便，帮我留意书院里有没有人与贺府近来往来频繁。' },
        { type: 'narration', text: '苏鸢点头。' },
        { type: 'narration', text: '他们就这样分工了——没有郑重其事的合作宣言，没有握手为盟，只是在黑夜里，各自确认了一个方向。' },
        { type: 'narration', text: '分开前，沈时序忽然停下脚步，没有回头，语气很轻：' },
        { type: 'dialogue', speaker: '沈时序', text: '苏姑娘，你一个人回去，路上小心些。' },
        { type: 'thought', text: '……\n\n他知道我的路不太平。\n\n他知道的比我以为的还要多。' },
        { type: 'atmos', text: '她目送他的背影消失在巷子深处，月光稀薄，灯已经熄了。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '第二日，沈时序查出那处宅子登记在贺家一个外管事名下，已空置三年，账册上没有任何异常。' },
        { type: 'narration', text: '但苏鸢留意到了——白鹿那日去书院旁的茶楼，对面坐的，是贺府一个穿墨蓝长衫的男人，两人说了约一炷香的话，白鹿离开时，桌上多了一个小布包。' },
        { type: 'narration', text: '她把这件事告诉了沈时序。' },
        { type: 'narration', text: '沈时序的神色变了一瞬，很快压下去，说：' },
        { type: 'dialogue', speaker: '沈时序', text: '白鹿……她不只是贺珩的心上人这么简单。' },
        { type: 'narration', text: '苏鸢心里某个推断悄悄落了子。' },
        { type: 'thought', text: '所以那晚的珠钗……\n贺崇玄，你连这步棋都布好了。' },
        { type: 'div', text: '· 合作正式确立 ·' },
        { type: 'atmos', text: '—— 第二幕 A线 · 第一章 完 ——' },
      ],
      choices: [
        { text: '继续——与沈时序深入调查贺家', next: 16 },
      ]
    },
    // Scene 16
    16: {
      chapter: '第二幕 · A线 · 君子有刃',
      content: [
        { type: 'location', text: '清源书院 · 后园 · 翌日清晨' },
        { type: 'narration', text: '晨雾比往日更重，把书院里的飞檐和回廊都模糊成了淡墨的轮廓。' },
        { type: 'narration', text: '苏鸢在后园的石凳上等着，手里捏着那枚玉坠，拇指来回摩挲裂缝的边缘，感觉那道缝越来越深，越来越熟悉。' },
        { type: 'narration', text: '沈时序来的时候，手里拿着两盏从小厨房端来的热茶，放了一盏在她面前，自己在对面坐下。' },
        { type: 'narration', text: '晨雾漫在两人之间，他低头喝了口茶，没有先开口。' },
        { type: 'thought', text: '他在等我说。\n\n……还是他也不知道从哪里开始说。' },
        { type: 'narration', text: '苏鸢把玉坠在掌心攥了攥，开口：' },
        { type: 'dialogue', speaker: '苏鸢', text: '你之前说——私事暂时不说。' },
        { type: 'narration', text: '沈时序抬起眼，等她继续。' },
        { type: 'dialogue', speaker: '苏鸢', text: '我的私事，也没打算全告诉你。但有一件事，我可以说——我进这个局，不是第一天了。' },
        { type: 'narration', text: '她抬起头，直视着他：' },
        { type: 'dialogue', speaker: '苏鸢', text: '我姐姐，是贺崇玄实验的其中一个。地窖里那些记录，我不用看日期，也知道她在里面。' },
        { type: 'narration', text: '沈时序握着茶盏，没有动，听她说完，沉默了很长时间。' },
        { type: 'narration', text: '他低着眼，晨雾漫在两人之间，他的表情看不太清楚，只是那只拿着茶盏的手，指节微微收紧了一下。' },
        { type: 'narration', text: '然后他轻轻放下茶盏，开口，声音比平时更低：' },
        { type: 'dialogue', speaker: '沈时序', text: '我师父，也在贺崇玄的名单上。' },
        { type: 'narration', text: '苏鸢一下子看向他。' },
        { type: 'dialogue', speaker: '沈时序', text: '他是《寄魂典》研究初期的参与者之一，后来察觉出事情的方向不对，想退出——' },
        { type: 'narration', text: '他没有说完。' },
        { type: 'narration', text: '但苏鸢听懂了。' },
        { type: 'thought', text: '私事。\n\n他的私事，是他师父。\n\n所以他查贺家，不只是镇异司的职责。\n\n是因为——\n\n我们都有一个在这件事里失去的人。' },
        { type: 'narration', text: '雾气还在，茶还温着，两个人坐在晨光里，头一次，真正地，把一张底牌摊在了彼此面前。' },
        { type: 'narration', text: '苏鸢端起茶，喝了一口，温热，是清淡的白毫，不像书院小厨房平日的粗茶。' },
        { type: 'thought', text: '他特地去拿的。\n\n……\n\n这个人，细心得有点危险。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '那之后，他们像普通的书院同窗，各自去上课，偶尔在廊下擦肩，点头致意。' },
        { type: 'narration', text: '所有的交流，都在无人的时候，用最平静的声音，说最沉重的事。' },
        { type: 'narration', text: '苏鸢开始习惯在他身边说话，不是那个唯唯诺诺的苏鸢，是另一个。' },
        { type: 'narration', text: '她没有刻意去做这件事，它就这样，慢慢发生了。' },
        { type: 'thought', text: '沈时序。\n\n你是第一个……让我在你面前，不需要太费力的人。\n\n我还不知道这意味着什么。\n\n也许什么都不意味着。\n\n但我记住了。' },
        { type: 'div', text: '· 第二幕 A线 · 完 ·' },
        { type: 'atmos', text: '前路还长，贺崇玄的秘密只剥开了第一层。' },
        { type: 'atmos', text: '沈时序身上的谜，也才刚刚开始浮出水面。' },
      ],
      choices: [
        { text: '【继续A线 第三幕】深入调查《寄魂典》与少女失踪案——', next: 91 },
        { text: '【切换视角】暂时离开A线，去看看其他人在做什么——', next: 99 },
      ]
    },
    // Scene 91: 城西起火·分头行动
    91: {
      chapter: '第二幕半 · A线 · 城西失火',
      chapterShort: '第二幕',
      content: [
        { type: 'location', text: '清源书院 · 苏鸢房中 · 戌时末' },
        { type: 'narration', text: '那夜苏鸢在灯下摊着地图，把近三个月失踪女学生的最后出现位置，一一标记出来。' },
        { type: 'narration', text: '七个点。' },
        { type: 'narration', text: '若隐若现，构成一个形状——不是随机的，是有方向的，像一张网，从城东往城西，一点一点地收。' },
        { type: 'thought', text: '……这是阵。\n\n不是一处地方，\n是整座城的布局，\n以某个核心为圆心，\n以女子的失踪为刻度，\n慢慢转，慢慢紧。\n\n贺崇玄，你在城里埋了一张多大的网。' },
        { type: 'narration', text: '窗外，院子里的风忽然大了。' },
        { type: 'narration', text: '然后苏鸢看见了——城西方向，火光。' },
        { type: 'narration', text: '隐约可以看见烟升起来，是橘红色的，在夜空里烧得很高。' },
        { type: 'narration', text: '门被敲了两下，沈时序的声音从外面传来，低而急：' },
        { type: 'dialogue', speaker: '沈时序', text: '师妹，城西起火，那一带有两处是我们标过的点——我去看看。' },
        { type: 'narration', text: '苏鸢没有立刻应声。' },
        { type: 'narration', text: '她走到桌边，重新看了一眼那张地图，指尖轻轻点在失踪地点上，一处，两处，三处……最后，停在城西医馆的位置。' },
        { type: 'thought', text: '医馆。\n\n那里的郎中三个月前换了人，新来的大夫，没有人知道他来历。\n\n如果这是阵——\n\n火，很可能是为了毁掉线索。\n\n但也可能是……\n\n加速仪式。' },
        { type: 'narration', text: '她抬起头。' },
        { type: 'dialogue', speaker: '苏鸢', text: '师兄——我们不能一起去。' },
        { type: 'narration', text: '沈时序的脚步声停住了。片刻后，门开了，他站在门口，眉头微拢，没有说话，等她解释。' },
        { type: 'narration', text: '苏鸢把地图转过来，推到他面前：' },
        { type: 'dialogue', speaker: '苏鸢', text: '你看这几个点——如果这是阵法布局，城西的火就是引信。引谁？引镇异司。你一出现，就是最大的干扰变量，他们一定备着对付你的东西。' },
        { type: 'narration', text: '她顿了顿，声音压低，平静而笃定：' },
        { type: 'dialogue', speaker: '苏鸢', text: '所以你带人去河边——那里是阵的外圈，你们从外围收网。而我……' },
        { type: 'narration', text: '她微微一笑，那笑容在灯光里，温柔，无害，像从前那个书院里的苏鸢：' },
        { type: 'dialogue', speaker: '苏鸢', text: '我只是个学生，没人会防我。' },
        { type: 'narration', text: '沈时序看着她，沉默了很长时间。' },
        { type: 'narration', text: '他不是冲动的人，所以没有立刻反驳，他把那张地图看了一遍，把她说的每一步在脑子里推演了一遍——' },
        { type: 'narration', text: '然后他说：' },
        { type: 'dialogue', speaker: '沈时序', text: '师妹，你说的这番话，听起来一点也不像普通学生。' },
        { type: 'narration', text: '苏鸢低下头，像是被看穿了一点什么，没有回答。' },
        { type: 'narration', text: '沈时序看了她几秒，从腰间解下一样东西，递给她。' },
        { type: 'narration', text: '铜符，比铜钱稍大，刻着极细密的纹路，压手，带着他身上的温度。' },
        { type: 'dialogue', speaker: '沈时序', text: '如果遇见压不住的邪祟，摔在地上。我能感应到位置。' },
        { type: 'narration', text: '他停顿了一下，声音沉了一点：' },
        { type: 'dialogue', speaker: '沈时序', text: '还有——情况不对，立刻离开。不要逞强。' },
        { type: 'narration', text: '苏鸢把那枚铜符握在掌心，指尖微凉，抬起头，对他点头：' },
        { type: 'dialogue', speaker: '苏鸢', text: '好。' },
        { type: 'narration', text: '下一刻，两人同时动身。' },
        { type: 'narration', text: '沈时序带着镇异司的人往河边方向。' },
        { type: 'narration', text: '苏鸢，独自朝城西走去。' },
        { type: 'thought', text: '他说"不要逞强"。\n\n……\n\n沈时序，你知道吗——\n\n在你之前，没有人对我说过"不要逞强"，\n因为从来没有人觉得，我可能会逞强。\n\n我在所有人眼里都是那个会先退步的人。\n\n……这句话，我记住了。' },
      ],
      choices: [
        { text: '进入城西——独自面对火场', next: 911 },
      ]
    },

    // Scene 91a: 城西火场·遭遇
    911: {
      chapter: '第二幕半 · A线 · 火场',
      content: [
        { type: 'location', text: '城西街道 · 医馆外 · 亥时' },
        { type: 'narration', text: '城西的街道已经乱成一团。' },
        { type: 'narration', text: '远远就能看见火光把夜空烧成暖橘色，人群往反方向跑，喊声，哭声，打水桶碰撞的声音，混成一片。' },
        { type: 'narration', text: '苏鸢逆着人流走，没有跑，只是走，用那副惯常的、迷茫的、找不到路的神情挡在脸上。' },
        { type: 'narration', text: '医馆的门窗都在燃烧，火焰却奇怪——几乎只集中在医馆内部，像被什么东西圈住，周边的屋子连烟都没沾上。' },
        { type: 'thought', text: '不是普通的火。\n\n被困住的火。\n\n……阵。' },
        { type: 'narration', text: '她慢下脚步，低头——青石板之间，有极细的暗红色线条，若不是刻意去看，只当是砖缝里的旧污迹。' },
        { type: 'narration', text: '她顺着线条往前追，那纹路一路延伸进火场，在她视线里，构成了一个半圆的轮廓。' },
        { type: 'thought', text: '阵眼，在医馆里面。\n\n火是阵的一部分，不是意外，是启动——\n\n他们在用火加速什么。' },
        { type: 'narration', text: '就在这时，医馆里传来一声尖叫。' },
        { type: 'narration', text: '不是被火烧的那种求救——是那种被什么东西抓住的、收缩的、往里吸的声音，叫出来之后立刻被截断，像蜡烛被手捏灭。' },
        { type: 'narration', text: '然后，火光里，出现了一个影子。' },
        { type: 'narration', text: '慢慢走到门口。' },
        { type: 'narration', text: '一个少女，十六七岁，脸色惨白如纸，发丝被火光烘得微微飘动，眼睛——' },
        { type: 'atmos', text: '——是漆黑的。没有眼白，没有瞳孔，整个眼窝，都是浓黑的，像两个深进去的洞。' },
        { type: 'narration', text: '她站在门口，嘴角慢慢裂开一个笑，那笑容的弧度超过了正常人脸可以有的幅度。' },
        { type: 'dialogue', speaker: '???', text: '终于……找到出口了。' },
        { type: 'narration', text: '她的声音沙哑，不像活人，像什么东西卡在喉管里，被挤出来的。' },
        { type: 'narration', text: '人群倒退，哭叫，逃散。' },
        { type: 'narration', text: '苏鸢站在那里，没有动。' },
        { type: 'narration', text: '体内的魂魄——猛地震了一下。' },
        { type: 'narration', text: '是姐姐。她在警告。' },
        { type: 'thought', text: '这不是那个少女。\n\n那少女的身体里，\n被装进了某个东西，\n一个很久没有身体、很久没有出口的东西——\n\n它在找新的容器。' },
        { type: 'narration', text: '那双漆黑的眼睛在人群里游移，然后——停了。' },
        { type: 'narration', text: '停在苏鸢身上。' },
        { type: 'narration', text: '苏鸢感觉到那道目光，像两根针，穿过皮肉，直接探进她的胸腔——不是在看她，是在看她体内的东西。' },
        { type: 'dialogue', speaker: '???', text: '……原来。' },
        { type: 'narration', text: '那少女慢慢歪了歪头，眼神里涌现出一种苏鸢只在贺崇玄脸上见过的东西：' },
        { type: 'atmos', text: '贪婪。纯粹的，对更好器物的贪婪。' },
        { type: 'dialogue', speaker: '???', text: '这里有更好的容器——' },
        { type: 'narration', text: '下一瞬，她猛地冲过来。' },
        { type: 'narration', text: '速度不像活人，步子乱，但每一步落下来，地上的符线就亮一分，像是整个阵在给她续力。' },
        { type: 'narration', text: '苏鸢后退了一步，只有一步，右手已经握住了腰间那枚铜符。' },
        { type: 'thought', text: '四条路。\n\n现在，选哪一条。' },
      ],
      choices: [
        { text: '【A】摔出铜符——召沈时序，先保命再说。', next: 92 },
        { text: '【B】呼唤姐姐——让那缕最熟悉阴阳气息的魂魄，替你出面。', next: 93 },
        { text: '【C】反制阵法——她借阵续力，你就用阵对付她。', next: 94 },
        { text: '【D】故意后退，把她引出阵眼——没有阵给她续力，她就是困兽。', next: 95 },
      ]
    },

    // Scene 92: 选A·摔符·沈时序赶到
    92: {
      chapter: '第二幕半 · A线 · 火场',
      content: [
        { type: 'narration', text: '苏鸢把铜符摔在地上。' },
        { type: 'narration', text: '一声轻响，符上的纹路瞬间亮了，是一种极冷的白光，在地上散开，把那少女的冲势硬生生拦了一下——不是封印，只是一道屏，拖了几息。' },
        { type: 'narration', text: '苏鸢用这几息往旁边绕开，把距离拉开，背抵着一面没有符线经过的砖墙，屏住呼吸。' },
        { type: 'thought', text: '他说能感应到位置。\n\n我信他。' },
        { type: 'narration', text: '那少女撞在光屏上，发出一声不像人的嘶鸣，低头，看见铜符的纹路，眼底的黑色涌动了一下，然后向苏鸢走来，步子变慢，像是那道光让它有所忌惮。' },
        { type: 'narration', text: '三十息。' },
        { type: 'narration', text: '六十息。' },
        { type: 'narration', text: '苏鸢数着，保持着和那少女之间的距离，绕着那道渐渐暗下去的光屏周旋，不攻，也不退进死角。' },
        { type: 'narration', text: '然后，巷子另一头，出现了人影。' },
        { type: 'narration', text: '沈时序。' },
        { type: 'narration', text: '他是一个人来的，没带队，腰间的长剑已经出了鞘，银白的发束因为跑来而散了几缕，落在脸旁，他扫了一眼整个场面——火，阵，那个眼睛漆黑的少女，还有苏鸢——全部在一瞬间纳入他的判断，然后他动了。' },
        { type: 'narration', text: '他走得不快，但每一步都是踩在符线的空隙里，精准地避开阵法对他的反应。' },
        { type: 'thought', text: '他看见符线了。\n\n我看那条线找了一盏茶的功夫，\n他走过来，三步，都踩在空隙里。\n\n……' },
        { type: 'narration', text: '那少女感知到他，猛地转过身，向他冲去，阵线随着她的方向亮了起来，是比刚才更密的光——' },
        { type: 'narration', text: '沈时序停步，右手抬起，剑尖指地，划了一道弧。' },
        { type: 'narration', text: '不是劈，不是斩，是压。' },
        { type: 'narration', text: '一股气从剑尖散出去，苏鸢感觉到了——是那种镇异司符纸上的气息，但比任何一张符都更浓，更沉，像什么东西从他身上往外走，把整个阵的外圈压下去了一截。' },
        { type: 'narration', text: '那少女的步子慢了，身体开始颤，那个占据了她身体的东西，在拼命挣扎，拼命给自己续力，但阵被压着，续不上来。' },
        { type: 'narration', text: '苏鸢没有站着看。' },
        { type: 'narration', text: '她绕到侧面，在地上找到阵眼的位置——那块砖缝最密的地方，符线在这里交叉成一个节点——她蹲下，把玉坠从颈间取下来，坠角压进那个节点，用力。' },
        { type: 'narration', text: '裂了的玉坠里，有一缕气散了出来——是姐姐，是苏霜，是阴阳交界处最熟悉那条线的魂魄。' },
        { type: 'atmos', text: '节点断了。' },
        { type: 'narration', text: '像一根绷紧的弦被剪断，整张阵在一息之间，往里坍缩，光熄了，符线熄了，那少女发出一声短促的叫声，双膝跪地，那个占据她的东西，被失去依托的阵一道散开，四下里涌出去，像风。' },
        { type: 'narration', text: '苏鸢把玉坠握回掌心，站起来，发现自己的手在轻微地发抖，不是怕，是消耗——让姐姐出来，每次都要消耗她自己的一点什么。' },
        { type: 'narration', text: '沈时序走过来，在她面前站定，低头，看见她的手，皱了一下眉，但没有说话，只是把剑收回鞘，从袖里取出一小块干净的布，递给她。' },
        { type: 'thought', text: '又是一块布。\n\n……他是习惯备着这个，\n还是只对我备着。' },
        { type: 'narration', text: '苏鸢接过来，握在手里，仰头看他，说：' },
        { type: 'dialogue', speaker: '苏鸢', text: '谢谢师兄来得快。' },
        { type: 'dialogue', speaker: '沈时序', text: '……你早就知道那个阵眼在哪里。' },
        { type: 'narration', text: '不是问句，是论断。' },
        { type: 'narration', text: '苏鸢没有否认，只是轻轻弯了弯眼睛：' },
        { type: 'dialogue', speaker: '苏鸢', text: '所以我才说，我们不能一起来。' },
        { type: 'narration', text: '沈时序看着她，沉默了两息，然后侧过脸，看向那个跪在地上、已经恢复正常眼色、正在发抖痛哭的少女，声音很轻：' },
        { type: 'dialogue', speaker: '沈时序', text: '……你姐姐，也在这件事里。' },
        { type: 'narration', text: '苏鸢攥着玉坠，没有说话。' },
        { type: 'narration', text: '这已经是确认，不是问句。' },
        { type: 'thought', text: '他什么时候知道的。\n\n……\n\n或许从地窖那张记录纸上，就已经知道了。\n\n他没有问，一直没有问，\n等我自己说。\n\n……沈时序。\n\n你这个人，太会等了。' },
      ],
      choices: [
        { text: '继续——两人并肩离开火场，走向第三幕', next: 96 },
      ]
    },

    // Scene 93: 选B·呼唤姐姐
    93: {
      chapter: '第二幕半 · A线 · 火场',
      content: [
        { type: 'narration', text: '苏鸢没有摔符。' },
        { type: 'narration', text: '她闭上眼，往里收，把那缕最深处的魂魄往外唤——' },
        { type: 'thought', text: '姐。\n\n我需要你看清楚这个东西。' },
        { type: 'narration', text: '体内忽然有一股温热的东西向外漫，不是苦的，不是痛的，是那种带着旧日气息的、熟悉的温度——苏霜的温度。' },
        { type: 'narration', text: '那少女冲到她面前三步时，忽然停住了。' },
        { type: 'narration', text: '那双漆黑的眼睛，盯着苏鸢的脸，眼底的黑色开始翻涌——然后，退了一步。' },
        { type: 'narration', text: '又退了一步。' },
        { type: 'narration', text: '像是撞见了什么让它忌惮的东西。' },
        { type: 'thought', text: '姐，他认识你。\n\n或者——\n\n它怕你。\n\n它知道你在这里，\n所以它退了。\n\n……姐姐，你在我体内的这四年，\n究竟收集了多少这些东西的信息。' },
        { type: 'narration', text: '那少女身体里的东西开始失控，它在里面挣扎，少女的身体痉挛起来，嘴里发出破碎的声音，跌跌撞撞地后退，往阵眼的方向退。' },
        { type: 'narration', text: '苏鸢跟上去，逼着它退，一步，两步，把它逼回阵眼的正中——' },
        { type: 'narration', text: '然后她把玉坠摁进那块节点的砖缝。' },
        { type: 'narration', text: '阵断。' },
        { type: 'narration', text: '那个东西，散了。' },
        { type: 'narration', text: '少女跌坐在地上，双手捂脸，哭出了声。' },
        { type: 'narration', text: '苏鸢站在原地，把姐姐重新收回来，深吸一口气。' },
        { type: 'narration', text: '手有点抖。' },
        { type: 'thought', text: '姐，你替我挡了这一下。\n\n但我有时候会想——\n\n我把你留在体内这件事，\n对你来说，公平吗？\n\n你说过"不用替我报仇，好好活着"——\n但我在用你替我打仗，\n用你替我感知，\n用你替我在黑暗里看清楚那些东西。\n\n……\n\n我欠你的，\n这场仇了结之后，\n我会让你走，好好走。\n\n我答应你。' },
        { type: 'narration', text: '沈时序在她身后出声，声音很轻：' },
        { type: 'dialogue', speaker: '沈时序', text: '你还好吗？' },
        { type: 'narration', text: '苏鸢没有回头，只是说：' },
        { type: 'dialogue', speaker: '苏鸢', text: '好。你来了多久了？' },
        { type: 'dialogue', speaker: '沈时序', text: '……从你闭上眼睛开始。' },
        { type: 'narration', text: '苏鸢沉默了一下，然后转过身，看着他，他的表情是平的，但那双蓝眸里，有什么东西比平时更深了一点，更沉了一点。' },
        { type: 'thought', text: '他看见了。\n\n他看见了我把姐姐唤出来，\n看见了那个东西退缩，\n看见了我逼它回阵眼，\n摁断节点。\n\n他什么都没问。\n\n只问了一句"你还好吗"。\n\n……' },
      ],

    // Scene 94: 选C·反制阵法
    94: {
      chapter: '第二幕半 · A线 · 火场',
      content: [
        { type: 'narration', text: '苏鸢没有退。' },
        { type: 'narration', text: '她往前走了半步，目光压低，扫着脚边的符线。' },
        { type: 'thought', text: '她靠阵续力。\n\n那阵是圆的，以医馆为圆心往外辐射。\n\n圆形阵法有一个特点：\n顺转则聚，逆转则散。\n\n我不需要破它，\n只需要让它转错方向。' },
        { type: 'narration', text: '那少女已经冲到她面前两步，苏鸢猛地侧身避开，绕到她的侧后方，蹲下，把手指按进符线最密集的那段砖缝——' },
        { type: 'narration', text: '她体内的魂魄们，一个接一个，把那道线感知的方向往反面推，像一群人一起拨动一根绷紧的弦。' },
        { type: 'narration', text: '那少女身体里的东西感觉到了，发出一声嘶吼，转向苏鸢——' },
        { type: 'narration', text: '但阵已经开始乱了。' },
        { type: 'narration', text: '符线一段一段地往错误方向走，火焰的形态变了，从往内圈烧，变成往外蔓延——阵在自己消耗自己。' },
        { type: 'narration', text: '苏鸢起身，往后退开，看着那少女的步子越来越乱，越来越轻——那个东西失去了续力的来源，开始萎缩。' },
        { type: 'narration', text: '最后，她走到阵眼，把玉坠摁进节点，断了最后一条线。' },
        { type: 'narration', text: '阵，散了。' },
        { type: 'narration', text: '人群里有人喊："火灭了！"' },
        { type: 'narration', text: '医馆的火，没有人泼水，自己熄了。' },
        { type: 'narration', text: '苏鸢站在散去的烟气里，看着那个跌倒在地的少女，体内的魂魄们各自安静下来，一个一个，回去。' },
        { type: 'thought', text: '她们帮了我。\n\n不只是姐姐，\n是体内所有寄宿的那些——\n那些没有名字、没有人记得的她们，\n用她们剩下的那一点力气，\n帮我推动了这件事。\n\n贺崇玄把她们叫做"实验体"。\n\n我叫她们——\n\n……我还没想好一个足够的名字。\n\n但我记得她们在这里帮过我。' },
        { type: 'narration', text: '沈时序走过来，在她旁边站定，看了一眼那道已经熄灭的符线，看了一眼苏鸢，轻声说：' },
        { type: 'dialogue', speaker: '沈时序', text: '你用了多少人？' },
        { type: 'narration', text: '苏鸢知道他在说体内的魂魄，抬起头，认真地对上他的眼睛：' },
        { type: 'dialogue', speaker: '苏鸢', text: '她们愿意的。' },
        { type: 'narration', text: '沈时序看着她，沉默了一会儿，点了点头，没有再问。' },
      ],
      choices: [
        { text: '继续——两人并肩离开火场，走向第三幕', next: 96 },
      ]
    },

    // Scene 95: 选D·引出阵眼
    95: {
      chapter: '第二幕半 · A线 · 火场',
      content: [
        { type: 'narration', text: '苏鸢后退了。' },
        { type: 'narration', text: '一步，两步，往阵的外圈方向退，退得从容，退得有意，像是在逃，但步子是稳的，每一步都踩在她看好的位置上。' },
        { type: 'thought', text: '跟着我。\n\n来跟着我。\n\n你靠阵续力——\n出了阵圈，你什么都没有。' },

        { type: 'narration', text: '被贪婪驱动的东西，看见比阵里那个少女更好的容器往外跑，哪里会不追——它跟着苏鸢，踩过符线，踩过阵的外圈，往外冲来。' },

        { type: 'narration', text: '苏鸢举起那枚铜符，没有摔，只是正面对着那个东西，声音平稳：' },
        { type: 'dialogue', speaker: '苏鸢', text: '你出来了。' },
        { type: 'narration', text: '那少女冲上来，但速度已经不到刚才的一半，苏鸢侧身，把玉坠往地上一按——姐姐出来了，只一瞬，像一道冷光穿过那个东西的核心——' },
        { type: 'narration', text: '它散了，从那少女身上剥落，往四处飘散，无声无息。' },
        { type: 'narration', text: '少女跪下去，痛哭。' },
        { type: 'narration', text: '苏鸢站在那里，把铜符攥在手心，回头，正好对上沈时序的目光。' },

        { type: 'narration', text: '他看着她，眼神里有什么东西，是苏鸢在他脸上第一次看见的——' },
        { type: 'atmos', text: '不是意外，是某种更深的、需要重新校准的认识。' },
        { type: 'dialogue', speaker: '沈时序', text: '你把它引出来的。' },
        { type: 'dialogue', speaker: '苏鸢', text: '它太贪了。' },
        { type: 'narration', text: '沈时序沉默了一会儿，然后，极轻地，笑了一下。' },
        { type: 'narration', text: '苏鸢第一次见他笑，是那种发自某个深处的、没有防备的笑，只持续了一秒，就收回去了，但苏鸢看见了。' },
        { type: 'thought', text: '沈时序，\n\n你这一笑，\n比你所有的温和，\n都更真实一点。\n\n我记住了。' },
      ],
      choices: [
        { text: '继续——两人并肩离开火场，走向第三幕', next: 96 },
      ]
    },

    // Scene 96: 火场后·走向第三幕
    96: {
      chapter: '第二幕半 · A线 · 火场之后',
      content: [
        { type: 'location', text: '城西街道 · 火场外 · 亥时末' },
        { type: 'narration', text: '火场的余烟还在散，人群开始慢慢回来，嘈杂声、哭声、重新涌上来。' },
        { type: 'narration', text: '苏鸢和沈时序并排站在人群外缘，谁都没有急着走。' },

    // Scene 17
    17: {
      chapter: '第三幕 · A线 · 典中典',
      chapterShort: '第三幕',
      content: [
        { type: 'chapter-title', text: '第三幕', sub: '— 典中典 —' },
        { type: 'location', text: '清源书院 · 夫子办公处外走廊 · 某日午后' },
        { type: 'narration', text: '消息是沈时序带来的，说得很简短：' },
        { type: 'dialogue', speaker: '沈时序', text: '贺崇玄上月向书院捐了一批藏书，其中有一册是手稿，登记名目是《杂谈录》，但我翻过——不是杂谈。' },
        { type: 'narration', text: '苏鸢当时正在整理笔记，笔尖停了一下，没有抬头。' },
        { type: 'dialogue', speaker: '苏鸢', text: '在哪里？' },
        { type: 'dialogue', speaker: '沈时序', text: '已经被移入书院特藏室，非夫子级别不得借阅。' },
        { type: 'narration', text: '苏鸢这才抬起头，看了他一眼。' },
        { type: 'dialogue', speaker: '苏鸢', text: '所以你来找我，是因为——' },
        { type: 'dialogue', speaker: '沈时序', text: '苏夫子与你交好，他有特藏室的钥匙。' },
        { type: 'narration', text: '苏鸢低下头，继续写她的字，嘴角微微动了一下。' },
        { type: 'thought', text: '他把棋路推得很清楚。\n\n苏夫子护我，愿意帮我。\n而他没有这层关系。\n\n所以他需要我。\n\n……好，我也需要那本手稿。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '当日傍晚，苏鸢去找了苏夫子，说想查阅一批旧藏，为的是一篇课论，言辞恳切，眼神里带了三分认真七分软糯。' },
        { type: 'narration', text: '苏夫子果然没有多问，亲自带她进了特藏室，嘱咐她小心翻阅，便退出去等着。' },
        { type: 'narration', text: '苏鸢在书架间走了一圈，找到了那册登记为《杂谈录》的手稿。' },
        { type: 'narration', text: '她抽出来，翻开第一页。' },
        { type: 'atmos', text: '封面内侧，用极细的小字写着四个字——' },
        { type: 'atmos', text: '「寄魂典·续」' },
        { type: 'narration', text: '苏鸢的呼吸放得很轻很轻。' },
        { type: 'narration', text: '她站在特藏室的昏黄灯光里，一页一页地翻。' },
        { type: 'narration', text: '文字是贺崇玄的笔迹，她认得，在贺府正堂见过他写的匾额。苍劲，有力，每一个字都像是钉进纸里的。' },
        { type: 'narration', text: '内容分三部分。' },
        { type: 'narration', text: '第一部分，是理论：灵异体的成因，魂魄附体的条件，寄宿多枚魂魄对宿主体质的影响。' },
        { type: 'narration', text: '第二部分，是实验记录：编了号，有日期，有简要描述，像账本，又像档案。' },
        { type: 'narration', text: '苏鸢一条一条地看，手指在纸页上滑过，每滑过一条，她心里的某个地方就沉一分。' },
        { type: 'thought', text: '第一例……第三例……第九例……\n\n宿主存活率，全是零。\n\n全是零。\n\n每一例都是女性，年龄在十七到二十二岁之间。\n\n他在找什么？\n他一直在找什么？' },
        { type: 'narration', text: '然后她翻到了第三部分。' },
        { type: 'narration', text: '第三部分只有一页，墨迹比前面更新，像是近期才写的。' },
        { type: 'narration', text: '上面只有几行字：' },
        { type: 'atmos', text: '「理论已成，差最后一步。灵异体必须是自愿献魂，方可完成转生。强迫者，魂魄离体，宿主必死。自愿者，魂魄残留，可供续命。已觅得合适之人，体内寄魂数量为历次最多，若能成事，此典可终。」' },
        { type: 'narration', text: '苏鸢把这一页看了很久。' },
        { type: 'narration', text: '久到特藏室外苏夫子轻轻叩了两下门，问她好了没有。' },
        { type: 'narration', text: '她深吸一口气，把手稿放回原处，理了理衣袖，走出去，对苏夫子露出一个感激的笑。' },
        { type: 'dialogue', speaker: '苏鸢', text: '找到了，谢谢夫子。' },
        { type: 'thought', text: '自愿献魂。\n\n他需要我自愿。\n\n所以他要我嫁进去，要我信任他，要我心甘情愿地——\n\n……哈。\n\n贺崇玄，你以为你在布局。\n\n但我也是。' },
      ],
      choices: [
        { text: '当晚把内容告诉沈时序——这件事他必须知道。', next: 18 },
        { text: '先不告诉他全部，只说找到了线索——信任是好事，但底牌要留着。', next: 19 },
      ]
    },
    // Scene 18
    18: {
      chapter: '第三幕 · A线 · 典中典',
      content: [
        { type: 'location', text: '书院后园 · 夜' },
        { type: 'narration', text: '她把那几行字一字不差地背给沈时序听。' },
        { type: 'narration', text: '背完，停口，等他反应。' },
        { type: 'narration', text: '沈时序坐在石凳上，两手交握，低着头，很长时间没有说话。' },
        { type: 'narration', text: '夜风把院里的树吹得轻轻响，像有人在远处说话，声音飘散，辨不清字句。' },
        { type: 'narration', text: '然后他抬起头，直接问：' },
        { type: 'dialogue', speaker: '沈时序', text: '你体内，有几枚魂魄？' },
