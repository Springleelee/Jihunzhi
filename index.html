        { type: 'narration', text: '他再开口的时候，声音比平时更低：' },
        { type: 'dialogue', speaker: '沈时序', text: '贺崇玄捐书，把这份手稿放进来——他知道你会看到它。' },
        { type: 'narration', text: '苏鸢的眼神微微一变。' },
        { type: 'thought', text: '……对。\n\n他知道苏夫子护我。\n他知道我有能力拿到特藏室的东西。\n\n他故意让我看见。\n\n这不是疏漏，这是——邀请。\n\n「自愿」。\n\n他要让我自己走进去。' },
        { type: 'dialogue', speaker: '苏鸢', text: '他在给我看筹码。让我知道他要什么，再让我自己选。' },
        { type: 'dialogue', speaker: '沈时序', text: '是。' },
        { type: 'narration', text: '他站起来，在原地走了两步，像是在压着什么，然后转过身，正对着她：' },
        { type: 'dialogue', speaker: '沈时序', text: '苏鸢，我有一件事必须告诉你。' },
        { type: 'narration', text: '他第一次叫她的名字，不是"苏姑娘"。' },
        { type: 'narration', text: '苏鸢注意到了，但没说什么，只是看着他。' },
        { type: 'dialogue', speaker: '沈时序', text: '我们查过贺崇玄过去二十年的案子，失踪女性，共记录在册的有十九例，其中有名有姓可追查的，十一例。' },
        { type: 'narration', text: '他顿了一下。' },
        { type: 'dialogue', speaker: '沈时序', text: '十一例里，有一个姓苏的，二十三岁，失踪于十年前，籍贯与你相同。' },
        { type: 'narration', text: '苏鸢站在那里，一动不动。' },
        { type: 'narration', text: '夜风又来了，把她鬓边的碎发吹起来，她没有去理。' },
        { type: 'thought', text: '十年前。\n\n十年前，家里出事。\n\n官府说姐姐失踪，什么都查不到，娘也病倒了。\n我那时候太小，太病，什么都记不清楚。\n\n但她的魂留下来了。\n她留在我身上，没有走。\n\n如果那不是意外……\n\n如果那是实验……\n\n第几例，姐姐，你是第几例。' },
        { type: 'narration', text: '她没有哭，眼眶也没有红，她只是把掌心里那枚玉坠攥得更紧，然后，轻轻地，开口：' },
        { type: 'dialogue', speaker: '苏鸢', text: '……是我姐姐。' },
        { type: 'narration', text: '沈时序没有说"对不起"，没有说"节哀"，他只是沉默地站着，然后缓缓走近一步，把手轻轻放在她握着玉坠的手背上。' },
        { type: 'narration', text: '不是握，只是放着，温热的，有重量的。' },
        { type: 'atmos', text: '就这样。' },
        { type: 'thought', text: '沈时序。\n\n……谢谢你，没有说废话。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '片刻后，苏鸢把手抽回来，抬起头，眼神已经是平的。' },
        { type: 'dialogue', speaker: '苏鸢', text: '我打算假装接受他的邀请，嫁进去。以退为进，从内部找他的东西。' },
        { type: 'narration', text: '沈时序的眉头微微皱了一下，很快松开。' },
        { type: 'dialogue', speaker: '沈时序', text: '危险。' },
        { type: 'dialogue', speaker: '苏鸢', text: '我知道。' },
        { type: 'dialogue', speaker: '沈时序', text: '……我会在外面。' },
        { type: 'narration', text: '他说得简短，但苏鸢听懂了。' },
        { type: 'thought', text: '他说"我会在外面"——\n\n不是"我们会查的"，不是"镇异司会介入"，\n\n是"我"。\n\n……\n\n沈时序，你这个人，说话很有意思。' },
      ],
      choices: [
        { text: '「我需要一个暗号，出事了我联系你。」——开始正式部署。', next: 20 },
        { text: '「沈师兄，你查贺家的私事——是不是也和失踪的人有关？」——现在问他。', next: 20 },
      ]
    },
    // Scene 19
    19: {
      chapter: '第三幕 · A线 · 典中典',
      content: [
        { type: 'location', text: '书院后园 · 夜' },
        { type: 'narration', text: '她只说找到了线索，说贺崇玄的手稿里有实验记录，说"自愿"是关键，没有把最后那几行字完整地说出来。' },
        { type: 'narration', text: '沈时序听完，沉默了一阵，点头。' },
        { type: 'dialogue', speaker: '沈时序', text: '能进特藏室看到原稿，已经足够。你记住了多少？' },
        { type: 'dialogue', speaker: '苏鸢', text: '足够用的部分。' },
        { type: 'narration', text: '她这样说，沈时序没有追问，只是"嗯"了一声。' },
        { type: 'narration', text: '但他停顿了一下，然后说：' },
        { type: 'dialogue', speaker: '沈时序', text: '我也有一件事，本来打算今晚告诉你，但……你如果现在不想听，可以等。' },
        { type: 'narration', text: '苏鸢抬眼看他。' },
        { type: 'thought', text: '他也在留底牌。\n\n或者……他是在给我选择。\n\n这个人，从来不逼人。' },
        { type: 'dialogue', speaker: '苏鸢', text: '说吧。' },
        { type: 'narration', text: '于是沈时序说了——关于十九例失踪女性，关于那个姓苏的，二十三岁，十年前失踪，籍贯与她相同。' },
        { type: 'narration', text: '苏鸢听完，坐着，没有动。' },
        { type: 'narration', text: '她不知道她在想什么，思绪像水，往四面散开，又往一个地方聚拢，聚拢成一个她早就猜到、却一直没有证实的答案。' },
        { type: 'thought', text: '姐姐。\n\n原来是这样。\n\n原来一直是这样。' },
        { type: 'narration', text: '她没有把"那是我姐姐"说出来。' },
        { type: 'narration', text: '只是低下头，说了句：' },
        { type: 'dialogue', speaker: '苏鸢', text: '……我知道了。谢谢你告诉我。' },
        { type: 'narration', text: '沈时序看着她低垂的发顶，没有说话。' },
        { type: 'narration', text: '他大约是猜到了什么，但他没有问，只是在她身旁坐下来，陪着沉默。' },
        { type: 'atmos', text: '夜风把灯火吹得一晃一晃，两个人影靠得不远不近。' },
        { type: 'thought', text: '他猜到了。\n\n他猜到那个苏姓女子和我有关，但他没有追问。\n\n……\n\n沈时序，你这个人，\n有时候沉默比说话更难让人防备。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '沉默了一阵之后，苏鸢先开口：' },
        { type: 'dialogue', speaker: '苏鸢', text: '我打算回贺家，用退亲未成做借口，重新靠近贺崇玄。从内部查。' },
        { type: 'dialogue', speaker: '沈时序', text: '危险。' },
        { type: 'dialogue', speaker: '苏鸢', text: '但快。' },
        { type: 'narration', text: '沈时序看着她，然后，低声：' },
        { type: 'dialogue', speaker: '沈时序', text: '我会在外面等你的消息。' },
        { type: 'thought', text: '……"等你"。\n\n不是"等消息"，是"等你"。\n\n他大概没注意到他说漏了一个字。\n\n我注意到了。' },
      ],
      choices: [
        { text: '「沈师兄，我们定一个暗号。」——开始部署，准备入局。', next: 20 },
      ]
    },
    // Scene 20
    20: {
      chapter: '第三幕 · A线 · 典中典',
      content: [
        { type: 'location', text: '书院后园 · 夜 · 入局前夕' },
        { type: 'narration', text: '暗号定得很简单。' },
        { type: 'narration', text: '若苏鸢在书院留言板上留下一支插着红纸的笔，意味着平安；若改成白纸，意味着需要接头；若无任何留置超过三日，沈时序便主动介入。' },
        { type: 'narration', text: '说完，沈时序从袖中取出一枚铜扣，放在她掌心。' },
        { type: 'narration', text: '就是那枚她第一次在他便服上见过的、刻着暗纹的铜扣。' },
        { type: 'dialogue', speaker: '沈时序', text: '若遇危急，把这个摔碎，我那边会收到信号。' },
        { type: 'narration', text: '苏鸢低头看那枚铜扣，翻了个面——背后刻着两个字，她认不出来，像是某种门派的徽记。' },
        { type: 'thought', text: '信号？\n\n这不是寻常衙门的器物。\n\n这个纹样……某个门派，势力不小。\n\n沈时序，你背后站着什么人？' },
        { type: 'narration', text: '她把铜扣握进掌心，没有问，只是点了头。' },
        { type: 'narration', text: '沈时序站起来，准备离开，走了两步，忽然停住，背对着她，说：' },
        { type: 'dialogue', speaker: '沈时序', text: '苏鸢，进了那个宅子，记得……' },
        { type: 'narration', text: '他停顿了一下，像是在找措辞。' },
        { type: 'dialogue', speaker: '沈时序', text: '记得留着自己。' },
        { type: 'narration', text: '不是"小心"，不是"保重"，是"留着自己"。' },
        { type: 'narration', text: '苏鸢坐在石凳上，愣了一瞬。' },
        { type: 'narration', text: '然后她开口，声音很轻，连她自己都没意识到，那个软糯的、惯常的腔调，这一刻完全消失了——' },
        { type: 'dialogue', speaker: '苏鸢', text: '……好。' },
        { type: 'narration', text: '沈时序走了。' },
        { type: 'narration', text: '苏鸢一个人坐在后园里，把那枚铜扣握在手心，和玉坠放在一起，一个凉，一个温。' },
        { type: 'thought', text: '"留着自己"。\n\n……\n\n沈时序。\n\n我已经很久很久，没有人这样跟我说话了。\n\n不是叫我小心，不是叫我忍耐，\n不是叫我哭给别人看，不是叫我装。\n\n只是说——留着自己。\n\n……\n\n这很危险。\n\n不是他危险，是这句话危险。\n\n让我心里松动了一点点的东西，才是最危险的。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '翌日，苏鸢以"重新考虑婚事"为由，托苏夫子递了一封信到贺府。' },
        { type: 'narration', text: '贺崇玄的回信来得极快，墨迹甚至还带着未干的温度，像是早就等着。' },
        { type: 'narration', text: '信上只有一句话：' },
        { type: 'atmos', text: '「丫头，老夫等你。」' },
        { type: 'narration', text: '苏鸢把信看了一遍，折好，压在砚台下，嘴角慢慢弯起来——' },
        { type: 'narration', text: '不是软的笑，是冷的。' },
        { type: 'thought', text: '好。\n\n贺崇玄，我来了。\n\n你等着吧。' },
        { type: 'div', text: '· 第三幕 A线 完 ·' },
        { type: 'atmos', text: '苏鸢即将踏入贺府，深入虎穴。' },
        { type: 'atmos', text: '而她掌心里，一枚铜扣，一枚玉坠——一个是仇，一个是……' },
        { type: 'atmos', text: '暂时还不确定是什么。' },
      ],
      choices: [
        { text: '今夜传递名单——时间紧迫，去镇异司。', next: 102 },
        { text: '再等一日——入府前，先想清楚每一步。', next: 103 },
      ]
    },
    // Scene 102: 沈×？·正面交锋（苏鸢传名单夜）
    102: {
      chapter: '第三幕 · A线 · 两强相遇',
      chapterShort: '第三幕',
      content: [
        { type: 'location', text: '镇异司·分堂外院·夜' },
        { type: 'narration', text: '苏鸢把名单副本交给沈时序的那个夜晚，并不平静。' },
        { type: 'narration', text: '她刚走进镇异司的外院，就察觉出气氛不对。' },
        { type: 'narration', text: '徐霜站在廊下，刀出了半鞘，手按在刀背上，眼睛一动不动地往院子中央钉。阿朔不见踪影，符筒架被搬开，地上有一道临时画的阵纹，朱砂还没干，像刚刚来得及。' },
        { type: 'narration', text: '苏鸢在门廊的阴影里停下，没有出声，先看。' },
        { type: 'narration', text: '院子中央，沈时序站着，公服，束发，右手垂在侧，没放在剑柄上——但那个垂着的姿势，是随时可以出剑的姿势，苏鸢已经认得了。' },
        { type: 'narration', text: '他对面，站着一个苏鸢见过的人。' },
        { type: 'thought', text: '……他来这里做什么。' },
        { type: 'narration', text: '那个人在有灯光的地方，比在巷子阴影里，更像某种不属于这里的东西。黑发在夜风里微微动，那双暗红色的眼睛，在火光下比白天更深，更不透光，像两口没有底的深井，照进去是红色，往里看不见边。' },
        { type: 'narration', text: '他比沈时序高出将近一头，肩背舒展，没有戒备的姿态，像来拜访的客人——但那种漫不经心，比任何一种正面的压迫都更叫人难以把握。' },
        { type: 'narration', text: '苏鸢看了一眼沈时序。' },
        { type: 'narration', text: '沈时序的下颌线是绷的，眼神沉，在打量，在评估——那是苏鸢见过他在遇见真正棘手之事时才会有的表情，不是惊，是那种需要重新校准判断的认真。' },
        { type: 'thought', text: '沈时序……在谨慎对待他。\n\n不是因为他有武器，不是因为他做了什么威胁的动作——\n是因为他本身，\n就是一种需要谨慎对待的存在。\n\n而院子里的阵纹，徐霜出了半鞘的刀——\n镇异司的人感觉到了，\n他身上有某种东西，\n不在她们平时处理的那个范畴里。\n\n这不是第一次见面。\n他们之间已经有过什么了。' },
        { type: 'narration', text: '那个人先开口，声音低，带着某种苏鸢在他身上一直感觉到的那种东西——不急，不催，像从很远的地方走来，路上的事都看过了，所以不必急：' },
        { type: 'dialogue', speaker: '？', text: '沈队长，我来送一样东西，不是来打架的。' },
        { type: 'dialogue', speaker: '沈时序', text: '你踏进这个院子的方式，不像来送东西的。' },
        { type: 'dialogue', speaker: '？', text: '正门有阵，我走正门会触它，对你们不好。所以从侧边进来。' },
        { type: 'narration', text: '沈时序沉默了一下，那种沉默是在推演他说的是否为真。' },
        { type: 'dialogue', speaker: '沈时序', text: '你认识那道阵？' },
        { type: 'dialogue', speaker: '？', text: '那道阵的原型，是三百年前某个人画的，那个人是我见过的。' },
        { type: 'narration', text: '徐霜的手，按刀按得更紧了一分。' },
        { type: 'narration', text: '苏鸢站在廊下，把这句话在心里过了一遍——三百年前见过的人，今日还活着。' },
        { type: 'thought', text: '……那个人。\n\n你到底是什么。\n\n不是人。\n\n至少不只是人。\n\n你游走在现世和某个别处之间——\n我一直知道，但今晚这句话，\n把那个"知道"变成了真实的重量。' },
        { type: 'narration', text: '沈时序的表情没有太大变化，只是眼神里沉了一层，他问：' },
        { type: 'dialogue', speaker: '沈时序', text: '你来送什么？' },
        { type: 'narration', text: '那个人从袖里取出一张纸，折叠的，放在旁边的石台上，没有走近，没有递过去，只是放下：' },
        { type: 'dialogue', speaker: '？', text: '贺崇玄名单上，有几个人，你镇异司的档案里查不到，因为他们用的不是真名。这是真名对照，以及现在的住址。' },
        { type: 'narration', text: '沈时序没有立刻去拿那张纸，只是看着他：' },
        { type: 'dialogue', speaker: '沈时序', text: '你为什么帮我们。' },
        { type: 'narration', text: '那个人侧过脸，那双暗红色的眼睛在夜里看起来比白天更深，更不透光。他的视线没有在沈时序身上停留，而是往苏鸢藏身的廊下扫了一眼——' },
        { type: 'narration', text: '直接，精准，落在苏鸢的脸上。' },
        { type: 'narration', text: '苏鸢没有动。' },
        { type: 'dialogue', speaker: '？', text: '不是帮你们。' },
        { type: 'narration', text: '他转回头，对沈时序说，声音里有一点什么，是苏鸢第一次在他身上听见的某种……确定：' },
        { type: 'dialogue', speaker: '？', text: '是有人，在做一件对的事。我不想让她绊在那些不必要的麻烦上。' },
        { type: 'narration', text: '说完，他转身，往院门方向走，走过阵纹的时候，绕开了，一步不差。' },
        { type: 'narration', text: '走到门口，没有回头：' },
        { type: 'dialogue', speaker: '？', text: '沈时序，你护得住她进贺府，护不住她在阵心的那一刻。那一刻，她只能靠自己。' },
        { type: 'narration', text: '然后人就走了，走进夜里，灯光够不到的地方，消失了。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '院子里沉默了片刻。' },
        { type: 'narration', text: '沈时序走到石台边，把那张纸拿起来，看了一眼，折好放进袖里，然后抬头，看向廊下：' },
        { type: 'dialogue', speaker: '沈时序', text: '进来吧。' },
        { type: 'narration', text: '苏鸢从阴影里走出来，走到他面前，把那份名单副本递给他。' },
        { type: 'narration', text: '两人谁也没有先提那件事，像是默契地，先搁在一边。' },
        { type: 'narration', text: '沈时序接过名单，低头看，看了很长时间，然后抬起头：' },
        { type: 'dialogue', speaker: '沈时序', text: '苏鸢，你认识他。' },
        { type: 'narration', text: '不是问句。' },
        { type: 'narration', text: '苏鸢看着他，停了一下：' },
        { type: 'dialogue', speaker: '苏鸢', text: '不认识。但……有一种奇怪的感觉，好像在哪里见过。' },
        { type: 'narration', text: '沈时序又看了她一会儿，眼神里有什么东西，没有说出来，只是把名单收好：' },
        { type: 'dialogue', speaker: '沈时序', text: '……知道了。' },
        { type: 'thought', text: '他没有再追问。\n\n他在做一个判断——\n那个人来送消息，帮的是我们，\n他用了\"她\"这个字。\n\n沈时序，你现在心里在想什么。\n\n……\n\n我也在想。\n\n那个人说\"护不住她在阵心的那一刻\"——\n他知道我要进贺府。\n他知道仪式需要我在阵心。\n\n他知道多少。\n\n他一直在什么地方，看着这一切。' },
      ],
      choices: [
        { text: '继续——入虎穴前，最后一夜', next: 22 },
      ]
    },

    // Scene 103: 再等一日·番外视角·某人所见
    103: {
      chapter: '第三幕 · A线 · 番外·某人所见',
      chapterShort: '番外',
      content: [
        { type: 'chapter-title', text: '番外', sub: '— 某人所见 —' },
        { type: 'location', text: '城中某处高处·夜·入贺府前两日' },
        { type: 'atmos', text: '以下是他的视角，不是她的。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '那个人站在屋脊上，看着那个院子。' },
        { type: 'narration', text: '不是在监视，只是看——他看过太多事，太多人，大多数看一眼就算了，因为大多数的人和事都会自己走向它们注定去的地方，不需要他做什么。' },
        { type: 'narration', text: '但这个女孩，他已经看了很长时间了。' },
        { type: 'thought', text: '苏鸢。\n\n我见过她姐姐。四年前，苏霜临死前最后那口气，问我能不能等一个人。\n\n我说能。\n\n我以为等来的会是另一个悲恸的、自毁式的、把自己也烧进去的女孩。\n\n但她不是。\n\n她进了贺府，进了最危险的地方，\n从第一天起，那双眼睛里就从没有乱过。\n\n悲恸是有的，很深，沉在最下面，\n但它没有烧她——它被她用来磨刀。' },
        { type: 'narration', text: '院子里，沈时序从屋里出来，递给苏鸢一盏灯，两人站在走廊下说话，声音很低，他听不清，也没有想听。' },
        { type: 'narration', text: '他看着沈时序侧过脸，看苏鸢的那一眼。' },
        { type: 'thought', text: '沈时序。\n\n镇异司这一代最好的人，古老门派的接班人，\n剑术，异术，判断力，全是顶的。\n\n他护得住她从外面推进去。\n\n但阵心那一刻——\n那是苏鸢和寄在她身上的那些魂魄之间的事，\n也是苏鸢和贺崇玄之间的事。\n\n那一刻，没有人进得去。\n\n进得去的，只有一种东西。' },
        { type: 'narration', text: '他低头，看了看自己的手——白的，长的，带着他自己也说不清从哪里来的那股若有若无的气息，不冷，不暖，是某种穿过了很多层的东西之后剩下来的颜色。' },
        { type: 'thought', text: '锁。\n\n人间把我叫做锁——\n是因为我挡在现世和那个地方之间，\n什么都过不来，什么都出不去。\n\n但锁需要钥匙。\n\n有些东西，只有钥匙才能真正触碰锁的机关。\n\n……苏鸢，\n你知不知道——\n你体内那些魂魄，\n是我见过的最特殊的灵异体集合，\n你来找我，是因为你姐姐，\n但你触到我的方式，\n不像是普通的人碰上普通的锁。\n\n你像一把真正的钥匙，\n不是插进来的，\n是原本就属于这里的。\n\n这件事，我不打算告诉你。\n\n至少现在不说。\n\n因为有些事，说了，就会改变它本来的走向。' },
        { type: 'narration', text: '院子里，苏鸢抬起头，往他站的方向看了一眼——不是看见他，只是某种感应，让她往那个方向看。' },
        { type: 'narration', text: '她的眼神在他藏身的屋脊上停了一下，然后移开，重新低头，和沈时序说话。' },
        { type: 'thought', text: '……她感应到了。\n\n只是没有说出来。\n\n苏鸢。' },
        { type: 'atmos', text: '他在屋脊上坐下来，把腿垂在檐边，抬头看了看夜空——夜够深，够暗，够安静。' },
        { type: 'atmos', text: '他决定，今晚再等一会儿。' },
        { type: 'div', text: '· 番外 · 完 ·' },
      ],
      choices: [
        { text: '继续——入虎穴前，最后一夜', next: 22 },
      ]
    },

    // Scene 21
    21: {
      chapter: '番外 · 沈时序',
      chapterShort: '番外',
      content: [
        { type: 'chapter-title', text: '番外', sub: '— 沈时序的那一夜 —' },
        { type: 'location', text: '书院 · 沈时序居所 · 深夜' },
        { type: 'narration', text: '沈时序回到自己的屋子，在桌前坐下，把灯拨亮，取出一本薄册，在最新一页写下今日的记录。' },
        { type: 'narration', text: '字迹工整，措辞克制，写的是线索，是进展，是下一步的计划。' },
        { type: 'narration', text: '写完，他放下笔，手指轻轻敲了敲桌面。' },
        { type: 'narration', text: '然后他翻到前一页，看了看上面一行字：' },
        { type: 'atmos', text: '「实验体第十一例，苏氏，二十三岁……」' },
        { type: 'narration', text: '他把册子合上。' },
        { type: 'narration', text: '窗外有风，把院里的树压得轻轻弯了一下。' },
        { type: 'narration', text: '他想起苏鸢今晚听完那件事之后的模样——没有哭，没有崩溃，只是低着头，说了声"我知道了"。' },
        { type: 'thought', text: '……苏鸢。' },
        { type: 'narration', text: '他在镇异司的档案里见过这个姓氏。' },
        { type: 'narration', text: '苏氏，二十三岁，实验记录第十一例——那是姐姐的档案，他查到的时候已经是三年前的旧案，痕迹收得很干净。' },
        { type: 'narration', text: '然后他见到了苏鸢，在书院，在人群里，低着头，一副怯懦无害的样子。' },
        { type: 'narration', text: '但他第一眼就知道——那副样子，不是她真正的样子。' },
        { type: 'thought', text: '苏氏，两姐妹。\n\n姐姐已经不在了。\n\n而妹妹来到了清源书院，嫁给了贺珩，\n进了贺家的门——\n\n……不是巧合。\n\n她在查什么，她心里清楚。\n\n但是还有一件事，\n一件他没有办法直接告诉她的事——' },
        { type: 'narration', text: '他把手放在桌面上，低头看着那个姓氏，想起十年前的那个冬夜。' },
        { type: 'thought', text: '十年前，我十二岁。\n\n那晚我跟着师门去参加一场"仪式"，\n没有人告诉我是什么仪式，我只知道要站在外围，不准发问。\n\n后来我听见了声音——柴房方向，有个孩子在咳嗽。\n\n我打开了门。\n\n柜子里缩着一个女孩，烧得滚烫，眼睛睁着，看见我，没有叫，只是盯着我看。\n\n我那时候不知道在做什么，只是把她裹起来，走了很远很远，把她放在巷口，然后跑回去。\n\n后来，那家人的案子被结了，一句"意外"揭过，\n我以为那个孩子死了。\n\n……我以为她死了。' },
        { type: 'narration', text: '他抬起头，窗外什么都没有，只有夜风。' },
        { type: 'thought', text: '她还活着。\n\n她活着，长大了，\n进了贺家的门，\n一步一步走进了这件事的核心。\n\n我不知道她记不记得那夜，\n不知道她有没有看清我的脸。\n\n但我认出她了——\n体内的那种气息，\n众灵渡体质，\n和那晚柜子里那个孩子是一样的。\n\n这件事，我现在不能告诉她。\n时机不到。' },
        { type: 'narration', text: '他在镇异司做了五年，见过形形色色的人，见过真正的恐惧，见过装出来的勇敢，见过被逼到悬崖边才不得不向前走的人。' },
        { type: 'narration', text: '苏鸢不是这些里的任何一种。' },
        { type: 'narration', text: '她是早就选好了方向，只是在等一个时机。' },
        { type: 'narration', text: '她知道自己要去哪里，知道那条路上有什么，知道自己可能付出什么代价——然后她依然走过去，平静地，甚至带着一点点冷意。' },
        { type: 'thought', text: '这样的人，很少见。\n\n也很难……让人不在意。' },
        { type: 'narration', text: '他站起来，走到窗边，推开一条缝，夜风进来，带着书院里松木和旧墨的气息。' },
        { type: 'narration', text: '他想起他说"留着自己"那四个字之后，背后传来的那声"好"。' },
        { type: 'narration', text: '不是应付，不是客套，是真实的、安静的，一个字。' },
        { type: 'thought', text: '她那时候的声音，和平时不一样。\n\n平时是软的，带着一层什么——那层东西不是她的。\n\n那一声"好"，才是她的。' },
        { type: 'narration', text: '沈时序把窗推得更开了一些，靠着窗框，仰头看了一会儿夜空。' },
        { type: 'narration', text: '然后他低下头，自己轻轻笑了一下，笑自己。' },
        { type: 'thought', text: '沈时序，你查案查了五年，\n什么时候开始，注意到一个人说话的腔调了。\n\n……\n\n不好。' },
        { type: 'narration', text: '他把窗关上，回到桌前，把那本薄册收进暗格，吹灯，躺下。' },
        { type: 'narration', text: '闭上眼。' },
        { type: 'atmos', text: '很久之后，才睡着。' },
      ],
      choices: [
        { text: '回到苏鸢视角——【第四幕】踏入贺府', next: 22 },
      ]
    },
    // Scene 22
    22: {
      chapter: '第四幕 · A线 · 入虎穴',
      chapterShort: '第四幕',
      content: [
        { type: 'chapter-title', text: '第四幕', sub: '— 入虎穴 —' },
        { type: 'location', text: '贺府 · 东厢客院 · 入府第一日' },
        { type: 'narration', text: '贺府给她安排的院子在东厢，三间正房，一个小花园，廊下挂了新换的纱灯，像是欢迎，又像是陈设。' },
        { type: 'narration', text: '苏鸢站在院中，打量着四周，把每一扇门、每一条廊道的方向，默默记在心里。' },
        { type: 'thought', text: '东厢离正堂偏远，离贺崇玄的书房更远。\n\n这个位置，方便监视我，不方便我靠近他。\n\n……他把我安置在这里，是谨慎，还是考验？' },
        { type: 'narration', text: '带她入府的是贺府的管事婆子，姓钟，笑起来眼角堆满褶子，看着和气，但苏鸢注意到她的眼神——每隔一段时间，就不动声色地扫她一眼，从头到脚，像是在记录什么。' },
        { type: 'narration', text: '苏鸢对她报以最柔顺的笑。' },
        { type: 'dialogue', speaker: '苏鸢', text: '钟妈妈，老太爷今日可得空？我想去拜见。' },
        { type: 'dialogue', speaker: '钟妈妈', text: '老太爷上午在书房著书，轻易不见人，姑娘先歇着，到了晚饭时分，老太爷自会来请。' },
        { type: 'narration', text: '苏鸢点头，神情乖顺，心里记下：上午著书，书房不开放，晚饭一起——他想在饭桌上观察她。' },
        { type: 'narration', text: '钟妈妈退出去，带上了院门。' },
        { type: 'narration', text: '苏鸢在房间里走了一圈，检查门缝、窗闩、床底，然后在书桌前坐下，把带来的包袱摊开，放出几本书、几支笔，摆成一个认真读书的样子。' },
        { type: 'thought', text: '第一日，不能急。\n\n先让他们看见他们想看的：一个听话的、有点局促的、努力表现的女孩。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '午后，贺珩来了。' },
        { type: 'narration', text: '他站在院门外，像是下了很大的决心才迈进来，手里拎着一个食盒，脸上的表情介于愧疚和尴尬之间，说：今日没穿那些繁复的锦袍，只是一件棠色家常外衫，棕发也只松松束了一半，辫子散了大半，临出门才随手理了理的样子。少了那层华丽包装，眉眼反而更清晰——俊是真俊，只是那双琥珀色的眼睛此刻失了惯常的漫不经心，带着点苏鸢在他脸上少见的东西：认真。' },
        { type: 'dialogue', speaker: '贺珩', text: '厨房做了桂花糕，我……顺路带来的。' },
        { type: 'narration', text: '苏鸢看了他一眼，然后低下头，轻轻说了声谢谢，接过食盒。' },
        { type: 'narration', text: '贺珩站在那里，没有马上走，动了动嘴，最终说：' },
        { type: 'dialogue', speaker: '贺珩', text: '那个……玉坠的事，我是真没想到它那么重要。我爹说——' },
        { type: 'narration', text: '他停了一下。' },
        { type: 'dialogue', speaker: '贺珩', text: '算了，反正我是对不住你。' },
        { type: 'narration', text: '苏鸢把食盒放在桌上，转身，对他露出一个很淡的笑，不软糯，不委屈，只是平平的。' },
        { type: 'dialogue', speaker: '苏鸢', text: '贺公子，你送来了，我收着了。这件事，就到这里吧。' },
        { type: 'narration', text: '贺珩怔了一下，像是没料到她会这样说，又像是卸下了什么，点了点头，走了。' },
        { type: 'thought', text: '贺珩。\n\n你比我以为的，多一点真。\n\n但这不重要。' },
      ],
      choices: [
        { text: '晚饭时，主动在贺崇玄面前展示自己的学识——让他看见他想要的。', next: 23 },
        { text: '晚饭时，继续扮演柔顺怯懦的模样——先让他放松警惕。', next: 24 },
      ]
    },
    // Scene 23
    23: {
      chapter: '第四幕 · A线 · 入虎穴',
      content: [
        { type: 'location', text: '贺府 · 正堂饭厅 · 傍晚' },
        { type: 'narration', text: '饭桌不大，贺崇玄坐在主位，贺珩在侧，苏鸢在对面，三人，安静。' },
        { type: 'narration', text: '贺崇玄举箸之前，随口说了一句：' },
        { type: 'dialogue', speaker: '贺崇玄', text: '丫头，听说你在书院念书，学的什么？' },
        { type: 'narration', text: '苏鸢放下筷子，端正了坐姿，想了一息，开口：' },
        { type: 'dialogue', speaker: '苏鸢', text: '经史、诗文都学一点，但学得最认真的，是老太爷早年写的那本《玄门杂考》。' },
        { type: 'narration', text: '贺崇玄的动作停了一下，抬眼看她。' },
        { type: 'dialogue', speaker: '苏鸢', text: '其中第七章，论及魂魄归处，有一句"魂有余力者，不随体散，择宿而栖"——学生读了很多遍，越读越觉得，这句话不只是玄学，更像是一种……观察所得的结论。' },
        { type: 'narration', text: '贺崇玄放下筷子，身子微微前倾，目光落在她脸上，像是第一次真正把她看进去。' },
        { type: 'dialogue', speaker: '贺崇玄', text: '哦？你如何理解这个"择宿"？' },
        { type: 'thought', text: '来了。\n\n他在问我，也在探我。\n\n我要让他觉得——我懂他，我有价值，我是他著作的知音。\n\n但不能全说，要留一口，让他想继续问。' },
        { type: 'dialogue', speaker: '苏鸢', text: '学生以为，魂魄择宿，不是随机，而是有缘法的——宿主的气场、心念、甚至某些天生的体质，都会成为魂魄驻留的理由。老太爷书里写的是理论，但学生……' },
        { type: 'narration', text: '她停顿了一下，微微低下头，像是在犹豫是否该说。' },
        { type: 'dialogue', speaker: '苏鸢', text: '学生觉得，这不只是理论。' },
        { type: 'narration', text: '这句话说完，饭桌上沉默了三息。' },
        { type: 'narration', text: '然后贺崇玄笑了，那个笑容很深，带着一种苏鸢读不太透的东西。' },
        { type: 'dialogue', speaker: '贺崇玄', text: '好孩子。' },
        { type: 'narration', text: '他说了这三个字，然后重新举起筷子，若无其事地夹了一块鱼，话题翻篇。' },
        { type: 'narration', text: '但苏鸢注意到——他吃饭的时候，一直在笑，那个笑，是满足的。' },
        { type: 'thought', text: '钩放下去了。\n\n他咬住了。\n\n贺崇玄，你以为你在钓我，\n\n但我们两个，谁是鱼，还不一定。' },
      ],
      choices: [
        { text: '饭后主动请求——「老太爷，能否让学生看看您近来著的书？」', next: 25 },
        { text: '饭后退回东厢，今日点到为止——不能急，慢慢来。', next: 25 },
      ]
    },

    24: {
      chapter: '第四幕 · A线 · 入虎穴',
      content: [
        { type: 'location', text: '贺府 · 正堂饭厅 · 傍晚' },
        { type: 'narration', text: '整顿饭，苏鸢几乎没有主动开口。' },
        { type: 'narration', text: '贺崇玄问她几句书院的事，她答得简短，声音软，偶尔抬眼，大多数时候低着头，像一块压在桌角的宣纸，无声无息。' },
        { type: 'narration', text: '贺崇玄看了她几次，神情不好判断——像满意，又像失望，又像在等什么。' },
        { type: 'narration', text: '贺珩坐在一旁，比往常少说了很多话，偶尔看苏鸢一眼，眼神里有些什么，苏鸢没有细究。' },
        { type: 'narration', text: '饭毕，贺崇玄站起身，说了句"好好歇着"，转身往书房去了。' },
        { type: 'narration', text: '苏鸢目送他的背影，在心里数步子——从饭厅到书房，拐两个弯，大约七十步。' },
        { type: 'thought', text: '今日先这样。\n\n让他觉得我平平无奇，放松一些。\n\n明日，再动。' },
        { type: 'narration', text: '她回到东厢，坐在窗边，在小纸条上写下今日观察到的几件事：钟妈妈的巡视规律，书房的灯何时亮何时熄，后院有一扇小门，插销从内侧锁，但锁得不严。' },
        { type: 'narration', text: '写完，把纸条折成一个小小的方块，压进砚台底下。' },
        { type: 'thought', text: '沈时序，你在书院那边，\n应该看见我留的红纸了。\n\n平安。\n\n……今日，平安。' },
      ],
      choices: [
        { text: '翌日——主动找贺崇玄，说想帮他整理书稿。', next: 25 },
      ]
    },
    // Scene 25
    25: {
      chapter: '第四幕 · A线 · 入虎穴',
      content: [
        { type: 'location', text: '贺府 · 贺崇玄书房 · 入府第三日' },
        { type: 'narration', text: '书房的门，是贺崇玄自己开的。' },
        { type: 'narration', text: '他站在门口，把苏鸢从头到脚打量了一眼，然后侧身，让出一条路。' },
        { type: 'dialogue', speaker: '贺崇玄', text: '进来罢。' },
        { type: 'narration', text: '书房很大，书架顶到屋梁，每一格都塞得满满的，有些是印刷的刻本，有些是手稿，有些用布包着，看不出内容。' },
        { type: 'narration', text: '正中一张宽大的书案，案上铺着一张写了一半的纸，墨迹新鲜，旁边压着一摞装订好的册子。' },
        { type: 'narration', text: '苏鸢扫了一眼那摞册子的封面——' },
        { type: 'narration', text: '《寄魂典》，三个字，是贺崇玄自己的笔迹。' },
        { type: 'thought', text: '就是它。\n\n他把它放在最显眼的地方，是给我看的，\n还是他根本不在乎我看见？' },
        { type: 'narration', text: '贺崇玄在书案后坐下，指了指旁边的一把椅子，说：' },
        { type: 'dialogue', speaker: '贺崇玄', text: '坐。你说想帮老夫整理书稿，怎么个整理法？' },
        { type: 'dialogue', speaker: '苏鸢', text: '学生字还算工整，可以誊写；若老太爷不嫌弃，也可以做些校对，找前后文不通之处。' },
        { type: 'narration', text: '贺崇玄沉吟片刻，从那摞《寄魂典》里抽出最下面的一册，递过来。' },
        { type: 'dialogue', speaker: '贺崇玄', text: '这是早年的旧稿，有些页破损了，你先誊一遍。' },
        { type: 'narration', text: '苏鸢接过来，低头翻开，第一页是总纲，文字晦涩，夹杂着大量她在《寄魂典·续》里见过的字符。' },
        { type: 'narration', text: '她认认真真地看，认认真真地誊，一个字一个字地抄进去，像个刻苦的学生。' },
        { type: 'narration', text: '但她的眼睛，在每一行里，都在找——' },
        { type: 'thought', text: '找关键字。\n找仪式流程。\n找"自愿"的具体含义。\n找破解的方法。\n\n他以为我在给他誊书。\n\n我在读他的底牌。' },
        { type: 'narration', text: '誊了约一个时辰，苏鸢停笔，说手腕酸，需要歇一歇。贺崇玄应了，自己继续写他的东西。' },
        { type: 'narration', text: '苏鸢端着茶，眼神不经意地往书架上扫——那几册用布包裹的，放在最高处最角落的，是什么？' },
        { type: 'narration', text: '她在心里记下位置。' },
        { type: 'narration', text: '就在这时，贺崇玄忽然开口，没有抬头，语气随意：' },
        { type: 'dialogue', speaker: '贺崇玄', text: '丫头，你体内，有几个人？' },
        { type: 'narration', text: '苏鸢端茶的手，没有抖。' },
        { type: 'narration', text: '她用了整整两息的时间，让自己的表情从"平静"变成"惊慌"，然后抬起头，睁大眼睛，声音里带了一丝颤：' },
        { type: 'dialogue', speaker: '苏鸢', text: '老……老太爷，您说什么？' },
        { type: 'narration', text: '贺崇玄这才抬起眼，看着她，那双眼睛深沉，像古井，什么都映进去，什么都看不透。' },
        { type: 'dialogue', speaker: '贺崇玄', text: '你体内的魂魄，不止一枚。老夫第一次见你，就察觉了。' },
        { type: 'narration', text: '他说这话的时候，很平静，像在说今日天气。' },
        { type: 'narration', text: '苏鸢盯着他，维持着那副慌乱的神情，心里却在飞速转动。' },
        { type: 'thought', text: '他直接问了。\n\n他已经确认了，不是在探，是在摊牌。\n\n他要让我知道他知道，他要看我怎么反应。\n\n……好。\n\n那我就给他看，他最想看的那种反应。' },
        { type: 'narration', text: '苏鸢慢慢地，把手里的茶放下，低下头，肩膀微微收拢，声音变得很小：' },
        { type: 'dialogue', speaker: '苏鸢', text: '……老太爷，这件事，学生从来没有对人说过。学生自己也不知道……是怎么回事……' },
        { type: 'narration', text: '她的声音里有恰到好处的迷茫和恐惧。' },
        { type: 'narration', text: '贺崇玄看着她，那个深沉的表情里，渗出了一丝苏鸢等待已久的东西——' },
        { type: 'atmos', text: '贪婪。' },
        { type: 'thought', text: '好。\n\n上钩了。' },
      ],
      choices: [
        { text: '顺势落泪，问他「老太爷，您懂这些，能告诉我……我究竟是怎么了吗？」——让他以为你在求他。', next: 26 },
        { text: '欲言又止，把话咽回去，低头不说——让他主动来追问你。', next: 26 },
      ]
    },
    // Scene 26
    26: {
      chapter: '第四幕 · A线 · 入虎穴',
      content: [
        { type: 'location', text: '贺府 · 书房 · 午后' },
        { type: 'narration', text: '无论她选择哪种方式，贺崇玄都接住了。' },
        { type: 'narration', text: '他走到她面前，在她对面的椅子上坐下，语气变得少见的温和，像一个真正慈善的长者：' },
        { type: 'dialogue', speaker: '贺崇玄', text: '丫头，你不用怕。这不是坏事，这是天赋。老夫研究了一辈子，像你这样的人，是极少极少的。' },
        { type: 'narration', text: '他说着，把手放在书案上，指尖轻轻叩了叩那叠《寄魂典》。' },
        { type: 'dialogue', speaker: '贺崇玄', text: '老夫这本书，写了二十年，还差最后一步。你若愿意帮老夫，老夫可以告诉你，你体内那些魂魄，是什么，从哪里来，将来会如何。' },
        { type: 'narration', text: '苏鸢低着头，眼眶微微泛红，轻轻地、缓慢地点了一下头。' },
        { type: 'thought', text: '我知道了，老太爷。\n\n你想用我的秘密，换我的配合。\n\n很好。\n\n那我就配合你。\n\n一直配合，配合到我把你的底全翻出来，\n配合到我把你压在手里那些人的账，\n一笔一笔，都还清。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '此后一个月，苏鸢每日上午去书房誊书，下午在院里读他指定的典籍，偶尔陪他喝茶，偶尔被他考问。' },
        { type: 'narration', text: '她表现得专注，好学，对他充满崇敬，在该发问的时候发问，在该沉默的时候沉默，把那个角色演得无懈可击。' },
        { type: 'narration', text: '她也在同步搜集：书房的格局，那几册布包裹的手稿的内容，地窖的位置，钟妈妈的行动规律，后院小门通往哪里。' },
        { type: 'narration', text: '信息通过留言板上红纸白纸的变换，传递给书院外等候的沈时序。' },
        { type: 'narration', text: '沈时序回传的内容，有时夹在托人带来的书里，有时写在茶楼账单的背面，有时只是一张白纸，上面画着一个方块，意思是：收到了，等你。' },
        { type: 'thought', text: '等你。\n\n……这两个字，\n每次看见，都让我稍微……安稳一点点。\n\n我不想承认这件事。\n但它是真的。' },
        { type: 'narration', text: '然而就在入府第三十二日，苏鸢发现了一件之前没有注意到的事。' },
        { type: 'narration', text: '那天她在书房誊书，贺崇玄出去了片刻，她趁机快速翻看了那几册布包裹的手稿。' },
        { type: 'narration', text: '第一册，是仪式流程，详细，有步骤，有用料，有时辰。' },
        { type: 'narration', text: '第二册，是失败记录——每一例失败的原因分析，密密麻麻，像一本罪册。' },
        { type: 'narration', text: '第三册，她翻开，愣住了。' },
        { type: 'narration', text: '那是一份名单。' },
        { type: 'narration', text: '二十几个名字，有男有女，每个名字旁边，标着一个身份——官员、商贾、门派掌门、某某夫人……' },
        { type: 'narration', text: '名单最下面，有一行字：' },
        { type: 'atmos', text: '「以上诸人，皆受益于此典，皆为保密之担保，若典成，续命之法共享；若典败，灭口之令即发。」' },
        { type: 'narration', text: '苏鸢的手指在那行字上停住。' },
        { type: 'thought', text: '这不只是贺崇玄一个人的事。\n\n这是一张网。\n\n官员、门派、富贾——\n这些人都牵扯在里面，\n都在等着这本书写完，\n都在等着用少女的魂魄续自己的命。\n\n……沈时序。\n\n这件事，比我们以为的大得多。' },
        { type: 'narration', text: '她把那三册手稿放回原处，回到自己的誊写位置，拿起笔，继续一字不差地抄着《寄魂典》。' },
        { type: 'narration', text: '贺崇玄回来，在她对面坐下，满意地看了看她誊写的进度，点了点头。' },
        { type: 'dialogue', speaker: '贺崇玄', text: '好孩子。' },
        { type: 'narration', text: '苏鸢抬头，对他笑了笑。' },
        { type: 'thought', text: '您快写完了吗，老太爷。\n\n写完之前，我要先把那张名单，\n送到沈时序手里。' },
        { type: 'div', text: '· 第四幕 A线 完 ·' },
        { type: 'narration', text: '暗流在贺府深处涌动，而苏鸢，正处在漩涡的正中心。' },
        { type: 'atmos', text: '然而她不知道的是——这一夜，贺府里还有另一双眼睛，也在看着她。' },
      ],
      choices: [
        { text: '【第五幕】那张名单——必须送出去，但该怎么传递？', next: 28 },
        { text: '【番外·危机】那双眼睛是谁的？今夜，有人闯入了东厢。', next: 27 },
      ]
    },
    // Scene 27
    27: {
      chapter: '番外 · 夜闯东厢',
      chapterShort: '番外',
      content: [
        { type: 'location', text: '贺府 · 东厢 · 入府第三十二日 · 子时' },
        { type: 'narration', text: '苏鸢没有睡。' },
        { type: 'narration', text: '她在黑暗里坐着，把今天看到的名单在脑子里过了一遍又一遍，默记每一个名字，每一个身份。' },
        { type: 'narration', text: '子时，窗纸上有一道影子。' },
        { type: 'narration', text: '不是风，是人。' },
        { type: 'narration', text: '苏鸢已经把刀握在手里了。' },
        { type: 'narration', text: '那影子停在窗边，没有立刻动，像是在确认什么，然后，窗从外侧被轻轻推开一道缝——' },
        { type: 'narration', text: '苏鸢侧身，让开窗口正面，等那人翻进来的瞬间，刀抵上去。' },
        { type: 'narration', text: '然后她看见了那人的脸。' },
        { type: 'narration', text: '是沈时序。' },
        { type: 'narration', text: '便服，腰间那枚铜扣，月光里认得清楚。' },
        { type: 'narration', text: '他翻进来，一眼看见刀，没有惊慌，只是轻轻地举了举双手，声音压得极低：' },
        { type: 'dialogue', speaker: '沈时序', text: '是我。' },
        { type: 'narration', text: '苏鸢收刀，退后一步，压着声音，语气比她预想的更冷：' },
        { type: 'dialogue', speaker: '苏鸢', text: '你怎么进来的？' },
        { type: 'dialogue', speaker: '沈时序', text: '后院小门，你上次传出的图里画了位置。' },
        { type: 'narration', text: '她沉默了一秒——是她自己告诉他的路。' },
        { type: 'dialogue', speaker: '苏鸢', text: '出什么事了？' },
        { type: 'narration', text: '沈时序在黑暗里站着，把声音压到最低：' },
        { type: 'dialogue', speaker: '沈时序', text: '名单。你今日看到的那份名单里，有一个人，我认识。' },
        { type: 'narration', text: '苏鸢一怔。' },
        { type: 'dialogue', speaker: '沈时序', text: '是我们门派的一个长老。' },
        { type: 'narration', text: '苏鸢盯着他，半晌，轻轻说：' },
        { type: 'dialogue', speaker: '苏鸢', text: '……所以你的私事，是这个。' },
        { type: 'narration', text: '沈时序没有否认，沉默了一会儿，点头。' },
        { type: 'dialogue', speaker: '沈时序', text: '那个长老，是我师父。' },
        { type: 'narration', text: '又是沉默。' },
        { type: 'narration', text: '月光从窗缝里漏进来一条，落在两人之间的地板上，细而白。' },
        { type: 'narration', text: '苏鸢想起他那晚说的"私事，暂时不说"，想起他说"我会在外面"，想起他第一次叫她名字。' },
        { type: 'thought', text: '他师父。\n\n他在这件事里，也有人要查，也有人要面对。\n\n我们是同路人，比我以为的，还要更深一层。' },
        { type: 'narration', text: '她在黑暗里开口，声音极轻：' },
        { type: 'dialogue', speaker: '苏鸢', text: '沈时序，你师父……你打算怎么办？' },
        { type: 'narration', text: '沈时序低下头，过了很久，说：' },
        { type: 'dialogue', speaker: '沈时序', text: '先把事情查清楚。' },
        { type: 'narration', text: '他抬起头，在月光里，看着苏鸢：' },
        { type: 'dialogue', speaker: '沈时序', text: '我来，是想告诉你——这件事已经不只是我一个人的职责了。我在查它，是因为我非查不可。' },
        { type: 'narration', text: '苏鸢听懂了。' },
        { type: 'narration', text: '他是在说：我不会半途离开。' },
        { type: 'thought', text: '……\n\n沈时序。\n\n你知道吗，\n你每次说话，都比上一次，\n让我更难对你保持距离。' },
        { type: 'narration', text: '他在她屋里站了不到一盏茶的功夫，传递完关键信息，便从原路离去。' },
        { type: 'narration', text: '临走前，他把窗重新合上，停了一秒，没有回头，说：' },
        { type: 'dialogue', speaker: '沈时序', text: '今晚睡不着，也把刀放一放。' },
        { type: 'narration', text: '然后影子消失了。' },
        { type: 'narration', text: '苏鸢站在原地，低头看了看手里的刀，轻轻地，把它放回了枕下。' },
        { type: 'atmos', text: '窗外，月亮还在。' },
      ],
      choices: [
        { text: '【第五幕】天亮了——名单要送出去，仪式的时间在逼近。', next: 28 },
      ]
    },
    // Scene 28
    28: {
      chapter: '第五幕 · A线 · 仪式将近',
      chapterShort: '第五幕',
      content: [
        { type: 'chapter-title', text: '第五幕', sub: '— 仪式将近 —' },
        { type: 'location', text: '贺府 · 东厢 · 入府第三十三日 · 清晨' },
        { type: 'narration', text: '天还没亮透，苏鸢已经坐在桌前，把昨夜记下的名单从记忆里逐字还原，写在一张薄薄的油纸上，字极小，密密麻麻。' },
        { type: 'narration', text: '写完，把油纸叠到指甲盖大小，压进砚台下那块松动的青砖缝里。' },
        { type: 'narration', text: '然后她在留言板上，换上了一张白纸，插了一支笔。' },
        { type: 'thought', text: '白纸——需要接头。\n\n沈时序，你看到了，会来的。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '接头的机会来得出乎意料地顺。' },
        { type: 'narration', text: '午后，贺崇玄说要去拜访一位故交，叫苏鸢同去——说是带她见见世面，实则苏鸢清楚，是要带她出门，观察她与外人的接触。' },
        { type: 'narration', text: '马车经过书院旁的街道时，苏鸢透过车帘的缝隙，看见了街角茶馆门口，有一个穿灰色长衫的人，正低头看一本书。' },
        { type: 'narration', text: '是沈时序。' },
        { type: 'narration', text: '他没有抬头，但他的手指在书页上轻轻敲了两下——收到白纸信号了，他在等。' },
        { type: 'narration', text: '苏鸢的目光在他身上停了不足一秒，然后平静地转回来，对贺崇玄说：' },
        { type: 'dialogue', speaker: '苏鸢', text: '老太爷，街上好热闹。' },
        { type: 'narration', text: '贺崇玄笑了笑，没有疑心。' },
        { type: 'narration', text: '回府途中，马车经过一个摆摊的老妇人，苏鸢说想买两根糖葫芦，贺崇玄叫车停了片刻。' },
        { type: 'narration', text: '苏鸢下车，走向摊子，在掏铜板的间隙，把那张油纸塞进了摊位木架的一个特定缝隙里——这是她和沈时序约好的第二个传递点。' },
        { type: 'narration', text: '她买了糖葫芦，转身回车，咬了一口，甜的。' },
        { type: 'thought', text: '出去了。\n\n名单出去了。\n\n沈时序，接下来，就看你了。' },
      ],
      choices: [
        { text: '当晚之前，沈时序找到她——有话要说。', next: 285 },
      ]
    },
    // Scene 285: A线·第五幕·真相·那双手是你的
    285: {
      chapter: '第五幕 · A线 · 仪式将近',
      content: [
        { type: 'location', text: '贺府 · 偏院 · 傍晚' },
        { type: 'narration', text: '沈时序找到她的时候，苏鸢正在偏院的廊下整理今天取到的两页手稿，听见脚步声，把纸压进袖子里，转过身。' },
        { type: 'narration', text: '他站在那里，没有靠近，只是看着她，神色比平时沉了一些。' },
        { type: 'dialogue', speaker: '沈时序', text: '我有一件事，应该早一点告诉你的。' },
        { type: 'narration', text: '苏鸢等着。' },
        { type: 'narration', text: '沈时序低了一下视线，然后抬起来，直视她：' },
        { type: 'dialogue', speaker: '沈时序', text: '十年前，你家出事的那一夜——是我把你带走的。' },
        { type: 'narration', text: '苏鸢站在那里，没有动。' },
        { type: 'narration', text: '风把廊下挂的旧灯笼吹了一下，灯绳轻轻晃了晃。' },
        { type: 'thought', text: '那双手。\n\n年轻的，稳的，力气不大——少年的手。\n\n……\n\n是他。\n\n我烧着热度，在黑暗里，被他撑着走了很长一段路。\n\n然后他转身走了。\n\n仇人是贺家——\n我一直认准了这一件事，\n从来没有去想过那双手是谁的。\n\n……\n\n是你。' },
        { type: 'narration', text: '她平静地开口，声音没有起伏：' },
        { type: 'dialogue', speaker: '苏鸢', text: '你那时候多大。' },
        { type: 'dialogue', speaker: '沈时序', text: '十二岁。随师门出来，不知道那晚是什么活动，进去之后才发现不对。' },
        { type: 'narration', text: '他停了一下：' },
        { type: 'dialogue', speaker: '沈时序', text: '我那时候没有能力阻止那件事，我能做的，只有把你带出去。' },
        { type: 'narration', text: '苏鸢抬起眼，直视着他，问出来的那句话，她自己都没有想到会这么平静：' },
        { type: 'dialogue', speaker: '苏鸢', text: '那为什么当时没有救我姐姐。' },
        { type: 'narration', text: '沈时序沉默了。很长的沉默，长到廊外的鸟叫了一声，又停了。' },
        { type: 'dialogue', speaker: '沈时序', text: '我那时只救得了一个人。' },
        { type: 'narration', text: '六个字。苏鸢把这六个字在心里放了一会儿，没有说话。' },
        { type: 'thought', text: '他那时候十二岁。\n\n一个十二岁的少年，\n不知道那晚是什么活动，\n进去发现不对，\n在那种情况下能做的，\n只有带走一个人。\n\n只救得了一个人。\n\n……我不知道我现在是什么感觉。\n\n恨他吗——不是。\n他不是那件事的主谋。\n\n感激他吗——我不知道。\n\n我只知道有人选择了我，没有选择姐姐。\n不管那个人是谁，不管他的理由是什么，这件事都是真实的。\n\n……先记着这件事。\n仪式之前，有更重要的事情要做。' },
        { type: 'narration', text: '她最后只说了一句话：' },
        { type: 'dialogue', speaker: '苏鸢', text: '我知道了。' },
        { type: 'narration', text: '然后转身往屋里走。沈时序站在原地，看着她的背影，没有叫住她。' },
        { type: 'narration', text: '她没有哭，没有崩溃，没有质问，没有原谅——只是"我知道了"三个字，然后把这件事压进去了，和所有其他事情一起，变成她要在仪式之前理清楚的某一件。' },
        { type: 'thought', text: '……\n\n沈时序站在廊下，想起十年前那个烧着热度、被他抱着走出巷口的小女孩。\n\n他那时候不知道她叫什么。\n\n现在他知道了。\n\n苏鸢。\n\n她活下来了，活得比他以为的更锋利，更清醒，更有来处。\n\n她以为仇家是贺家——这样也好。\n\n这样，算是再一次保护了她。' },
      ],
      choices: [
        { text: '当晚，贺崇玄找她谈话——《寄魂典》快写完了。', next: 29 },
      ]
    },
    // Scene 29
    29: {
      chapter: '第五幕 · A线 · 仪式将近',
      content: [
        { type: 'location', text: '贺府 · 书房 · 入府第三十三日 · 夜' },
        { type: 'narration', text: '那夜贺崇玄找她来书房，只点了一盏灯，光线昏黄，把那张老人的脸照得深沉。' },
        { type: 'narration', text: '他把《寄魂典》的最后一册放在桌上，推到苏鸢面前。' },
        { type: 'dialogue', speaker: '贺崇玄', text: '写完了。' },
        { type: 'narration', text: '苏鸢看着那本书，呼吸放轻。' },
        { type: 'dialogue', speaker: '贺崇玄', text: '差最后一步。丫头，你知道是什么。' },
        { type: 'narration', text: '他说话的语气，温和，带笑，像在和一个信任的晚辈谈心。' },
        { type: 'narration', text: '苏鸢低下头，沉默了一会儿，然后抬起眼，做出一副经过了长久内心挣扎终于下定决心的神情：' },
        { type: 'dialogue', speaker: '苏鸢', text: '老太爷……您说的最后一步，是要我自愿。' },
        { type: 'narration', text: '贺崇玄的眼里，有什么东西亮了一下。' },
        { type: 'dialogue', speaker: '贺崇玄', text: '你愿意吗？' },
        { type: 'narration', text: '苏鸢看着他，看着他那双深不见底的眼睛，想起那本失败记录，想起十九个名字，想起姐姐，想起那行字——「宿主存活率：零」。' },
        { type: 'narration', text: '然后她，笑了。' },
        { type: 'narration', text: '非常轻，非常浅，像是终于被打动了的、松了口的笑。' },
        { type: 'dialogue', speaker: '苏鸢', text: '……我愿意。' },
        { type: 'thought', text: '我愿意。\n\n贺崇玄，我愿意走进你的仪式，\n走进你布了二十年的局。\n\n然后，在你以为一切都成了的时候——\n\n我来告诉你，我姐姐叫什么名字。\n\n亲手结束这件事。' },
        { type: 'narration', text: '贺崇玄站起来，走到她面前，把手放在她头顶，像是一种祝福，又像是一种封印。' },
        { type: 'dialogue', speaker: '贺崇玄', text: '好孩子。三日后，择吉时，老夫来接你。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '三日。' },
        { type: 'narration', text: '苏鸢回到东厢，在黑暗里坐了很久，把所有的事情在脑子里再过一遍。' },
        { type: 'narration', text: '仪式的流程她已经背熟，破局的方法她推演过不下二十次，体内寄宿的魂魄，她一一和它们确认过——姐姐在，其余的也在。' },
        { type: 'thought', text: '三日。\n\n够了。' },
        { type: 'narration', text: '她在砖缝里取出备用的一张纸，写了两个字，折好，明日放到传递点。' },
        { type: 'atmos', text: '纸上写的是：「三日」。' },
      ],
      choices: [
        { text: '【第六幕·终章】三日后——仪式之夜，破局。', next: 30 },
        { text: '三日内，最后一次见沈时序。', next: 31 },
      ]
    },
    // Scene 30
    30: {
      chapter: '终章 · 仪式之夜',
      chapterShort: '终章',
      content: [
        { type: 'chapter-title', text: '终章', sub: '— 仪式之夜 —' },
        { type: 'location', text: '贺府 · 地下密室 · 三日后 · 亥时' },
        { type: 'narration', text: '密室在贺府正堂之下，入口藏在书房地板的暗格里，苏鸢早就知道在哪里。' },
        { type: 'narration', text: '贺崇玄亲自来接她，他今日换了一件深色的长袍，头发梳得一丝不苟，整个人像是完成了某种准备，焕发着一种苏鸢只在野心得偿时才见过的神采。' },
        { type: 'narration', text: '密室里，点了十二盏灯，灯油里加了什么，光是红的，把整个房间染成血色。' },
        { type: 'narration', text: '地上，是那个招魂阵，比废宅地窖里的更大，更完整，朱砂鲜艳，像是刚画好不久。' },
        { type: 'narration', text: '苏鸢站在阵的边缘，低着头，任由钟妈妈给她换上一件白色的衣裳。' },
        { type: 'thought', text: '白色。\n\n他们给实验体穿白色。\n\n……姐姐，你当年，也穿了白色吗。' },
        { type: 'narration', text: '贺崇玄站在阵的对面，打开《寄魂典》，翻到最后一页，开始诵读。' },
        { type: 'narration', text: '那是一种苏鸢听不懂的语言，古老，低沉，像是从地底生长出来的声音。' },
        { type: 'narration', text: '她体内的魂魄开始躁动，一个接一个，像被呼唤，像在挣扎，像在告诉她什么。' },
        { type: 'narration', text: '苏鸢闭上眼，在心里，轻轻地叫了一声：' },
        { type: 'thought', text: '姐姐。' },
        { type: 'narration', text: '姐姐的魂应了。暖的，熟悉的，是她记忆里最早的气息。' },
        { type: 'narration', text: '贺崇玄诵读的声音越来越快，阵上的朱砂开始发光，红光沿着纹路蔓延，像流动的血。' },
        { type: 'narration', text: '苏鸢站在阵心，睁开眼。' },
        { type: 'narration', text: '然后她从袖中，取出了那枚沈时序给她的铜扣。' },
        { type: 'narration', text: '贺崇玄的诵读声停住了，他抬起眼，对上苏鸢的目光。' },
        { type: 'narration', text: '那双眼睛，和入府第一日一模一样——' },
        { type: 'narration', text: '但那时候他看见的是猎物，而此刻，他看见的，是另一种东西。' },
        { type: 'dialogue', speaker: '贺崇玄', text: '……你——' },
        { type: 'dialogue', speaker: '苏鸢', text: '老太爷。' },
        { type: 'narration', text: '她的声音是平的，那个软糯的、怯懦的、惯常的腔调，彻底消失了。' },
        { type: 'dialogue', speaker: '苏鸢', text: '您的《寄魂典》，写了二十年。失败了二十几次。第十一例，姓苏，二十三岁，是我姐姐。' },
        { type: 'narration', text: '贺崇玄的脸色变了。' },
        { type: 'dialogue', speaker: '苏鸢', text: '您知道她死的时候，魂魄没有散，留在了我身上吗？她一直在我这里，看着我长大，看着我进这所书院，看着您亲自挑中了我。' },
        { type: 'narration', text: '她把铜扣在指间转了一转。' },
        { type: 'dialogue', speaker: '苏鸢', text: '她一直在等这一天。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '苏鸢将铜扣捏碎。' },
        { type: 'narration', text: '密室上方传来动静——沈时序和镇异司的人，已经破开了贺府的大门。' },
        { type: 'narration', text: '与此同时，苏鸢从袖中抽出刀，踏入阵心，抬脚，将那本《寄魂典》从贺崇玄手中踢飞。' },
        { type: 'narration', text: '贺崇玄后退两步，撞上书架，他老了，真正的年岁在这一刻显现出来，没有了那些典籍和阵法的加持，他只是一个白发的老人。' },
        { type: 'narration', text: '但他的眼神，没有崩溃，没有恐惧——他在笑，那个深沉的、老谋深算的笑。' },
        { type: 'dialogue', speaker: '贺崇玄', text: '丫头，你以为破了这个阵，就结束了？那张名单上的人——' },
        { type: 'dialogue', speaker: '苏鸢', text: '名单，三日前已经送出去了。' },
        { type: 'narration', text: '贺崇玄的笑，凝住了。' },
        { type: 'dialogue', speaker: '苏鸢', text: '镇异司的人，今晚不只在贺府。' },
        { type: 'narration', text: '她走近他，在他面前蹲下来，两人视线齐平，她的眼睛里，是贺崇玄第一次真正看见的东西——' },
        { type: 'atmos', text: '不是猎物的眼神，是猎人的。' },
        { type: 'dialogue', speaker: '苏鸢', text: '老太爷，我姐姐叫苏霜。您记得吗？' },
        { type: 'narration', text: '她把刀放在他面前的地上，没有刺进去，只是放着。' },
        { type: 'dialogue', speaker: '苏鸢', text: '您记一辈子。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '密室的门被撞开，沈时序第一个进来，扫视全场，目光落在苏鸢身上。' },
        { type: 'narration', text: '她站在阵心，白衣，红光，一手垂着，一手握着玉坠，完好的，没有受伤。' },
        { type: 'narration', text: '沈时序走过去，在她面前站定，看了她很久，没说话。' },
        { type: 'narration', text: '然后他脱下外袍，披在她肩上，压着声音说：' },
        { type: 'dialogue', speaker: '沈时序', text: '……还在。' },
        { type: 'thought', text: '还在。\n\n他说的是"还在"。\n\n不是"没事了"，不是"结束了"——\n\n是"还在"。\n\n……\n\n沈时序。\n\n我还在。' },
        { type: 'narration', text: '她把那件外袍的领口攥了一下，低下头，没有说话。' },
        { type: 'narration', text: '只是攥着。' },
        { type: 'div', text: '· 主线终章 完 ·' },
        { type: 'atmos', text: '贺崇玄被镇异司带走，名单上的人，一个接一个被追查。' },
        { type: 'atmos', text: '《寄魂典》在那夜的火里烧成了灰。' },
        { type: 'atmos', text: '苏鸢站在贺府的院子里，抬头，天快亮了。' },
      ],
      choices: [
        { text: '【尾声】之后，苏鸢和沈时序，怎么了？', next: 32 },
      ]
    },

    31: {
      chapter: '第五幕 · A线 · 仪式将近',
      content: [
        { type: 'location', text: '书院后园 · 黄昏 · 仪式前一日' },
        { type: 'narration', text: '她在书院留言板上插了白纸，在约定的时间，去了后园。' },

        { type: 'narration', text: '苏鸢走过去，在他对面坐下，把仪式的时间、地点、流程，一一说清楚。' },
        { type: 'narration', text: '沈时序听完，沉默了很长时间，然后说：' },
        { type: 'dialogue', speaker: '沈时序', text: '我明日亥时，在贺府后墙外候着。' },

        { type: 'dialogue', speaker: '苏鸢', text: '没有。' },
        { type: 'narration', text: '她看着他，很平静。' },
        { type: 'dialogue', speaker: '苏鸢', text: '我进去，是为了出来的。' },
        { type: 'narration', text: '沈时序看着她，那双眼睛里，有什么东西翻涌了一下，然后被他压下去，他点了点头。' },
        { type: 'dialogue', speaker: '沈时序', text: '好。' },
        { type: 'narration', text: '停顿了片刻，他又说：' },
        { type: 'dialogue', speaker: '沈时序', text: '出来之后，我在外面。' },
        { type: 'thought', text: '出来之后。\n\n他用的是"之后"，不是"如果"。\n\n……沈时序。\n\n谢谢你，相信我能出来。' },
        { type: 'narration', text: '苏鸢低下头，把玉坠和铜扣一起握进掌心，两块都是温热的。' },
        { type: 'narration', text: '她本来想就这样起身走的，但不知道为什么，那枚玉坠在掌心压着，她开了口：' },
        { type: 'dialogue', speaker: '苏鸢', text: '沈时序，我问你一件事。' },
        { type: 'narration', text: '他看向她，等。' },
        { type: 'dialogue', speaker: '苏鸢', text: '十年前，冬天，临渊城东边，一户人家出事的那晚。你在不在。' },
        { type: 'narration', text: '沈时序没有动。' },
        { type: 'narration', text: '连呼吸都没有变，但他拿着玉坠的那只手，指节收紧了一瞬，然后松开。' },
        { type: 'narration', text: '苏鸢低着头，没有看他的脸，声音很平：' },
        { type: 'dialogue', speaker: '苏鸢', text: '我那时候发着烧，藏在柜子里，只来得及看见门上的贺家图腾。后来有人把我带走，走了很远，把我放在巷口。' },
        { type: 'narration', text: '她顿了一下。' },
        { type: 'dialogue', speaker: '苏鸢', text: '我一直以为那个人走了，什么都不知道。但我现在想问——' },
        { type: 'narration', text: '她抬起头，直视着他：' },
        { type: 'dialogue', speaker: '苏鸢', text: '是你吗。' },
        { type: 'narration', text: '后园很静，风把树叶吹动，细碎的声音散在两人之间。' },
        { type: 'narration', text: '沈时序看着她，那双眼睛里，有什么东西，在这一刻，翻上来了——不是悬案揭破的轻松，是压着这件事整整十年，第一次让它见了光的沉。' },
        { type: 'narration', text: '他缓缓开口，声音比任何时候都更低：' },
        { type: 'dialogue', speaker: '沈时序', text: '是我。' },
        { type: 'narration', text: '苏鸢没有说话，只是看着他。' },
        { type: 'dialogue', speaker: '沈时序', text: '我那年十二岁，跟着师门参加那场仪式，没有人告诉我是什么，我只知道站在外围不准发问。' },
        { type: 'narration', text: '他停顿了一下，像是在把一件已经压了太久的东西，一点一点从喉咙里搬出来：' },
        { type: 'dialogue', speaker: '沈时序', text: '后来我听见了哭声，去找，找到了你。我没有能力阻止那晚发生的事，但我带走了你。' },
        { type: 'narration', text: '他看着苏鸢，眼神里没有祈求，没有辩解，只是平静地说完每一个字：' },
        { type: 'dialogue', speaker: '沈时序', text: '我以为你死了，一直以为你死了。直到我在书院见到你——我认出来了，但我不知道该怎么说。' },

        { type: 'dialogue', speaker: '沈时序', text: '苏鸢，那晚我只带走了一个人。你姐姐——我没能救她。' },
        { type: 'narration', text: '苏鸢攥着玉坠，没有动。' },
        { type: 'narration', text: '很长时间，两人都没有说话。后园里只有风声。' },
        { type: 'narration', text: '然后苏鸢低下头，把裂了缝的玉坠在掌心压了压，用那副平时她从不对他用的声音，开口：' },
        { type: 'dialogue', speaker: '苏鸢', text: '我知道了。' },
        { type: 'narration', text: '就这四个字。' },
        { type: 'narration', text: '不是原谅，不是责怪，只是——知道了。把这件事，从悬在两人之间的什么东西，变成了一个已经着地的事实。' },
        { type: 'thought', text: '是他。\n\n十年前那双手，是他。\n\n他十二岁，跟着师门去参加一件自己不知道是什么的事，\n发现不对，带走了我。\n\n他不知道是谁，\n我不知道是谁。\n\n十年，\n然后在书院，在廊下，\n他认出来了，\n一声不吭地，\n陪我走到今天。\n\n……姐姐，\n我一直以为那晚什么都没有人管我们。\n\n有一个人管了。\n\n只是我们都不知道彼此是谁。' },
        { type: 'narration', text: '苏鸢起身，沈时序也站起来，送她走到后园的园门口。' },
        { type: 'narration', text: '她没有说谢谢，只是在走进廊道之前，停了一下，轻声说：' },

        { type: 'narration', text: '她走了。' },
        { type: 'narration', text: '沈时序站在原地，看着她的背影消失在回廊转角。' },
        { type: 'atmos', text: '他没有动很久很久，直到天完全黑了。' },

        { type: 'chapter-title', text: '尾声', sub: '— 之后 —' },
        { type: 'location', text: '某处 · 春日 · 仪式后数月' },
        { type: 'narration', text: '贺府的案子结了，案卷厚厚的一摞，压在镇异司的档案室里，很多年不会有人再翻。' },
        { type: 'narration', text: '名单上的人，有些被查，有些被牵连，有些在夜里安静地消失，没有人问起。' },
        { type: 'narration', text: '书院里，苏鸢依然在念书，依然坐在最后一排，依然低着头。' },
        { type: 'narration', text: '但那件惯常的、软糯的、怯懦的外衣，悄悄地，挂在了很远的地方，她不大穿了。' },
        { type: 'narration', text: '沈时序有时候来书院，有时候不来。他的事情多，镇异司的案子排得满，有时候一走就是十天半月。' },
        { type: 'narration', text: '但他回来的时候，总会在书院留言板上，放一张纸。' },
        { type: 'narration', text: '不是红纸，不是白纸——是普通的、什么都没写的白纸，只是放在那里。' },
        { type: 'narration', text: '苏鸢看见就知道：他回来了。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '那个春日的下午，苏鸢坐在后园的石凳上，把那枚裂了缝的玉坠摊在掌心，在阳光里看着。' },
        { type: 'narration', text: '她感觉到姐姐的魂在里头，安静的，比以前更安静，像是睡着了，像是终于歇下来了。' },
        { type: 'thought', text: '姐，你累了吧。\n\n歇着吧。\n\n我来了，我做了，\n\n你可以歇着了。' },
        { type: 'narration', text: '脚步声从身后来，她认得，不用回头。' },
        { type: 'narration', text: '沈时序在她旁边坐下，带来了两盏热茶，放了一盏在她面前，没有说话。' },
        { type: 'narration', text: '苏鸢低头看了看那盏茶，还是白毫，还是清淡的，像他这个人。' },
        { type: 'narration', text: '她把玉坠攥起来，放进衣襟最里面，然后端起茶，喝了一口。' },
        { type: 'dialogue', speaker: '苏鸢', text: '你回来了。' },
        { type: 'dialogue', speaker: '沈时序', text: '回来了。' },
        { type: 'narration', text: '就这两句，什么都没有了。' },
        { type: 'narration', text: '但苏鸢想，这就够了。' },
        { type: 'thought', text: '沈时序。\n\n你知道吗，\n我一开始进这件事，心里是没有"之后"的。\n\n复了仇，了了账，然后怎样，我没想过。\n\n但现在，我有了一点点"之后"。\n\n……\n\n因为你每次回来，都放一张白纸。\n\n这件事，让我觉得，\n有什么东西，是可以等的。' },
        { type: 'div', text: '◆ · ◆' },
        { type: 'atmos', text: '春光落在两人身上，一盏茶的时间，什么都没说，什么都说完了。' },
        { type: 'div', text: '· · · · ·' },
        { type: 'chapter-title', text: '终', sub: '— 《寄魂志》A线 完 —' },
        { type: 'atmos', text: '苏鸢 × 沈时序线 · 全线通关' },
      ],
      choices: [

        { type: 'location', text: '贺府 · 东厢 · 嫁入第一日' },
        { type: 'narration', text: '花轿没有，婚礼也简单，贺崇玄说年内择吉日正式成婚，眼下只是"先住进来熟悉熟悉"。' },
        { type: 'narration', text: '苏鸢知道这是什么意思——他要先观察她，确认她的价值，再走那道仪式。' },

        { type: 'narration', text: '贺珩从头到尾没有露面迎接。' },
        { type: 'narration', text: '苏鸢把包袱放进东厢，在院子里站了一会儿，抬头看了看贺府的天空——比外面窄，被高墙切成一块方形，灰蓝色，压着人。' },

        { type: 'thought', text: '假意攻略。\n\n先让他对我产生一点愧疚，再让他对我产生一点好奇，\n再让他对我产生一点……不舍得。\n\n贺珩，你是个软心肠的人，\n这是你的弱点，也是我的入口。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '西厢的门半开着，贺珩坐在院中的石桌旁发呆，手边放着一壶凉了的茶，也没人来续热。这是苏鸢第一次在贺府里安静地看他——棕发松散，编发的那几缕垂在肩侧，穿的是家常的藏青袍子，没有金线绣纹。少了那些华丽，反而多了些什么——或者说，少了那层壳，底下的人轮廓才清晰起来。' },
        { type: 'thought', text: '……一点也不像贺崇玄。\n\n他身上有贺家的钱，有贺家的姓，\n但他的那双眼睛——\n琥珀色的，\n是活的，\n是有光的，\n是某种还没有被完全磨掉的、\n真实的东西在里面。' },
        { type: 'narration', text: '他听见脚步声，抬头，看见是苏鸢，愣了一下，眼神里有一闪而过的不自在。' },

        { type: 'narration', text: '苏鸢站在院门口，没有进去，低着头，把手里的东西举了举——是一碟点心，用油纸包着，看起来是从外面买的。' },
        { type: 'dialogue', speaker: '苏鸢', text: '进府时路过街口，买了一些，想着……送来尝尝。' },
        { type: 'narration', text: '贺珩看着那碟点心，沉默了一会儿，说：' },
        { type: 'dialogue', speaker: '贺珩', text: '放着吧。' },
        { type: 'narration', text: '苏鸢进门，把点心放在石桌上，退后两步，没有坐，只是站着，也不说话。' },
        { type: 'narration', text: '贺珩看了她一眼，像是没想到她会这样，最终还是开了口：' },
        { type: 'dialogue', speaker: '贺珩', text: '……白鹿不会再来贺府了。我爹的意思。' },
        { type: 'narration', text: '苏鸢没有说"我知道"，也没有说"那很好"，只是轻轻"嗯"了一声，神情里有些东西——不是喜悦，不是怜悯，只是平静地接收了这句话。' },
        { type: 'narration', text: '贺珩看着她，第一次，认认真真地把她看了一遍。' },
        { type: 'thought', text: '贺珩，你现在心里，有没有升起一点点——\n\n"这个人和我想的不一样"？\n\n很好。\n\n这就是开始。' },

      ]

        { type: 'location', text: '贺府 · 西厢院中 · 嫁入第一日' },
        { type: 'narration', text: '苏鸢把点心放在石桌上，然后，在对面坐下了。' },
        { type: 'narration', text: '没有说话，只是坐着，像是在发呆，像是在想事情，看着院子里那棵不知名的老树。' },
        { type: 'narration', text: '贺珩看了她一眼，没说"你坐这里做什么"，只是重新端起那壶凉茶，喝了一口，皱了皱眉——凉的。' },
        { type: 'narration', text: '苏鸢站起来，去旁边小炉上把茶壶热了热，重新放回他面前。' },
        { type: 'narration', text: '然后坐回去，继续什么都不说。' },
        { type: 'narration', text: '贺珩看着那壶热茶，沉默了很久，然后拿起来喝了一口。' },
        { type: 'narration', text: '又过了一会儿，他出声了，语气别扭，像是憋了半天才说出来：' },
        { type: 'dialogue', speaker: '贺珩', text: '……你为什么不说话？' },
        { type: 'dialogue', speaker: '苏鸢', text: '你在发呆，我不想打扰。' },
        { type: 'narration', text: '贺珩愣了一下，没再说什么了。' },
        { type: 'narration', text: '两人就那样在院子里坐到天擦黑，一壶茶见了底，谁也没有主动开口说"走了"。' },
        { type: 'narration', text: '最后还是贺珩先站起来，拍了拍衣袖，说：' },
        { type: 'dialogue', speaker: '贺珩', text: '该用晚饭了。' },
        { type: 'dialogue', speaker: '苏鸢', text: '嗯。' },
        { type: 'narration', text: '苏鸢起身，走在他旁边，往正堂去。' },
        { type: 'thought', text: '沉默，有时候，\n比任何话都有力量。\n\n他不知道该怎么对待我。\n他不知道我在想什么。\n\n这种不确定，\n会让他一直想。' },
      ],

      ]

        { type: 'narration', text: '苏鸢把贺府摸了个透：钟妈妈辰时巡东厢，戌时锁后院小门；书房的灯每夜亥时后还亮着；贺崇玄有一个习惯，每月初一和十五，会独自去地下某处待上一个时辰。' },
        { type: 'thought', text: '初一和十五。\n\n那不是祭祖。\n\n是仪式。\n\n他在维护那个阵。' },
        { type: 'narration', text: '与此同时，贺珩开始出现在她的视野里。' },

        { type: 'thought', text: '贺珩，你在做什么？\n\n你自己知道吗？' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '入府第十日，贺崇玄第一次主动找她谈话。' },
        { type: 'narration', text: '他问她体内的魂魄——开门见山，一字不绕。' },
        { type: 'narration', text: '苏鸢用准备好的茫然和惶恐应对，把那副"第一次被人看穿秘密"的惊慌演得分毫不差。' },
        { type: 'narration', text: '贺崇玄的眼神里，贪婪的成分，加深了。' },
        { type: 'thought', text: '好。\n\n进展顺利。' },
        { type: 'narration', text: '然而就在那天晚上，苏鸢独自在东厢点灯誊录贺崇玄给的材料，忽然听见院门被叩了两下。' },
        { type: 'narration', text: '是贺珩，手里拎着一个食盒，脸上的表情介于随意和尴尬之间。' },
        { type: 'dialogue', speaker: '贺珩', text: '厨房炖了汤，我端来的，你别多想。' },
        { type: 'narration', text: '苏鸢放下笔，看着他，没有说谢谢，也没有客套，只是说：' },

        { type: 'narration', text: '贺珩把食盒放下，没有马上走，在院里站着，眼神落在她桌上那堆材料上，皱了皱眉：' },
        { type: 'dialogue', speaker: '贺珩', text: '我爹让你看这些？' },
        { type: 'dialogue', speaker: '苏鸢', text: '我自己要求的，想多了解一些。' },
        { type: 'narration', text: '贺珩盯着那堆东西，脸色沉了一下，像是想说什么，又忍住了，最终只说了一句：' },
        { type: 'dialogue', speaker: '贺珩', text: '……少跟我爹走太近。' },
        { type: 'narration', text: '说完，他转身走了，走得比来时快。' },
        { type: 'narration', text: '苏鸢看着他的背影，眼神微微变了一下。' },
        { type: 'thought', text: '少跟我爹走太近。\n\n贺珩，你知道什么？\n\n你怕什么？' },

      choices: [

    // Scene 44
    44: {
      chapter: '嫁入线 · 第二幕 · 蛰伏',
      content: [
        { type: 'location', text: '贺府 · 后花园 · 入府第十一日' },
        { type: 'narration', text: '贺珩说完他娘的事，停了很长时间，才又开口：' },
        { type: 'dialogue', speaker: '贺珩', text: '所以他挑中你，是他挑的，不是我。我拦不住他。所以我跟你说——少跟他走太近。' },
        { type: 'narration', text: '苏鸢看着他，一句话都没说。' },
        { type: 'narration', text: '贺珩低下头，重新拨弄棋子，手指慢慢地，把一颗黑子推进棋盒，盖上盖子，像是要结束这个话题。' },
        { type: 'narration', text: '然后他抬起头，眼神里有什么东西——不是怜悯，不是警告，是更复杂的，说不清楚的：' },
        { type: 'dialogue', speaker: '贺珩', text: '你是个聪明人。我看得出来。' },
        { type: 'narration', text: '他停顿了一下。' },
        { type: 'dialogue', speaker: '贺珩', text: '白鹿，不是我们家的人了。我爹的意思，我拦不住。但你——你别让他把你也……' },
        { type: 'narration', text: '他没说完，把剩下的话咽了回去，站起身，走了。' },
        { type: 'narration', text: '苏鸢在水榭里坐了很久，盯着那副没下完的棋盘。' },
        { type: 'thought', text: '贺珩。\n\n你知道你父亲在做什么。\n你七岁就知道了。\n然后你用白鹿，用风流，用"不在乎"，\n把自己和这个家隔开了十几年。\n\n而现在，你在提醒我。\n\n……\n\n这件事让我很难处理。\n\n因为这不在我的计划里——\n一个有真心的人，\n对我说，要小心。\n\n我本来只打算把你当一颗棋子的，贺珩。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '入府第十五日，白鹿来了。' },
        { type: 'narration', text: '不是来找贺珩，是来找苏鸢的。' },
        { type: 'narration', text: '她站在东厢院门口，穿着一件鲜亮的绯色衣裳，脸上带着苏鸢熟悉的那种笑——明艳，张扬。苏鸢想，这女孩生得真是好，那双眼睛大而有神，皮肤白皙得近乎透亮，哪怕只是站在那里，也带着一种天然的逼人的光彩。但眼神里，这一次，有些不同。' },
        { type: 'narration', text: '是害怕。' },
        { type: 'dialogue', speaker: '白鹿', text: '苏鸢，我有话跟你说。' },
        { type: 'narration', text: '苏鸢让她进来，关上院门，看着她。' },
        { type: 'dialogue', speaker: '白鹿', text: '贺老太爷，上个月，叫人给我送了一样东西。' },
        { type: 'narration', text: '她从袖中取出一个细小的瓷瓶，放在桌上。' },
        { type: 'dialogue', speaker: '白鹿', text: '说是补气的药，让我每日服用，说对身体好。我喝了三天，第四天，我娘说我脸色不对，像是被什么东西……抽着了。' },
        { type: 'narration', text: '苏鸢看着那个瓷瓶，面色不变，心里落下了一块石头。' },
        { type: 'thought', text: '他在用白鹿做实验。\n\n先用贺珩牵制她，让她进府，\n再趁她被赶走之前，\n悄悄在她身上做预备试验。\n\n……白鹿，\n你只是他的备用品。\n\n这个老人，\n比我以为的，\n更不择手段。' },
        { type: 'narration', text: '白鹿看着她，声音第一次，没有了那股张扬。苏鸢这才发现——今日的她没有戴那些精心挑选的配饰，短发梳得整齐，像是临出门才认真拢了拢，少了那些刻意的修饰，反而透出她这个年纪本来的样子——不过十六七岁，一个被吓到了的、不知道该找谁的少女。苏鸢忽然想，这女孩从前那身明艳的锋芒，究竟有多少是真的，又有多少是撑出来的壳。' },
        { type: 'dialogue', speaker: '白鹿', text: '苏鸢，我不知道你在这个家里要做什么。但……贺老太爷，他不是好人。' },
        { type: 'narration', text: '苏鸢沉默了片刻，然后说：' },
        { type: 'dialogue', speaker: '苏鸢', text: '我知道。那瓶药，你别再喝了，我帮你处理。' },
        { type: 'narration', text: '白鹿愣了一下，像是没想到她会这样说，眼眶红了一圈，然后转身走了，走得很快，像是再慢一步就会哭出来。' },
        { type: 'narration', text: '苏鸢把那个瓷瓶拿起来，对着光看了看，把它收进了袖里。' },
        { type: 'thought', text: '贺崇玄，\n你连这步棋也布了。\n\n白鹿去留，\n贺珩的心，\n全在你的棋盘上。\n\n但你算漏了一件事——\n你以为贺珩软弱，\n你以为我软弱，\n你以为白鹿软弱。\n\n我们三个，\n现在都站在你对面了。' },
      ],
      choices: [
        { text: '去找贺珩，把白鹿的事告诉他。', next: 53 },
        { text: '先不告诉贺珩——这个消息太重，告诉他，他会乱。', next: 45 },
      ]

        { type: 'narration', text: '然后她在砚台底下，找到一张字条，墨迹新鲜，是贺崇玄的笔迹，只有两行字：' },
        { type: 'atmos', text: '「丫头，你在找什么？若心诚，三日后，子时，来书房。」' },

        { type: 'thought', text: '他在演。\n\n这场病，是演给外人看的。\n\n他要测试我——\n看我在他"垂死"时，会不会乱，\n会不会急着去翻他的东西，\n会不会暴露什么。\n\n然后他要在三日后，\n子时，书房，\n把某件事告诉我。\n\n或者，\n对我动手。\n\n贺崇玄，你这个老人，\n一直都没有真的信任我，\n你只是在等我露出破绽。\n\n……很好。\n\n那我们就来看，\n谁先让谁露出破绽。' },
        { type: 'div', text: '◆' },

        { type: 'narration', text: '子时，苏鸢推开书房的门。' },
        { type: 'narration', text: '灯亮着，贺崇玄坐在书案后，穿着常服，面色如常，哪有半分病容。' },
        { type: 'narration', text: '那张病床上的虚弱，那些郎中，那三天的昏迷，像一场散去的戏。' },
        { type: 'dialogue', speaker: '贺崇玄', text: '坐。' },
        { type: 'narration', text: '苏鸢坐下，端正，神情平静，像是来参加一次寻常的谈话。' },
        { type: 'narration', text: '贺崇玄看着她，忽然笑了：' },
        { type: 'dialogue', speaker: '贺崇玄', text: '三天，府里乱成那样，你一次都没有进过书房。' },
        { type: 'dialogue', speaker: '苏鸢', text: '您没让我进。' },
        { type: 'dialogue', speaker: '贺崇玄', text: '旁人都会趁乱来看看。' },
        { type: 'dialogue', speaker: '苏鸢', text: '我不是旁人。' },
        { type: 'narration', text: '贺崇玄的笑意深了，他把《寄魂典》的最后一册，推到她面前。' },
        { type: 'dialogue', speaker: '贺崇玄', text: '写完了。' },
        { type: 'narration', text: '苏鸢低头看那本书，没有动它。' },
        { type: 'dialogue', speaker: '贺崇玄', text: '丫头，老夫这场病，是假的，你知道吧。' },
        { type: 'narration', text: '短短的沉默之后，苏鸢抬起头：' },
        { type: 'dialogue', speaker: '苏鸢', text: '第二日就猜到了。' },
        { type: 'narration', text: '贺崇玄大笑，真心实意地笑，击掌称善：' },
        { type: 'dialogue', speaker: '贺崇玄', text: '好！好孩子，老夫没有看错你！' },
        { type: 'narration', text: '他俯身向前，眼睛里那个深不见底的贪婪，此刻毫不掩饰：' },
        { type: 'dialogue', speaker: '贺崇玄', text: '那三天，老夫在等你来翻书房。等你露出急切，露出目的，露出破绽。' },
        { type: 'narration', text: '他顿了顿，换成一种更温和、更危险的语气：' },
        { type: 'dialogue', speaker: '贺崇玄', text: '你没来。这说明——你比老夫见过的所有人，都更沉得住气。' },
        { type: 'narration', text: '他把《寄魂典》再往苏鸢面前推了推：' },
        { type: 'dialogue', speaker: '贺崇玄', text: '差最后一步，你知道是什么。' },
        { type: 'narration', text: '苏鸢低着头，看着那本书，眼睫不动。' },
        { type: 'thought', text: '他在夸我。\n\n他夸我沉得住气。\n\n但他不知道——\n我第二日进过书房，\n我看过字条，\n我把字条烧了，\n然后继续演我的戏，\n一直演到今晚。\n\n贺崇玄，\n你以为你看穿了我，\n但你只看见了我给你看的那一层。\n\n还差得远。' },
        { type: 'narration', text: '她慢慢抬起头，对他露出一个轻微的、似乎终于被打动了的笑：' },
        { type: 'dialogue', speaker: '苏鸢', text: '……老太爷，我愿意。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '贺崇玄宣布"病愈"，府里重归平静。' },
        { type: 'narration', text: '仪式的日子，定在了下月初一。' },
        { type: 'narration', text: '苏鸢回到东厢，坐在黑暗里，把所有的事情推演了一遍，最后落到一件事上：' },
        { type: 'thought', text: '贺珩。\n\n他知道了我的目的。\n\n他有七天时间，可以选择任何一边。\n\n……他会怎么选？' },
        { type: 'narration', text: '她不知道答案，但她知道——如果贺珩选择了她父亲那边，她就一个人走进去，一个人破局，一个人出来。' },
        { type: 'narration', text: '但如果他没有。' },
        { type: 'atmos', text: '七天之内，苏鸢和贺珩，没有再见过一次。' },
        { type: 'narration', text: '直到仪式前一日的深夜，东厢院门被人轻轻叩响，三下，有节奏的三下。' },
        { type: 'narration', text: '苏鸢握着刀，走到门口，把门拉开一道缝。' },
        { type: 'narration', text: '是贺珩，手里拿着一沓东西——是苏鸢抄录的名单副本，是那三册手稿的关键内容。' },
        { type: 'narration', text: '他把那沓东西递给她，声音很低：' },
        { type: 'dialogue', speaker: '贺珩', text: '我去书房拿的。你要用，明天用得上。' },
        { type: 'narration', text: '苏鸢站在门缝里，看着他，握刀的手，慢慢松开了。' },
        { type: 'thought', text: '七天。\n\n他选了七天。\n\n然后他来了，\n带着证据，\n站在我院门口。\n\n贺珩，\n你知道这意味着什么吗。\n\n这意味着你要和你父亲，\n彻底站到对面去了。' },
        { type: 'dialogue', speaker: '苏鸢', text: '贺珩。' },
        { type: 'narration', text: '他应了一声，等她说话。' },
        { type: 'dialogue', speaker: '苏鸢', text: '……谢谢你。' },
        { type: 'narration', text: '这是她进贺府之后，第一次，对他说谢谢，用自己的声音说的，不是那个演出来的苏鸢。' },
        { type: 'narration', text: '贺珩沉默了片刻，然后侧过脸，看向别处，声音里有什么东西，绷紧了又松开：' },
        { type: 'dialogue', speaker: '贺珩', text: '明天，出来的时候，……叫我一声。' },
        { type: 'narration', text: '苏鸢把那沓东西抱在胸前，低下头，轻轻"嗯"了一声。' },
      ],
      choices: [
        { text: '【终章】仪式之夜——', next: 46 },
      ]
    },

        { type: 'narration', text: '贺珩报了官。' },

        { type: 'narration', text: '密室里，沉默了很久。' },
        { type: 'narration', text: '苏鸢站在阵心，看着这一幕，没有动，因为她知道，这个时刻，是贺珩的，不是她的。' },
        { type: 'narration', text: '她把手伸进衣襟，捏住那枚裂了的玉坠，低下头，轻轻把姐姐的名字，说了一遍。' },
        { type: 'thought', text: '苏霜。\n\n你的名字，我帮你说了。\n\n你可以走了。' },
        { type: 'narration', text: '体内那一缕最深处的魂，安静地，松开了，散了开去，不是消失，是——回家了。' },
        { type: 'div', text: '◆' },

        { type: 'narration', text: '《寄魂典》，苏鸢亲手烧掉的，在密室的十二盏红灯里，烧了很久，烧成灰，灰也散了。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '一切结束后的第三天，贺珩来找苏鸢。' },

        { type: 'dialogue', speaker: '贺珩', text: '你要走了吗？' },
        { type: 'atmos', text: '这里是嫁入线的终点——也是一个选择。' },

        { type: 'narration', text: '苏鸢看着贺珩，沉默了很久。' },
        { type: 'narration', text: '她想起进这个家的第一天，她在心里写下的计划，每一步，每一个目的，每一个人在棋盘上的位置。' },
        { type: 'narration', text: '贺珩，在那张棋盘上，最开始是一颗可以用的棋子。' },

        { type: 'narration', text: '他走上来，在她面前站定，伸出手，把她手里那枚裂了的玉坠，轻轻地，托住了。' },
        { type: 'dialogue', speaker: '贺珩', text: '……我能替你找人，把这个修一修吗。' },
        { type: 'narration', text: '苏鸢低头，看着他托着玉坠的那只手，沉默了三息。' },

    60: {

        { type: 'location', text: '街市附近 · 死巷 · 傍晚' },
        { type: 'narration', text: '苏鸢最先察觉到他，是在街市受伤后的第三天。' },
        { type: 'narration', text: '不是视觉，是那种更深处的感知——体内寄宿的魂魄们忽然同时安静了，像一群鸟在某样东西飞过时集体停止振翅，连呼吸都屏住了。' },
        { type: 'narration', text: '她环顾四周，什么都没看见，但那种感觉留了下来，此后三日，如影随形。' },
        { type: 'thought', text: '……是什么东西？\n\n不是邪祟，不是法阵——\n魂魄们不是在恐惧，\n是在……静止。\n\n像是碰见了某种更古老的东西，\n不知道该怎么反应，\n所以选择不动。' },
        { type: 'narration', text: '第五天，傍晚，她从书院往城西走，拐进一条少人的巷子，那种感觉忽然变得清晰——是那种被注视的重量，但又比被注视更深，更古。' },
        { type: 'narration', text: '她停下脚步。' },
        { type: 'narration', text: '巷子另一头，有个人倚在墙上，从那里的阴影渗出来一样，不像是走过来的。' },
        { type: 'narration', text: '苏鸢把他从头到脚看了一遍。' },
        { type: 'narration', text: '高——比寻常男子高出不少，肩背宽而展，不是练武堆出来的壮，是那种身体里随时储着力气的体格，站着不动，就有一种压迫感往外漫。' },
        { type: 'narration', text: '黑发，长，没有束，从头顶往下垂，有弧度，遮住了大半张脸，只露出下颌的线条，是那种骨相极好的轮廓。' },
        { type: 'narration', text: '他抬起头，苏鸢看见了他的眼睛。' },
        { type: 'narration', text: '暗红色的，不是血色，是那种炭火在最深处燃着、表面凝了一层的红，沉，深，往里看，看不到边。' },
        { type: 'narration', text: '皮肤白，接近于苍，不是病，是那种很少在普通阳光下待着的人才会有的颜色。' },
        { type: 'thought', text: '……俊。\n\n这是苏鸢给他最快的判断，然后立刻意识到，她不应该在这个时候想这件事。\n\n因为这个人，\n不像是能用"俊不俊"来衡量的东西。\n\n他站在那里，像是某件从别处来的东西，\n刚好借了一个人的外形，\n压在这条巷子里。' },
        { type: 'narration', text: '他把手伸出来，掌心朝上，放了一枚棋子在那里——白色的，刻着一个「寄」字。' },
        { type: 'narration', text: '然后放在巷子的台阶上，转身，走进阴影，消失了。' },
        { type: 'narration', text: '没有开口说一个字。' },
        { type: 'narration', text: '苏鸢站在原地，看着那枚棋子，体内的魂魄们，还是那副集体屏息的安静。' },
        { type: 'thought', text: '他知道「寄」字的意思。\n\n知道我是灵异体，知道体内寄宿着魂魄。\n\n而且他不是贺崇玄那边的人——\n如果他是，今天这场面不会是这样收场。\n\n……他是什么东西。' },
      ],

    // Scene 62: D线·先观察
    62: {
      chapter: 'B线 · 短线 · 暗处来人',
      content: [

        { type: 'narration', text: '苏鸢没有捡那枚棋子。' },

        { type: 'narration', text: '但她开始留意他。' },
        { type: 'narration', text: '第二天，他还在那条街，还是那个位置，手里换了本旧书，翻着，低着头，像个在城里闲逛的人。' },
        { type: 'narration', text: '第三天，她绕了一条完全不同的路去书院，没有走那条街，但在另一处巷口，看见了他的背影——他先到了，等着。' },
        { type: 'thought', text: '他知道我会换路。\n\n或者，他预判了我会换路，\n提前到了那个位置。\n\n……这个人，\n不是普通意义上的「跟踪」。\n\n他是在等我，\n等我自己走到他能说话的地方。' },
        { type: 'narration', text: '第四天，苏鸢在镇异司外院旁边的街上停了一下，问了徐霜一句话——' },
        { type: 'narration', text: '她没有描述他的样貌，只是说，城里最近有没有什么奇怪的人，不属于任何门派，不属于官府，但所有门派的人见了他都会绕路。' },
        { type: 'narration', text: '徐霜停下手里的刀，看了她很长时间，然后说：' },
        { type: 'dialogue', speaker: '镇异司·徐霜', text: '你见着他了？' },
        { type: 'narration', text: '苏鸢点头。' },
        { type: 'dialogue', speaker: '镇异司·徐霜', text: '那个人没有来历，没有门派，没有记录在案的身份。镇异司的档案里有他，但档案只有三个字。' },
        { type: 'dialogue', speaker: '苏鸢', text: '哪三个字？' },
        { type: 'dialogue', speaker: '镇异司·徐霜', text: '「勿干涉。」' },
        { type: 'narration', text: '苏鸢沉默了一下。' },
        { type: 'dialogue', speaker: '苏鸢', text: '是镇异司怕他，还是他要求的？' },
        { type: 'narration', text: '徐霜把刀收回鞘，站起来，声音低了一点：' },
        { type: 'dialogue', speaker: '镇异司·徐霜', text: '上一任队长见过他，说他不是这个世界的东西，是挡在这里和那边之间的。说到这，那个队长就不再往下说了。' },
        { type: 'atmos', text: '她顿了顿：「你最好，别太靠近他。」' },
        { type: 'thought', text: '挡在这里和那边之间。\n\n镇异司上一任队长，\n见过他，然后不说了。\n\n档案里三个字——「勿干涉」。\n\n……\n\n有意思。\n\n所有人见了他都绕路，\n而他跟了我五天，\n在我换路之后提前到了我要去的地方。\n\n你在所有人那里是「勿干涉」，\n为什么偏偏来找我。' },
        { type: 'narration', text: '第五天，苏鸢在那个台阶上，捡起了那枚白棋子。' },
        { type: 'narration', text: '它还在那里，五天，没有人动它。' },
        { type: 'narration', text: '她把棋子攥在掌心，体内的魂魄们，安静了一下，然后，像是接受了一个结果，重新开始呼吸。' },

      choices: [
        { text: '去找他——带着棋子，和你自己的问题。', next: 63 },

    // Scene 63: D线·第二幕·他说的那件事
    63: {
      chapter: 'B线 · 短线 · 边界之人',
      chapterShort: '第二幕',
      content: [
        { type: 'chapter-title', text: '第二幕', sub: '— 边界之人 —' },
        { type: 'location', text: '城西旧宅附近 · 某日傍晚' },
        { type: 'narration', text: '他带她去了城西，一处无人的空院，青苔，旧井，一张被风化到只剩轮廓的石桌。' },
        { type: 'narration', text: '他坐在石桌边沿，不坐凳，侧身，像那里是某种更高处的地方往下看的位置。苏鸢站着，把两枚棋子放在石桌上，一黑一白。' },
        { type: 'narration', text: '他低头看了一眼，然后把黑棋子拿起来，转了一下：' },
        { type: 'dialogue', speaker: '？', text: '你想知道我是什么——我说给你听。' },
        { type: 'narration', text: '苏鸢没有说话，等他。' },
        { type: 'dialogue', speaker: '？', text: '这个世界和它之外的那个地方，之间有一条线。所有活的东西在线这边，所有死了的东西穿过线去那边。这条线不是天然稳固的，需要有东西压着。' },
        { type: 'narration', text: '他把黑棋子按在石桌上：' },
        { type: 'dialogue', speaker: '？', text: '我是压着这条线的东西。' },
        { type: 'narration', text: '苏鸢看着他，消化这句话，然后问：' },
        { type: 'dialogue', speaker: '苏鸢', text: '你是人吗？' },
        { type: 'dialogue', speaker: '？', text: '曾经是。' },
        { type: 'narration', text: '两个字，没有别的解释。' },
        { type: 'thought', text: '曾经是。\n\n所以他走过了那条线，\n又回来了，\n变成了压着那条线的东西。\n\n或者——他是被选择的，\n或者是自己走到了那个位置。\n\n……我不知道哪一种更可怕，\n也不知道哪一种更悲哀。' },
        { type: 'narration', text: '她在旁边的石墩上坐下，抬起头：' },
        { type: 'dialogue', speaker: '苏鸢', text: '你说，姐姐在那条线上停了很久，有话要你转告。' },
        { type: 'narration', text: '他把黑棋子放下，看着那两枚棋子，一黑一白，沉默了很长时间。' },
        { type: 'narration', text: '然后：' },
        { type: 'dialogue', speaker: '？', text: '她说——「告诉她，她体内的那些人，不只是在等复仇，她们在等被记住。」' },
        { type: 'narration', text: '苏鸢没有动。' },
        { type: 'dialogue', speaker: '？', text: '还有一句。她说——「我不是你的武器，我是你的姐姐。记住这件事。」' },
        { type: 'narration', text: '院子里的风停了一下，把那两句话包进去，又散开。' },
        { type: 'narration', text: '苏鸢低着头，没有哭，只是把右手放在胸口，压了一下，很轻，像是在确认那里还有什么还在。' },
        { type: 'thought', text: '姐姐。\n\n你说，你不是我的武器，你是我的姐姐。\n\n……\n\n我知道。\n\n但这件事，我走到这一步了。\n\n我没有办法停——\n不是因为我不爱你，\n是因为，如果我停了，\n那些和你一起在贺崇玄那里失去了所有东西的人，\n她们怎么办。\n\n姐，你等了我这么久。\n\n再等我一下。\n\n这件事做完了，我让你好好走。\n\n我让你们都好好走。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '沉默了很久之后，苏鸢抬起头，看向他：' },
        { type: 'dialogue', speaker: '苏鸢', text: '你为什么来找我？姐姐托你转话，那件事你已经做了，可以离开了。' },
        { type: 'narration', text: '他看着她，那双暗红色的眸子里有什么东西，是苏鸢在他脸上第一次清楚地读出来的——' },
        { type: 'atmos', text: '不是怜悯，不是算计，是某种很深、很久的、被什么东西拴住了的……注意。' },
        { type: 'dialogue', speaker: '？', text: '因为你是钥匙。' },
        { type: 'narration', text: '苏鸢皱眉：' },
        { type: 'dialogue', speaker: '苏鸢', text: '什么意思？' },
        { type: 'dialogue', speaker: '？', text: '我是锁。你是钥匙。' },
        { type: 'narration', text: '他说得很平静，像在说一件已经存在很久的事：' },
        { type: 'dialogue', speaker: '？', text: '我压着那条线，不让该过去的东西留下来，不让不该来的东西进来。这一直够用。' },
        { type: 'narration', text: '他停了一下：' },
        { type: 'dialogue', speaker: '？', text: '但贺崇玄的那本书，如果仪式成功——那条线，会被人用一种错误的方式强行打开。那不是锁能关住的。' },
        { type: 'narration', text: '苏鸢盯着他：' },
        { type: 'dialogue', speaker: '苏鸢', text: '所以你需要我。' },
        { type: 'dialogue', speaker: '？', text: '需要你，是因为你能从里面关掉那扇门，而我只能从外面压着。' },
        { type: 'narration', text: '他把白棋子推到她这边：' },
        { type: 'dialogue', speaker: '？', text: '你想做你的事，我想做我的事，这两件事，方向一样。' },
        { type: 'thought', text: '锁和钥匙。\n\n他从外面，我从里面。\n\n这件事，如果是真的——\n那我进贺崇玄的阵心那一刻，\n他在外面做什么，\n我做不到，\n而他在外面做不到的，\n只有我能做。\n\n……\n\n但他是什么我还没弄清楚，\n他说的是不是真的我也没有办法验证，\n他游走在两个世界之间，\n他说姐姐的那两句话，\n可能是真的，也可能是……\n\n不。\n\n那两句话里有只有我们之间才知道的东西。\n\n它是真的。\n\n所以……这个人，\n至少这件事上，不是在骗我。' },
      ],
      choices: [

        { text: '「好。」——不附条件，但把这句话，放在心里。', next: 64 },
      ]
    },

    64: {

        { type: 'narration', text: '然后他低下头，轻轻笑了，那个笑是她从没在他脸上见过的，不是那种见过太多事的漫不经心，是更真实的，带着一点苏鸢说不清楚是什么的东西：' },
        { type: 'dialogue', speaker: '？', text: '……好久没有人这么说了。' },
        { type: 'narration', text: '苏鸢没有接这句话，只是把两枚棋子——白的，黑的——都放在他面前的井台上，转身要走。' },
        { type: 'narration', text: '身后，他开口：' },
