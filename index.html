    // Scene 65: D线·终章·清账
    // Scene 65: D线·终章·仪式之夜（第一幕·苏鸢入阵）
    65: {
      chapter: 'B线 · 短线 · 仪式之夜',
      chapterShort: '终章',
      content: [
        { type: 'chapter-title', text: '终章', sub: '— 仪式之夜 —' },
        { type: 'location', text: '贺府 · 地下密室 · 亥时' },
        { type: 'narration', text: '苏鸢用备用钥匙，提前一个时辰进去。' },
        { type: 'narration', text: '密室比她想象的深。楼梯一共十九级，越往下，空气越凉，越静，像走进了某种比这座宅子更古老的东西的腹地。' },
        { type: 'narration', text: '阵已经布好了，不是今夜才布的——朱砂纹路有新有旧，贺崇玄在这里准备了不止一个月。十二盏红灯分布在阵的十二个方位，灯芯是黑色的，没有点燃，却已经渗出一股苦涩的气息，是某种压制魂魄流散的香料。' },
        { type: 'thought', text: '四尸锁魂阵。\n\n贺崇玄，你把四具棺材埋在这里，\n把四个女孩关在地下，\n作为阵法的锚点，\n今夜只差最后一个。\n\n最后一个——\n是我。' },
        { type: 'narration', text: '她在阵心站定，把每一条朱砂走向，每一处节点，全部看了一遍，然后，悄悄动了手。' },
        { type: 'narration', text: '不是三个节点，只有一个——最核心的那一个，汲取的方向。' },
        { type: 'narration', text: '她把它，转了过来。' },
        { type: 'thought', text: '贺崇玄，\n你研究了二十年，我读了你一年多的手稿。\n\n你比我更熟悉这张阵，\n但你不知道——\n你手稿里的那个变量，\n你一直没算进去的那个变量，\n是我体内那些魂魄，\n在这张阵里，会是什么。\n\n你不知道。\n\n因为你的所有实验，\n都没有一例走到仪式真正完成的那一步。\n\n而今晚，我来了。' },
        { type: 'narration', text: '她把玉坠握在掌心，在阵心等着。' },
        { type: 'narration', text: '贺崇玄来了。' },
        { type: 'narration', text: '他走下来的时候，步履很稳，手里拿着一根黑木杖，衣袍是深色的，像是某种仪式的装束，和苏鸢平日里见到的那个温和老太爷，不是同一个人。' },
        { type: 'narration', text: '他看见苏鸢站在阵心，停了一下，然后笑了，那个笑是苏鸢熟悉的那种——太温和，太深，像一件东西的正面，背面是什么，他不让人看见。' },
        { type: 'dialogue', speaker: '贺崇玄', text: '丫头，你来了。' },
        { type: 'dialogue', speaker: '苏鸢', text: '老太爷说等我，我自然来。' },
        { type: 'narration', text: '贺崇玄走到阵的外圈，把黑木杖的底端抵在地上，轻轻一点——' },
        { type: 'narration', text: '十二盏红灯，同时亮了。' },
        { type: 'narration', text: '红光沿着朱砂蔓延，像血在石缝里流动，速度很慢，很稳，是一个用了二十年心血的人，把他最精密的东西，点燃的方式。' },
        { type: 'narration', text: '阵纹贴上了苏鸢的脚踝，往上走，像某种很有耐心的东西，在试探她，确认她是它要的那种容器。' },
        { type: 'thought', text: '开始了。\n\n别动。\n\n等。' },
      ],
      choices: [
        { text: '等待——让阵走到它该走的地方', next: 651 },
      ]
    },

    // Scene 651: 终章第二幕·暗门·锁链之声
    651: {
      chapter: 'B线 · 短线 · 仪式之夜',
      content: [
        { type: 'location', text: '贺府 · 地下密室 · 亥时深' },
        { type: 'narration', text: '阵走了大约半柱香的时间。' },
        { type: 'narration', text: '贺崇玄站在外圈，低头诵读，声音压得极低，像是在和什么东西说话，而不是在念咒。苏鸢站在阵心，让那些红光慢慢从脚踝爬到膝盖，爬到腰，冷的，像蛇。' },
        { type: 'narration', text: '她体内的魂魄们，很安静。' },
        { type: 'narration', text: '不是被阵压住了——是因为她叫她们安静。她们听她的。' },
        { type: 'thought', text: '……再等一会儿。\n\n我需要他把阵走到最深处，\n才能让反转起到最大的效果。\n\n贺崇玄，你急，我不急。' },
        { type: 'narration', text: '就在这时——' },
        { type: 'narration', text: '密室最深处，有一扇苏鸢之前从未注意到的暗门，传来了一声声音。' },
        { type: 'narration', text: '不是人声。' },
        { type: 'atmos', text: '是锁链断裂的声音。' },
        { type: 'atmos', text: '「咔。」' },
        { type: 'narration', text: '像有什么东西，被释放了。' },
        { type: 'narration', text: '下一秒——整个密室的温度骤降。' },
        { type: 'narration', text: '不是阵的寒气，不是地下的潮气，是比这两样更古老、更深的冷，是某种很久没有在这个世界上出现过的东西，忽然出现了，把所有活人的气息往旁边推了一步。' },
        { type: 'narration', text: '四口棺材轻轻震了一下。' },
        { type: 'narration', text: '贺崇玄的诵读声，停了。' },
        { type: 'narration', text: '他猛地转头，看向那扇暗门，脸色是苏鸢第一次在他脸上看见的——不是温和，不是审视，是真实的、一个真正的人面对真正未知之物时，会有的那种脸色。' },
        { type: 'narration', text: '他低声吐出两个字：' },
        { type: 'dialogue', speaker: '贺崇玄', text: '……不可能。' },
        { type: 'narration', text: '黑暗里，暗门后面，有什么东西，开始说话了。' },
        { type: 'narration', text: '声音很低，带着沙哑，但不是老的沙哑——是某种非常久远的、沉睡太长时间之后的声音，像一件铸铁的东西，久到生了锈，但内里还是铁。' },
        { type: 'atmos', text: '「原来。」' },
        { type: 'atmos', text: '「是你在用我的东西。」' },
        { type: 'narration', text: '停顿了一下，那声音带着某种听起来极其危险的笑意——不是愉快的笑，是那种把一切都看进去了、又什么都不当回事的笑：' },
        { type: 'atmos', text: '「贺崇玄。」' },
        { type: 'atmos', text: '「你胆子很大。」' },
        { type: 'narration', text: '密室里，局面彻底失控了。' },
        { type: 'narration', text: '贺崇玄的阵还在运行，红光还在爬，但它的主人，此刻盯着那扇暗门，手里的黑木杖已经握紧了。' },
        { type: 'narration', text: '苏鸢站在阵心，阵纹已经缠过了她的腰，寒意顺着骨头往上走，但她没有动——她抬起头，把贺崇玄从头到脚看了一遍。' },
        { type: 'thought', text: '他怕了。\n\n贺崇玄，你怕那个声音。\n\n这张阵是你二十年的心血——\n那个声音说，你在用"他的东西"。\n\n……\n\n你《寄魂典》里的基础，\n是从哪里来的。\n\n你研究招魂、转生、续命，\n是从哪里找的第一个原本。\n\n贺崇玄——\n你偷了一个不该偷的东西，\n用了一个你以为封死了的源头。\n\n而那个源头，醒了。' },
      ],
      choices: [
        { text: '「老太爷——」开口说话，拖住他的注意力', next: 652 },
        { text: '趁乱动手——改阵的时机到了', next: 653 },
        { text: '呼唤姐姐——让她感知暗门那边是什么', next: 654 },
        { text: '等，继续等——看他们之间发生什么', next: 655 },
      ]
    },

    // Scene 652: 苏鸢开口·拖延
    652: {
      chapter: 'B线 · 短线 · 仪式之夜',
      content: [
        { type: 'narration', text: '苏鸢开口了。' },
        { type: 'narration', text: '声音不大，平静，在密室里却异常清晰：' },
        { type: 'dialogue', speaker: '苏鸢', text: '老太爷。' },
        { type: 'narration', text: '贺崇玄慢慢转过头，看着她，眼神里有什么东西，是苏鸢在他脸上第一次清楚读出来的——那不是温和老人的眼神，是一个猎手确认猎物是否还在的眼神。' },
        { type: 'dialogue', speaker: '苏鸢', text: '您说，自愿是最重要的一步。' },
        { type: 'narration', text: '她低头看了看缠在腰间的红光，再抬起眼，对着他，微微笑了一下，那个笑是她惯用的那种——温柔的，无害的，像一个真的很乖的女孩：' },
        { type: 'dialogue', speaker: '苏鸢', text: '如果您真的这么确定自己赢了——' },
        { type: 'narration', text: '她停顿了一下：' },
        { type: 'dialogue', speaker: '苏鸢', text: '那刚才那个人说话的时候，您为什么会害怕？' },
        { type: 'narration', text: '空气，一瞬间死寂了。' },
        { type: 'narration', text: '贺崇玄盯着她，那个温和的、像老师一样的笑容，消失了。完全消失了，像什么东西的壳被人剥掉，里面的不是更真实的人，是更真实的猎手。' },
        { type: 'dialogue', speaker: '贺崇玄', text: '你很聪明。' },
        { type: 'narration', text: '他慢慢说，声音恢复了平静，但那个平静，不是温和，是一个人在决定用什么方式结束一件事：' },
        { type: 'dialogue', speaker: '贺崇玄', text: '但聪明的人，往往死得更快。' },
        { type: 'narration', text: '阵纹猛地收紧。' },
        { type: 'narration', text: '红光像锁链，往苏鸢胸口扑来——' },
        { type: 'narration', text: '然后，暗门那边，又响起了那个声音。' },
        { type: 'atmos', text: '「贺崇玄。」' },
        { type: 'atmos', text: '「你还是这么急。」' },
        { type: 'narration', text: '「咔——」' },
        { type: 'narration', text: '又一声锁链断裂。这次更清晰，更重，像是某个封印的第二层，碎了。' },
        { type: 'narration', text: '整个密室震了一下，四口棺材剧烈晃动，朱砂纹路出现了一瞬间的紊乱，红光的节奏乱了——' },
        { type: 'narration', text: '贺崇玄猛地转头：' },
        { type: 'dialogue', speaker: '贺崇玄', text: '闭嘴——' },
        { type: 'narration', text: '但那声音继续，慢悠悠地，像在聊一件无关紧要的旧事：' },
        { type: 'atmos', text: '「让我猜猜。你布的是四尸锁魂阵，想用灵异体容纳双魂，完成转生。」' },
        { type: 'narration', text: '贺崇玄的瞳孔，收缩了一下。' },
        { type: 'narration', text: '苏鸢也愣了——那是贺崇玄《寄魂典》最深处的那一层，他从未对任何人说过的核心，那个声音，说得一字不差。' },
        { type: 'atmos', text: '「可惜。」' },
        { type: 'atmos', text: '「你找错人了。」' },
        { type: 'narration', text: '下一刻，一股极冷的气从暗门深处涌出来，不是风，是某种更根本的东西，阵纹在那股气里，剧烈震荡，缠在苏鸢腰间的红光——' },
        { type: 'narration', text: '啪。' },
        { type: 'narration', text: '断了一条。' },
        { type: 'narration', text: '贺崇玄抬手，强行稳住阵法，但他的手在抖，苏鸢看见了——那双二十年来把一切都算得明明白白的手，在轻微地抖。' },
        { type: 'narration', text: '贺崇玄开口，声音终于不再平静：' },
        { type: 'dialogue', speaker: '贺崇玄', text: '你不可能出来，锁魂井还没开——' },
        { type: 'narration', text: '暗门后面，脚步声响了。' },
        { type: 'narration', text: '很慢。一步，一步，像某件在深处沉睡了很久的东西，正在从黑暗里走上来，不急，因为它知道，无论走多慢，那个地方都是它要去的地方。' },
        { type: 'atmos', text: '「是吗？」' },
        { type: 'atmos', text: '「可你不是刚刚——亲手把那道门打开了吗。」' },
        { type: 'narration', text: '贺崇玄猛地看向苏鸢，眼神里，第一次有了真正的杀意——不是猎手看猎物，是一个人看见自己被算进了别人的棋盘里时，那种杀意。' },
        { type: 'dialogue', speaker: '贺崇玄', text: '原来是你。' },
        { type: 'narration', text: '红光暴涨，阵纹化作一道利刃，直刺苏鸢心口——' },
        { type: 'narration', text: '密室外，沈时序的声音传来，隔着石门，急而沉：' },
        { type: 'dialogue', speaker: '沈时序', text: '趴下！！' },
        { type: 'narration', text: '苏鸢没有趴下。' },
        { type: 'narration', text: '她闭上眼，把玉坠攥死在掌心，等那道红光落下来。' },
        { type: 'narration', text: '然后——' },
        { type: 'narration', text: '有一只手，从她侧后方伸出来。' },
        { type: 'narration', text: '轻轻的，像捏碎一根线，把那道红光握在掌心，捏碎了。' },
        { type: 'narration', text: '啪。' },
        { type: 'narration', text: '红光碎成细碎的火星，无声散去。' },
        { type: 'narration', text: '密室里，气息静止了一瞬。' },
        { type: 'narration', text: '苏鸢慢慢睁开眼，回头。' },
        { type: 'narration', text: '不知道什么时候，那个人已经站在她身后。' },
        { type: 'narration', text: '黑发，黑衣，脸色白得近于苍，像一个走出了错误地方的东西，被这个世界的光照着，还没有完全适应。' },
        { type: 'narration', text: '但他的眼睛——' },
        { type: 'narration', text: '那双暗红色的眼睛，在密室的红光里，比苏鸢见过他的任何一次，都更像是某种原本就应该在这种地方存在的东西。' },
        { type: 'narration', text: '他低头看了看脚下的阵纹，语气带了一点什么，是苏鸢在他身上第一次听见的东西——嫌弃：' },
        { type: 'dialogue', speaker: '？', text: '这么粗糙的阵。' },
        { type: 'narration', text: '然后他抬起头，看向贺崇玄，笑了一下。' },
        { type: 'narration', text: '那个笑，苏鸢见过，但从没见过这个版本——带着某种极古老的、游刃有余的危险，像一件武器，终于找到了它本来应该对着的东西。' },
        { type: 'dialogue', speaker: '？', text: '你也敢用？' },
        { type: 'narration', text: '贺崇玄的虚影，第一次，真正露出了震惊。' },
        { type: 'narration', text: '他几乎是咬着牙，从喉咙深处压出一个名字：' },
        { type: 'dialogue', speaker: '贺崇玄', text: '……是你。你怎么——' },
        { type: 'narration', text: '他轻轻挑了挑眉。' },
        { type: 'dialogue', speaker: '？', text: '还记得我啊。' },
        { type: 'narration', text: '他侧过头，那双暗红的眼睛往苏鸢身上落了一秒，像是刚刚注意到她，又像是早就注意到了，只是现在才决定说出来。' },
        { type: 'narration', text: '他低声说，那声音带着某种苏鸢听不懂的、更深层的意思：' },
        { type: 'dialogue', speaker: '？', text: '难怪我醒了。' },
        { type: 'narration', text: '停了一下，他看着苏鸢，那双眼睛里，有什么东西，比苏鸢所有见过他的时候，都更亮，更真：' },
        { type: 'dialogue', speaker: '？', text: '是你把我放出来的。' },
      ],
      choices: [
        { text: '立刻退到沈时序那边——让他们正面对峙', next: 656 },
        { text: '继续站着，看这两个人之间还有什么', next: 657 },
      ]
    },

    // Scene 653: 苏鸢趁乱改阵
    653: {
      chapter: 'B线 · 短线 · 仪式之夜',
      content: [
        { type: 'narration', text: '苏鸢没有开口。' },
        { type: 'narration', text: '贺崇玄的注意力在暗门那边，这是她唯一的窗口。' },
        { type: 'narration', text: '她低下头，眼睛沿着脚下的朱砂纹路扫，那个最核心的节点在阵心偏左三寸，她已经看了它一个多月，闭上眼都能描出它的走向。' },
        { type: 'narration', text: '她蹲下去，把玉坠的坠角抵在那个节点，用力——' },
        { type: 'narration', text: '啪。' },
        { type: 'narration', text: '不是那道节点，是暗门后面，又一条锁链断了，比上一条更重，整个密室震了一下，贺崇玄往旁边踉跄了半步——' },
        { type: 'narration', text: '就是这一步。' },
        { type: 'narration', text: '苏鸢把节点扭过来了。' },
        { type: 'thought', text: '好。' },
        { type: 'narration', text: '阵没有立刻停，但它的方向，已经变了。' },
        { type: 'narration', text: '贺崇玄稳住脚步，回头，看见苏鸢蹲在阵心，玉坠还抵在那个节点上，抬起头，平静地看着他。' },
        { type: 'narration', text: '他停了两秒，脸上的温和最终完全剥落，剩下的是他本来的样子——一个把二十年都押在这一夜的人，看见棋盘上出现了一枚他从未预料到的子，那种表情。' },
        { type: 'dialogue', speaker: '贺崇玄', text: '……是你动了阵。' },
        { type: 'narration', text: '苏鸢站起来，她没有用那副软糯的声音，只是平静地，说了一句：' },
        { type: 'dialogue', speaker: '苏鸢', text: '老太爷，您说自愿是最重要的。' },
        { type: 'narration', text: '她低下头，看着脚下已经开始往贺崇玄方向走的纹路：' },
        { type: 'dialogue', speaker: '苏鸢', text: '我愿意——让这个阵，把您欠的东西，一并还清。' },
        { type: 'narration', text: '贺崇玄的眼神彻底变了，他抬手，准备强行压回阵法——' },
        { type: 'narration', text: '然后，那个人从暗门里走出来了。' },
        { type: 'narration', text: '步子很慢，一步一步，黑发，黑衣，那双暗红的眼睛在密室的红光里，把贺崇玄从头到脚看了一遍，然后，看也没看阵法一眼，把手抬起来——' },
        { type: 'narration', text: '贺崇玄的那只正在压阵的手，被一股苏鸢感知不到来源的东西，硬生生推开了。' },
        { type: 'dialogue', speaker: '？', text: '别急，你的账还没算完。' },
      ],
      choices: [
        { text: '继续——贺崇玄与那个人的对峙', next: 656 },
      ]
    },

    // Scene 654: 呼唤姐姐感知暗门
    654: {
      chapter: 'B线 · 短线 · 仪式之夜',
      content: [
        { type: 'narration', text: '苏鸢闭上眼，把姐姐往外唤了一下，不是要她出来，只是让她感知——' },
        { type: 'thought', text: '姐，那扇门后面是什么。' },
        { type: 'narration', text: '体内的苏霜动了一下，不是拒绝，是那种碰见了某个非常古老的东西，需要一点时间确认的停顿。' },
        { type: 'narration', text: '然后，是一种感觉，不是话，是感觉——' },
        { type: 'thought', text: '……认识。\n\n姐，你认识那边的东西。\n\n不是见过，是更早的那种认识，是一个魂魄在两界之间游走时，会认识的那种存在。\n\n他是什么——\n他是那条线本身，是阴阳之间的边界。\n\n姐，他在那边，是被锁住的。\n\n贺崇玄锁住了他——\n用了他的原理，用了他的底稿，\n用锁魂井把他困在那扇门后面，\n用他的气息作为这张阵最深处的能量来源。\n\n这张阵不只是贺崇玄的。\n\n是他的。\n\n贺崇玄偷了他的东西，\n然后把他关在门后面，\n用了二十年。' },
        { type: 'narration', text: '苏鸢睁开眼，看向贺崇玄，那双眼睛里，有一点什么，从今晚以来第一次变了——不是复仇的冷，是更真实的、愤怒。' },
        { type: 'narration', text: '她把玉坠抵在节点上，用力。' },
        { type: 'narration', text: '阵的方向，改了。' },
        { type: 'narration', text: '暗门那边，锁链断了第二声，第三声——' },
        { type: 'narration', text: '贺崇玄猛地看向她：' },
        { type: 'dialogue', speaker: '贺崇玄', text: '你——' },
        { type: 'narration', text: '暗门，开了。' },
      ],
      choices: [
        { text: '继续——那个人走出来', next: 656 },
      ]
    },

    // Scene 655: 继续等·观察
    655: {
      chapter: 'B线 · 短线 · 仪式之夜',
      content: [
        { type: 'narration', text: '苏鸢没有动，没有出声，站在阵心，让红光继续缠着她，让贺崇玄以为一切在他的掌控里。' },
        { type: 'narration', text: '她看着贺崇玄，看着他转头盯着暗门，看着他手上握紧了黑木杖，看着他第一次，在这个密室里，忘记了确认她的状态。' },
        { type: 'thought', text: '这就是他最深的恐惧。\n\n不是我，不是镇异司，不是被抓。\n\n是那扇门后面那个东西。\n\n他用了它二十年，\n他知道如果它出来——\n没有任何阵法能挡。\n\n贺崇玄，\n你把它关在门后面，\n但你一直知道那道门是有裂缝的，\n所以你才二十年来，\n从没有真正睡过安稳觉。\n\n……我现在，应该做什么。' },
        { type: 'narration', text: '又一声锁链断裂，比前两声更重，整个密室都在轻微颤动。' },
        { type: 'narration', text: '贺崇玄顾不上她了——他走到暗门前，把黑木杖抵在门上，开始念一道封印的咒，声音急了，破了他二十年来的从容。' },
        { type: 'narration', text: '苏鸢抬手，把玉坠抵在节点，扭过来——' },
        { type: 'narration', text: '阵改了。' },
        { type: 'narration', text: '贺崇玄身上，红光开始往回走。' },
        { type: 'narration', text: '他察觉到了，猛地回头，但已经来不及了——暗门从里面，被推开了。' },
      ],
      choices: [
        { text: '继续——那个人走出来', next: 656 },
      ]
    },

    // Scene 656: 那个人×贺崇玄·对峙
    656: {
      chapter: 'B线 · 短线 · 对峙',
      content: [
        { type: 'location', text: '贺府 · 地下密室' },
        { type: 'narration', text: '那个人站在暗门口。' },
        { type: 'narration', text: '他低头看了看地上的阵纹，然后抬起头，把贺崇玄看了一遍，那双暗红色的眼睛里，有苏鸢在他身上从没见过的东西——不是冷漠，不是危险，是某种极漫长的、被压制了很久之后，终于可以看见那个压制者的，专注。' },
        { type: 'narration', text: '贺崇玄往后退了半步。' },
        { type: 'narration', text: '他一生从不退步，此刻退了。' },
        { type: 'dialogue', speaker: '？', text: '二十年了。' },
        { type: 'narration', text: '他只说了这三个字，语气是平的，但平的方式，是一把刀放在桌上、刃朝上的那种平。' },
        { type: 'dialogue', speaker: '贺崇玄', text: '你出不来，锁魂井——' },
        { type: 'dialogue', speaker: '？', text: '锁魂井是用来关魂魄的，不是用来关我的。' },
        { type: 'narration', text: '他走进来，每一步踩在朱砂纹路的空隙里，像在自己的地方行走一样，从容，不用看路。' },
        { type: 'dialogue', speaker: '？', text: '你用我的底稿造了这张阵，用我的气息作为能量来源，用锁魂井锁住我，让我替你维持了二十年。' },
        { type: 'narration', text: '他在阵的外圈停下，和贺崇玄之间隔着那道红光的屏障，隔着二十年。' },
        { type: 'dialogue', speaker: '？', text: '贺崇玄，你研究了很多东西。但你没有研究过——一个困了二十年的东西，被放出来之后，会先做什么。' },
        { type: 'narration', text: '贺崇玄抬起黑木杖，阵法强行收紧，把那个人往外圈压——' },
        { type: 'narration', text: '他没有动，那道红光压到他身上，像压到了一堵墙。' },
        { type: 'narration', text: '然后，从他身上，散出来一股气——不是阵气，是比阵更古老、更根本的气，是这张阵所有纹路的来源，是它的底，是它的根。' },
        { type: 'narration', text: '阵，开始认它的主人了。' },
        { type: 'narration', text: '贺崇玄的脸色白了。' },
        { type: 'narration', text: '红光开始反向，纹路开始自己调转走向，往贺崇玄的方向走，不是苏鸢改的节点，是整张阵，在认出了它原本属于谁，开始往回走。' },
        { type: 'narration', text: '贺崇玄抬手想强压——' },
        { type: 'narration', text: '苏鸢趁这一刻，把玉坠压进阵心节点，最后一把力。' },
        { type: 'narration', text: '两股力合在一起，阵纹啪的一声，把贺崇玄锁在了原地。' },
        { type: 'narration', text: '他无法动了。' },
        { type: 'narration', text: '密室的石门，从外面，被沈时序撞开了。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '苏鸢站在阵心，把玉坠握在手里，闭上眼，低头：' },
        { type: 'dialogue', speaker: '苏鸢', text: '苏霜。' },
        { type: 'narration', text: '姐姐的那一缕，在最深处，安静地，散了开去。' },
        { type: 'narration', text: '不是消失，是——回家了。' },
        { type: 'thought', text: '姐。\n\n我来了。\n\n我做完了。\n\n你走吧，好好走。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '贺崇玄被押走，镇异司的人清场，密室里的四口棺材被打开，里头的四个女孩，还在，还活着，只是沉睡。' },
        { type: 'narration', text: '沈时序走到苏鸢旁边，在她身旁站了一会儿，没有说话，只是把手搭在她肩上，轻轻压了一下，然后松开。' },
        { type: 'narration', text: '是他的方式，苏鸢懂。' },
      ],
      choices: [
        { text: '天亮，去找那个人——', next: 657 },
        { text: '天亮，去找裴凛——', next: 658 },
      ]
    },

    // Scene 657: 天亮·尾声（找那个人）
    657: {
      chapter: 'B线 · 短线隐藏线 · 尾声',
      chapterShort: '尾声',
      content: [
        { type: 'location', text: '贺府外 · 天亮之前' },
        { type: 'narration', text: '天亮的时候，苏鸢坐在贺府门口的石阶上，把那枚裂了缝的玉坠攥在掌心，感觉它现在轻了一点，像是有什么东西从里面散出去了，腾了空。' },
        { type: 'narration', text: '那个人从侧边走来，在她旁边站住，没有坐，只是站着，把手插在袖里，往前看。' },
        { type: 'narration', text: '他身上那股气，和昨夜密室里不同了——昨夜是刚出来的，是锋利的，是二十年憋着的那种。现在安静了，是苏鸢熟悉的那种安静，深的，沉的，在什么地方一直都在的。' },
        { type: 'narration', text: '两人都没有先开口。' },
        { type: 'narration', text: '天色从墨蓝变成深灰，变成浅灰，远处的屋檐线开始清晰起来。' },
        { type: 'narration', text: '苏鸢先开口：' },
        { type: 'dialogue', speaker: '苏鸢', text: '昨晚，是我把那道门打开的。' },
        { type: 'narration', text: '不是道歉，是陈述。' },
        { type: 'dialogue', speaker: '？', text: '我知道。' },
        { type: 'dialogue', speaker: '苏鸢', text: '你说，是我放你出来的。' },
        { type: 'narration', text: '他转过头，看着她，那双暗红的眸子在晨光里，带着一种苏鸢没法准确描述的东西——不是感谢，是更深的某种确认：' },
        { type: 'dialogue', speaker: '？', text: '你改了节点，阵的方向变了，锁魂井的封印松了，暗门开了一条缝——是你做的。' },
        { type: 'dialogue', speaker: '苏鸢', text: '那是意外，不是我故意的。' },
        { type: 'narration', text: '他沉默了一下，然后极轻地，笑了：' },
        { type: 'dialogue', speaker: '？', text: '我知道是意外。' },
        { type: 'narration', text: '他低下头，看着自己的手——白的，长的，今晚之前，那上面有一层苏鸢从没在活人身上见过的、被困住太久的颜色，现在，那层颜色，淡了一点。' },
        { type: 'dialogue', speaker: '？', text: '但意外也是真的。钥匙不需要知道自己是钥匙，才能开锁。' },
        { type: 'narration', text: '苏鸢看着他，把这句话在心里转了一遍，没有问"钥匙"是什么意思，只是问：' },
        { type: 'dialogue', speaker: '苏鸢', text: '你之前说，曾经是人。' },
        { type: 'dialogue', speaker: '？', text: '嗯。' },
        { type: 'dialogue', speaker: '苏鸢', text: '那个人，叫什么名字？' },
        { type: 'narration', text: '很长时间的沉默，长到屋檐上的鸟叫了两声，远处有人开始推车了，长到苏鸢以为他不打算回答了。' },
        { type: 'narration', text: '然后，极轻地：' },
        { type: 'dialogue', speaker: '？', text: '……忘了。' },
        { type: 'narration', text: '苏鸢没有说"没关系"，没有说"那算了"，只是把那两枚棋子——白的，黑的——从袖里取出来，放在他掌心里，合上他的手指。' },
        { type: 'dialogue', speaker: '苏鸢', text: '那你现在叫什么？' },
        { type: 'narration', text: '他低头，看了一会儿手心里的两枚棋子，然后，极轻，说出来一个名字：' },
        { type: 'dialogue', speaker: '？', text: '……赤夜轩。' },
        { type: 'narration', text: '苏鸢第一次，听见这个名字。' },
        { type: 'thought', text: '赤夜轩。\n\n……\n\n好。\n\n我记着了。' },
        { type: 'narration', text: '他低头，看着自己握着棋子的那只手，很久，没有动。' },
        { type: 'narration', text: '然后他抬起眼，看着苏鸢，那双暗红的眸子里，有什么东西，是苏鸢从来没有在任何人脸上见过的——' },
        { type: 'atmos', text: '像是某种非常古老的、已经习惯独自存在的东西，第一次，感觉到了被接住。' },
        { type: 'div', text: '· B线 · 短线隐藏线 · 完 ·' },
        { type: 'atmos', text: '锁不需要钥匙，也能一直锁着。' },
        { type: 'atmos', text: '但被钥匙触碰过的锁，会记住那个形状。' },
      ],
      choices: [
        { text: '· B线短线隐藏线·完 · 探索其他路线——', next: 0 },
      ]
    },

    // Scene 658: 天亮·找裴凛·短线结局
    658: {
      chapter: 'B线 · 短线 · 尾声（裴凛）',
      chapterShort: '尾声',
      content: [
        { type: 'location', text: '贺府外 · 天亮之前' },
        { type: 'narration', text: '贺崇玄被押走了。密室里的四个女孩还活着，镇异司的人在清场。' },
        { type: 'narration', text: '苏鸢走出贺府的侧门，在外面的石阶上坐了一会儿，把玉坠握在手心。' },
        { type: 'narration', text: '姐姐那一缕已经散了，散得很安静，不是消失，是回家了。' },
        { type: 'thought', text: '姐。\n\n我做完了。\n\n你走好。' },
        { type: 'narration', text: '天色开始变亮，墨蓝变成深灰，远处屋檐的线开始清晰。' },

        { type: 'div', text: '◆' },
        { type: 'narration', text: '济安医馆的灯还亮着。' },
        { type: 'narration', text: '她推开门，裴凛坐在椅子上，手里还拿着那卷册子，像是一整夜没动过。他听见门响，抬起头，看见她，没有说话，只是把册子放下来。' },
        { type: 'narration', text: '苏鸢走进去，在他对面坐下。' },
        { type: 'dialogue', speaker: '苏鸢', text: '……做完了。' },
        { type: 'narration', text: '裴凛看着她，那双眼睛里有什么东西，他没有说出来，只是站起来，走到药架前，取了一瓶药膏，放在她手边：' },
        { type: 'dialogue', speaker: '裴凛', text: '根节的伤，今晚加重了。把这个涂上。' },
        { type: 'narration', text: '苏鸢接过来，没有动，只是捏在手里，低头：' },
        { type: 'dialogue', speaker: '苏鸢', text: '……你之前说，带我离开这座城。' },
        { type: 'narration', text: '裴凛停了一下。' },
        { type: 'narration', text: '然后他在她旁边坐下，没有靠近，只是坐着，往前看，声音平：' },
        { type: 'dialogue', speaker: '裴凛', text: '说过。' },
        { type: 'dialogue', speaker: '苏鸢', text: '那个……还算数吗。' },
        { type: 'narration', text: '很长的沉默。' },
        { type: 'narration', text: '然后，裴凛转过头，看着她，那双眼睛里，是苏鸢在他脸上第一次见到的——不是冷淡，不是克制，是非常平静的、真实的，确认：' },
        { type: 'dialogue', speaker: '裴凛', text: '算数。' },
        { type: 'narration', text: '苏鸢低头，看着手心里的药膏和玉坠，没有说话。' },
        { type: 'thought', text: '算数。\n\n……\n\n好。\n\n那我们走。' },
        { type: 'atmos', text: '天亮了。' },
        { type: 'atmos', text: '灯还亮着，窗外有鸟叫了一声，然后是第二声。' },
        { type: 'div', text: '· B线短线 · 完 ·' },
        { type: 'atmos', text: '没有什么是不能慢慢治好的。' },
        { type: 'atmos', text: '裴凛不信这句话，但他一直在找能让他信的证据。' },
        { type: 'atmos', text: '她不知道自己算不算那个证据。' },
        { type: 'atmos', text: '但她愿意，让他找找看。' },
      ],
      choices: [
        { text: '· B线短线·完 · 探索其他路线——', next: 0 },
      ]
    },




    // Scene 700: B线·过渡·普通药馆·传言·夜探
    700: {
      chapter: 'B线 · 第一幕 · 山中医馆',
      chapterShort: 'B线',
      content: [
        { type: 'chapter-title', text: 'B线', sub: '— 山中医馆 —' },
        { type: 'location', text: '街角药馆 · 午后' },
        { type: 'narration', text: '那家药馆不大，进门是一股陈年草药的气息，柜台后头坐着个头发花白的老大夫，见她进来，不等她开口，先看了眼她手臂，招手让她坐：' },
        { type: 'dialogue', speaker: '老大夫', text: '蹭破的，不深，上点药就好。' },
        { type: 'narration', text: '苏鸢在柜台边坐下，老大夫取了药箱来处理，手法熟练，不一会儿就包扎好了。' },
        { type: 'narration', text: '就在这时，药馆另一侧进来了个人，五十来岁，脸色不太好，一进门就叹气：' },
        { type: 'dialogue', speaker: '来人', text: '老先生，上次您开的药，吃了还是没什么用，您看——' },
        { type: 'narration', text: '老大夫接过他的手腕把了把脉，眉头皱起来，沉吟了一下：' },
        { type: 'dialogue', speaker: '老大夫', text: '你这个毛病，说难不难，说好治也不好治，是经脉里有什么东西积着，普通的药方压不住根，我是真的没把握。' },
        { type: 'narration', text: '来人愁眉苦脸：' },
        { type: 'dialogue', speaker: '来人', text: '那可怎么办，这都半年了。' },
        { type: 'narration', text: '老大夫想了想，压低声音，像是在说什么不太确定的事：' },
        { type: 'dialogue', speaker: '老大夫', text: '城边山那头，有一家医馆，门口挂着济安的灯笼，那里的大夫，我见过他一次，是真有本事，这种积症他拿得住。' },
        { type: 'dialogue', speaker: '来人', text: '哦？那我去找他！' },
        { type: 'dialogue', speaker: '老大夫', text: '话是这么说，但那人行踪不定，经常云游在外，不一定找得到人。而且……' },
        { type: 'narration', text: '他顿了顿：' },
        { type: 'dialogue', speaker: '老大夫', text: '他年纪不大，但来历深，不是普通大夫，听说是什么传承下来的。不是一般的积症，他不接。' },
        { type: 'narration', text: '苏鸢在旁边，把这段对话听进去了。' },
        { type: 'thought', text: '城边山，济安医馆。\n\n行踪不定，经常云游。\n\n来历深，不是普通大夫，不一般的积症才接。\n\n……先记着。' },
        { type: 'narration', text: '她把药钱放在柜台上，走出去了。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '之后几日，苏鸢白天在书院，照常上课，照常在人前维持那副柔软无害的样子，手臂的小伤在愈合，一切如常。' },
        { type: 'narration', text: '夜里，她在做另一件事。' },
        { type: 'narration', text: '贺府的外围，她已经绕着走了三圈，摸清楚了大半——大门、侧门、后门的守卫轮换，各处灯火的规律，哪处墙根有暗桩，哪段围墙是空档。' },
        { type: 'narration', text: '还差一处：后院。' },
        { type: 'narration', text: '贺崇玄那本《寄魂典·续》里记载的实验地点，在贺府后院以下，地窖再往深处，是她最终要进去的地方，也是她现在最看不清楚的地方。' },
        { type: 'narration', text: '某一夜，她翻墙进了后院。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '后院比她预想的静，静得不正常，月色被云遮着，黑沉沉的。' },
        { type: 'narration', text: '苏鸢往里走了十步，脚下，踩进了某样东西里。' },
        { type: 'narration', text: '她感觉到了，是阵——不是普通的守卫阵，是某种专门针对她这类体质的感应阵，一旦有寄宿体质的人踩进来，它会直接探入，抓住体内魂魄的聚合处，往外扯。' },
        { type: 'narration', text: '那股力道，直接抓住了她胸口。' },
        { type: 'narration', text: '苏鸢当即往后撤，翻出墙，跌在外头的草地上，手捂着胸口，那里有什么东西，正在往外渗，压都压不住。' },
        { type: 'thought', text: '……感应阵。\n\n贺崇玄早就防着有人来查。\n\n这道阵是专门针对灵异体质的——\n他知道有人会来，\n知道来的人会是这种体质。\n\n胸口这里……\n\n这是根节，体内所有魂魄聚集的位置，\n那道阵扯到了根节，\n往外渗的这股东西，\n不是伤，是……某种在松动的东西。\n\n不能在这里待着。\n\n走。' },
        { type: 'narration', text: '她撑着站起来，往城外走，走上了山路，走到腿软，走到前头出现了灯光——' },
        { type: 'narration', text: '一盏旧灯笼，上面两个字：济安。' },
        { type: 'thought', text: '……就是这里。' },
        { type: 'narration', text: '她推开门，倒进去了。' },
      ],
      choices: [
        { text: '继续——', next: 70 },
      ]
    },

    // Scene 70: B线·第一幕·山中医馆·初遇
    70: {
      chapter: 'B线 · 第一幕 · 山中医馆',
      chapterShort: 'B线',
      content: [
        { type: 'chapter-title', text: 'B线', sub: '— 山中医馆 —' },
        { type: 'location', text: '城郊山路 · 某日夜间' },
        { type: 'narration', text: '苏鸢是在单独刺探贺府外围的那夜出的事。' },
        { type: 'narration', text: '计划本来很简单——摸清楚贺府后门的轮换规律，绕开守卫，进去看一眼地形。' },
        { type: 'narration', text: '但贺府后院有东西。' },
        { type: 'narration', text: '不是守卫，是某种她感知不到来源的阵气，漫在后院的暗处，等着什么东西踩进去。' },
        { type: 'narration', text: '苏鸢踩进去了。' },
        { type: 'narration', text: '阵气像一只手，直接探进了她的胸腔，抓住了什么，往外扯。' },
        { type: 'narration', text: '她体内的魂魄们乱了，集体往一处涌，有的往外冲，有的往内缩，那种拉扯让她站不住脚，跌在院墙外的草丛里，手捂着胸口，感觉那里有什么东西，正在裂开。' },
        { type: 'thought', text: '……阵。\n\n贺崇玄在后院布了一张感应阵，\n专门针对灵异体质的——\n他早就防着有人来查。\n\n我中了。\n\n胸口的那个地方，\n是姐姐最先寄进来的位置，\n也是我体内所有魂魄的根节，\n那张阵扯到了那里。\n\n……不能在这里。\n\n走。先走。' },
        { type: 'narration', text: '她不知道自己走了多久，只知道走出了城，走上了山路，走到腿软为止。' },
        { type: 'narration', text: '然后，前面有灯光。' },
        { type: 'narration', text: '一间医馆，偏僻，安静，门口挂着一盏旧灯笼，上面写着"济安"两个字，字迹是旧的，但灯是新的。' },
        { type: 'narration', text: '苏鸢在门口站了两秒，然后推开了门，倒进去。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '她半昏迷，但意识还在。' },
        { type: 'narration', text: '她听见脚步声，沉稳，不快，是一个不着急的人，走到她旁边，蹲下来。' },
        { type: 'narration', text: '然后是一个声音，冷，平，像在陈述一件无关紧要的事实：' },
        { type: 'dialogue', speaker: '裴凛', text: '还活着。' },
        { type: 'narration', text: '停顿了一下。' },
        { type: 'dialogue', speaker: '裴凛', text: '可惜。' },
        { type: 'narration', text: '有人把她的手腕翻过来，两根指头搭上去，开始把脉，力道很稳，不轻不重。' },
        { type: 'narration', text: '苏鸢费力地睁开眼。' },
        { type: 'narration', text: '穿白衣的人，低着头，高大，却没有压迫感，是那种精干的体型，一看便知不是养尊处优的人。黑发，长而直，只半束起来，余下的垂在肩侧，松松的，带着一点刚从案台抬头的散漫。' },
        { type: 'narration', text: '侧脸线条干净，眉骨略重，眉峰有一点锋利；再往下，绿棕色的眸子，此刻只看着她的手腕，沉静，凉，是那种看诊十年才磨出来的不带温度的专注。' },
        { type: 'narration', text: '若是换个地方、换个时候，会有人说这人长得极好——那种经典的、清冷的、初见令人不敢多看的好看，气质里有一种天然的距离感，像座山，不招人，但叫人忍不住抬头。' },
        { type: 'narration', text: '但此刻苏鸢没有力气想这些，只是盯着他。' },
        { type: 'narration', text: '他感觉到她醒了，抬起眼，看了她一眼，表情没有任何变化：' },
        { type: 'dialogue', speaker: '裴凛', text: '醒了？' },
        { type: 'narration', text: '苏鸢想开口，他打断：' },
        { type: 'dialogue', speaker: '裴凛', text: '醒了就别装死，费灯油。' },
        { type: 'thought', text: '……这个人，\n\n说话很难听。' },
        { type: 'narration', text: '但她没有力气反驳，只是看着他继续把脉。' },
        { type: 'narration', text: '他的眉头，在某一刻，微微皱了一下。' },
        { type: 'narration', text: '然后他抬起头，直视着她，第一次，认真看了她一眼——不是看病人，是看某个让他产生了疑问的东西：' },
        { type: 'dialogue', speaker: '裴凛', text: '你体内，有几个人？' },
        { type: 'narration', text: '苏鸢盯着他，没有回答。' },
        { type: 'dialogue', speaker: '裴凛', text: '不说也行。' },
        { type: 'narration', text: '他站起来，去取药箱，声音淡淡的：' },
        { type: 'dialogue', speaker: '裴凛', text: '反正你不说，我也能查出来。' },
      ],
      choices: [
        { text: '「你说的「几个人」是什么意思？」——装不懂，先探他底。', next: 71 },
        { text: '沉默，先让他处理伤口，把脉这件事，之后再说。', next: 71 },
      ]
    },

    // Scene 71: 第一夜·上药·脉案
    71: {
      chapter: 'B线 · 第一幕 · 山中医馆',
      content: [
        { type: 'location', text: '济安医馆 · 内室 · 夜' },
        { type: 'narration', text: '裴凛没有追问她，把她挪到内室的榻上，取了药箱，坐在她旁边，打开衣领处，低头看那道胸口的伤。' },
        { type: 'narration', text: '他看了很长时间，没有说话。' },
        { type: 'narration', text: '那道"伤"不是普通的伤——它没有血，没有裂口，只是在皮肤表面，有一道淡淡的纹路，像某种字符的残影，若不是在灯下靠近了看，根本看不出来。' },
        { type: 'narration', text: '但苏鸢知道，那道纹路下面，是她体内所有魂魄聚集的根节，是今晚被贺崇玄的阵扯到的地方，现在那里，像是有什么东西，在以非常缓慢的速度，往外渗。' },
        { type: 'thought', text: '……他在看什么。\n\n他能看出来吗。' },
        { type: 'narration', text: '裴凛最终开口，声音是平的：' },
        { type: 'dialogue', speaker: '裴凛', text: '这不是外伤。' },
        { type: 'dialogue', speaker: '苏鸢', text: '我知道。' },
        { type: 'dialogue', speaker: '裴凛', text: '是根节损伤，有东西扯动了你体内魂魄的聚合点。' },
        { type: 'narration', text: '他说这话的语气，像在说"你有点发烧"，平静，精准，像对这类事情并不陌生。' },
        { type: 'thought', text: '他认识这个。\n\n"根节"——这个词，\n不是普通大夫会用的词。\n\n他见过这种情况。' },
        { type: 'narration', text: '苏鸢试探地问：' },
        { type: 'dialogue', speaker: '苏鸢', text: '……你知道这是什么？' },
        { type: 'narration', text: '裴凛没有立刻回答，去药箱里取了一支细管，里头是透明的液体，他把管口对着那道纹路，轻轻压上去。' },
        { type: 'narration', text: '那道纹路，在药液接触的一瞬间，微微亮了一下，是非常淡的蓝白色，然后暗下去，那股往外渗的感觉，缓了。' },
        { type: 'narration', text: '苏鸢轻轻出了口气，没想到会这么快起效。' },
        { type: 'dialogue', speaker: '裴凛', text: '见过类似的。' },
        { type: 'narration', text: '他收起细管，重新坐直，看着她：' },
        { type: 'dialogue', speaker: '裴凛', text: '你叫什么。' },
        { type: 'dialogue', speaker: '苏鸢', text: '苏鸢。' },
        { type: 'dialogue', speaker: '裴凛', text: '苏鸢，你体内的魂魄数量，比我见过的任何一个案例都多。这道根节损伤，今晚我能稳住，但不能根治。' },
        { type: 'narration', text: '他把药箱合上，站起来：' },
        { type: 'dialogue', speaker: '裴凛', text: '你今晚不能走。明天再说。' },
        { type: 'narration', text: '苏鸢盯着他的背影，问：' },
        { type: 'dialogue', speaker: '苏鸢', text: '你叫什么？' },
        { type: 'narration', text: '他走到门口，没有回头：' },
        { type: 'dialogue', speaker: '裴凛', text: '裴凛。' },
        { type: 'narration', text: '门关上了。' },
        { type: 'narration', text: '苏鸢躺在榻上，盯着屋顶的梁，把今晚的事从头捋了一遍，然后，在某一处，停了下来。' },
        { type: 'thought', text: '裴凛。\n\n济安医馆。\n\n他知道"根节"，知道那道纹路是什么，手里有能稳住它的药——\n\n这个人，不是普通的大夫。\n\n……先养伤。\n\n但要弄清楚他是谁。' },
      ],
      choices: [
        { text: '养伤，同时观察他——裴凛这个人，值得弄清楚', next: 72 },
      ]
    },

    // Scene 72: 第二阶段·医馆的日子·发现
    72: {
      chapter: 'B线 · 第二幕 · 脉案',
      chapterShort: '第二幕',
      content: [
        { type: 'chapter-title', text: '第二幕', sub: '— 脉案 —' },
        { type: 'location', text: '济安医馆 · 数日' },
        { type: 'narration', text: '裴凛每天给她换药，一天两次，早晨和傍晚，雷打不动。' },
        { type: 'narration', text: '他不多说话，换药就换药，把脉就把脉，记录就记录——他有一本很厚的册子，每次诊完，都会在里头写几行字，字迹极细，苏鸢侧头看了一眼，没看清楚。' },
        { type: 'narration', text: '第三天，苏鸢忍不住问：' },
        { type: 'dialogue', speaker: '苏鸢', text: '那本册子写的什么？' },
        { type: 'dialogue', speaker: '裴凛', text: '病例。' },
        { type: 'dialogue', speaker: '苏鸢', text: '我的？' },
        { type: 'dialogue', speaker: '裴凛', text: '你是第一例。' },
        { type: 'narration', text: '苏鸢停了一下：' },
        { type: 'dialogue', speaker: '苏鸢', text: '第一例什么？' },
        { type: 'narration', text: '他把笔放下，看着她，措辞了一下：' },
        { type: 'dialogue', speaker: '裴凛', text: '医书上管你这种体质叫"众灵渡"——多枚魂魄寄居同一活人体内，且宿主能与之共存，不排斥，不失智。极罕见。' },
        { type: 'atmos', text: '众灵渡。' },
        { type: 'thought', text: '众灵渡。\n\n不是"灵异体"，\n不是贺崇玄那本书里的"实验体"——\n\n是"众灵渡"。\n\n她们寄在我身上，是在渡，不是在被困。\n\n……这个名字，\n比贺崇玄叫我的任何称呼，\n都要好。' },
        { type: 'narration', text: '苏鸢低下头，没有说话，把这个词在心里压了一下。' },
        { type: 'narration', text: '裴凛没有再解释，重新拿起笔，继续记录，但他说了一句：' },
        { type: 'dialogue', speaker: '裴凛', text: '你的伤口每天都在变。' },
        { type: 'dialogue', speaker: '苏鸢', text: '变好还是变坏？' },
        { type: 'dialogue', speaker: '裴凛', text: '都不是。' },
        { type: 'narration', text: '他停顿了一下：' },
        { type: 'dialogue', speaker: '裴凛', text: '是在适应。像活的东西在适应一个新的状态。' },
        { type: 'narration', text: '苏鸢抬头，认真地看着他：' },
        { type: 'dialogue', speaker: '苏鸢', text: '你见过这种情况？' },
        { type: 'narration', text: '裴凛把笔放下，沉默了一会儿，然后站起来，去另一个架子上取了一本更旧的册子，放在她面前。' },
        { type: 'narration', text: '册子的封面，写着四个字：' },
        { type: 'atmos', text: '《三魂案录》' },
        { type: 'narration', text: '苏鸢看着那四个字，没有动。' },
        { type: 'narration', text: '裴凛在对面坐下，语气是平的，但那种平，是一个人把某件事在心里压了很久、已经不必用任何情绪包裹它的平：' },
        { type: 'dialogue', speaker: '裴凛', text: '我师妹，三年前，被人用邪术抽走了三魂，我没有救回来。' },
        { type: 'narration', text: '他停了一下：' },
        { type: 'dialogue', speaker: '裴凛', text: '那个案子，我查了三年，查到用那种邪术的人，有据可查的，一共二十一例，全是年轻女性，失踪或者死亡，官府全都结案为意外。' },
        { type: 'narration', text: '苏鸢的手，在膝上，微微收紧了。' },
        { type: 'thought', text: '二十一例。\n\n年轻女性，三魂被抽——\n\n贺崇玄《寄魂典》里的实验记录，\n第一部分，理论章节，\n有一段关于"三魂导引"的描述，\n是他整个体系最早期的实验基础。\n\n二十一例。\n\n裴凛，\n你查的，\n和我要追的，\n是同一条线上的人。' },
        { type: 'narration', text: '她没有说话，只是把那本《三魂案录》往自己方向转了过来，低头，翻开了。' },
      ],
      choices: [
        { text: '看下去——看他记录的二十一例', next: 73 },
      ]
    },

    // Scene 73: 两人拼出答案
    73: {
      chapter: 'B线 · 第二幕 · 脉案',
      content: [
        { type: 'location', text: '济安医馆 · 内室 · 灯下' },
        { type: 'narration', text: '苏鸢翻那本册子，翻得很慢，每一页都看完。' },
        { type: 'narration', text: '裴凛没有催她，也没有离开，只是在对面坐着，低头研墨，像在等什么。' },
        { type: 'narration', text: '二十一例，每一例都有时间、地点、受害者的简要描述，以及他查到的线索——有些线索断了，有些还有余头，最后几页，那些余头汇成了一个方向。' },
        { type: 'narration', text: '苏鸢把最后一页看完，合上册子，沉默了很长时间。' },
        { type: 'narration', text: '裴凛抬起头，等她。' },
        { type: 'narration', text: '苏鸢没有立刻开口。她在做一个决定——把多少告诉他，换他把多少告诉她。' },
        { type: 'thought', text: '他查了三年。\n\n二十一例里，有七例，时间和地点，\n和贺崇玄名下产业的扩张记录高度重合——\n我在书院特藏室查到过那些记录，\n当时没有把这两件事联系在一起，\n现在对上了。\n\n裴凛快拼出来了，\n但他缺一样东西——\n他缺一个把所有线索串起来的核心。\n\n那个核心，是《寄魂典》，\n是贺崇玄。\n\n我有。' },
        { type: 'narration', text: '她开口，声音很平：' },
        { type: 'dialogue', speaker: '苏鸢', text: '你册子里第七例和第十二例，地点都在城东，时间相隔一个月——那两个月，贺崇玄家的船队在城东有一个驿站，名义上是做茶叶生意。' },
        { type: 'narration', text: '裴凛的手，停了。' },
        { type: 'dialogue', speaker: '苏鸢', text: '第十九例，是书院女学生，失踪前去过贺府做客。这个你应该查到过。' },
        { type: 'dialogue', speaker: '裴凛', text: '查到过。但贺府和三魂案之间，我没有找到直接证据。' },
        { type: 'dialogue', speaker: '苏鸢', text: '直接证据在一本书里，叫《寄魂典》，是他写的，现在藏在书院特藏室，以《杂谈录》的名字登记。' },
        { type: 'narration', text: '裴凛放下墨条，在灯光里，直视着她。' },
        { type: 'narration', text: '苏鸢也看着他，不回避。' },
        { type: 'narration', text: '两人沉默了大约十息，然后裴凛开口，声音比平时更低：' },
        { type: 'dialogue', speaker: '裴凛', text: '你查贺崇玄，查了多久了。' },
        { type: 'dialogue', speaker: '苏鸢', text: '比你短，但进得比你深。' },
        { type: 'narration', text: '裴凛看着她，那双眼睛，平时是冷的，此刻不是冷，是某种被什么东西击中了之后，需要一点时间重新校准的表情。' },
        { type: 'narration', text: '他问，声音极轻：' },
        { type: 'dialogue', speaker: '裴凛', text: '你和他，是什么关系。' },
        { type: 'narration', text: '苏鸢低下头，看了一眼那本《三魂案录》，然后抬起眼：' },
        { type: 'dialogue', speaker: '苏鸢', text: '你的师妹是第几例？' },
        { type: 'narration', text: '裴凛的下颌，微微绷了一下。' },
        { type: 'dialogue', speaker: '裴凛', text: '……第八例。' },
        { type: 'dialogue', speaker: '苏鸢', text: '我姐姐，是贺崇玄更早的一次，不在你的记录里。她的魂魄，现在寄在我身上。' },
        { type: 'narration', text: '灯火在两人之间燃着，把这间小小的医馆室内，照得暖而静。' },
        { type: 'narration', text: '外面是山，是夜，是很深的安静。' },
        { type: 'narration', text: '裴凛没有说话，他把那本《三魂案录》拿回来，翻到第八页，苏鸢看见那页上写了很多，字迹比其他页更密，有几处被涂掉了，又重写，像是某种被反复改过的东西。' },
        { type: 'narration', text: '他把册子合上，重新放回架上，背对着她站了一会儿。' },
        { type: 'narration', text: '然后转身，在她对面坐下，声音恢复了那个平静，但平静里有什么东西，变了：' },
        { type: 'dialogue', speaker: '裴凛', text: '你打算怎么做。' },
        { type: 'dialogue', speaker: '苏鸢', text: '进贺府，找到证据，当着所有人的面，让他一败涂地，再亲手——' },
        { type: 'narration', text: '她停了一下。' },
        { type: 'dialogue', speaker: '苏鸢', text: '总之，让他为那些人还债。' },
        { type: 'narration', text: '裴凛听完，沉默了很长时间。' },
        { type: 'narration', text: '然后说：' },
        { type: 'dialogue', speaker: '裴凛', text: '我的想法不一样。' },
        { type: 'narration', text: '苏鸢看着他：' },
        { type: 'dialogue', speaker: '裴凛', text: '证据要揭，罪要定，但人不是你杀。' },
        { type: 'dialogue', speaker: '苏鸢', text: '为什么。' },
        { type: 'dialogue', speaker: '裴凛', text: '因为你杀了他，你就成了和他一样的人，用死亡偿还死亡。' },
        { type: 'narration', text: '苏鸢盯着他，眼神里有什么东西，冷了下来：' },
        { type: 'dialogue', speaker: '苏鸢', text: '你没有资格说这种话。你的师妹不在了，我姐姐寄在我身上——我们承受的，不一样。' },
        { type: 'narration', text: '裴凛没有争，只是看着她，很平静地说：' },
        { type: 'dialogue', speaker: '裴凛', text: '我知道不一样。' },
        { type: 'narration', text: '他站起来，去把灯芯拨了一下，火亮了一点：' },
        { type: 'dialogue', speaker: '裴凛', text: '你先把伤养好。怎么做，养好了再说。' },
        { type: 'thought', text: '他没有赢我，也没有输给我。\n\n他只是说了"不一样"，然后把这件事搁下了。\n\n裴凛，\n你说"用死亡偿还死亡"，\n是因为你真的相信这句话，\n还是因为你也想过，\n然后告诉自己不能这么做？\n\n……先养伤。\n\n他说得对，这一点上，他说得对。' },
      ],
      choices: [
        { text: '养伤——在医馆的日子，慢慢长了', next: 74 },
      ]
    },

    // Scene 74: 第三幕·上药·情绪失控·心软
    74: {
      chapter: 'B线 · 第三幕 · 压制',
      chapterShort: '第三幕',
      content: [
        { type: 'chapter-title', text: '第三幕', sub: '— 压制 —' },
        { type: 'location', text: '济安医馆 · 数日后' },
        { type: 'narration', text: '在医馆住下来的日子，比苏鸢预想的，要长。' },
        { type: 'narration', text: '胸口的伤——裴凛叫它"根节损伤"——稳住之后并不意味着好了，它需要定期压制，否则那股往外渗的气会慢慢侵蚀周围，让她体内的魂魄聚合状态变得不稳。' },
        { type: 'narration', text: '所以每天两次，他坐在她旁边，用那支细管，把药液压进那道纹路。' },
        { type: 'narration', text: '每次大约需要一炷香的时间。' },
        { type: 'narration', text: '他靠得很近，因为必须靠近，那道纹路只有在极近的距离才能看清楚走向，药液要压进正确的位置，否则不起效。' },
        { type: 'narration', text: '那种近，是苏鸢这辈子少有的——不是进攻的近，不是算计的近，是某个人低着头，认认真真地把注意力放在她胸口那道伤上，什么别的都不在意的近。' },
        { type: 'thought', text: '……他的睫毛。\n\n这个念头出来的时候，苏鸢自己都愣了一下。\n\n她压下去，重新把注意力放到别处。' },
        { type: 'narration', text: '某次换药，他的手轻轻压住那道纹路的边沿，苏鸢不自觉地轻吸了口气。' },
        { type: 'narration', text: '他没有抬头，只是说：' },
        { type: 'dialogue', speaker: '裴凛', text: '别紧张。' },
        { type: 'narration', text: '停了一下，又加了一句：' },
        { type: 'dialogue', speaker: '裴凛', text: '我对病人没兴趣。' },
        { type: 'narration', text: '苏鸢："……"' },
        { type: 'thought', text: '他说这句话的时候，\n\n耳朵后面有一点红。\n\n我没有说任何话，他就加了这句。\n\n……裴凛，\n你这是，在解释给谁听。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '某天夜里，苏鸢发烧了。' },
        { type: 'narration', text: '是胸口的伤引发的，根节损伤在发热时会加速，那股往外渗的气变得更急，体内的魂魄们乱成一团。' },
        { type: 'narration', text: '她迷迷糊糊地，听见有人在旁边，动作轻，声音没有，只是不停地在换冷巾，在把脉，在把那支细管又抵上去压了一次。' },
        { type: 'narration', text: '天亮的时候，烧退了，她清醒过来，看见裴凛坐在榻边的椅子上，椅背靠着，头微微垂着，像是睡着了，但手还搭在她的手腕上，没有放。' },
        { type: 'narration', text: '苏鸢盯着他，盯了一会儿，轻声说：' },
        { type: 'dialogue', speaker: '苏鸢', text: '你整晚没走？' },
        { type: 'narration', text: '他睁开眼，看了她一眼，把手从她手腕上收回来，端正坐好，声音还带着没睡醒的沙哑：' },
        { type: 'dialogue', speaker: '裴凛', text: '麻烦。' },
        { type: 'dialogue', speaker: '苏鸢', text: '……我发烧麻烦了你。' },
        { type: 'dialogue', speaker: '裴凛', text: '不是你麻烦，是这道伤麻烦。' },
        { type: 'narration', text: '他站起来，去倒了杯水，放在她旁边，然后往外走。' },
        { type: 'narration', text: '苏鸢看着他的背影，忽然问：' },
        { type: 'dialogue', speaker: '苏鸢', text: '你为什么当医师。' },
        { type: 'narration', text: '他在门口停了一下，背对着她，沉默了片刻，说了一句极轻的话：' },
        { type: 'dialogue', speaker: '裴凛', text: '因为救不了的人太多了。' },
        { type: 'narration', text: '然后他走出去了，门带上，留下那句话，悬在空气里。' },
        { type: 'thought', text: '因为救不了的人太多了。\n\n……\n\n裴凛，这句话，\n你说的是你的师妹，\n还是在她之前，\n还有更多。\n\n你当医师，不是因为你能救人。\n\n是因为你救不了，\n所以你不能停。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '又过了数日。' },
        { type: 'narration', text: '某天换药，根节损伤忽然激烈反应，那道纹路像被什么东西从内部拉扯，苏鸢的整个胸腔往内坠，体内的魂魄们集体往那个方向冲，要穿出去。' },
        { type: 'narration', text: '裴凛当即把双手压上去，不是药液，是他自己的手掌，直接贴在那道纹路上，往里压。' },
        { type: 'narration', text: '苏鸢感觉到了——他手掌里有一股气，不是寻常大夫的气，是某种有根有源的、传承了很久的东西，稳，厚，像一道墙，把她体内往外冲的那些东西，一点一点推回去。' },
        { type: 'narration', text: '压了大约一刻钟，那股冲劲稳住了，苏鸢出了一口气，看见裴凛松开手，往后坐，然后，他低头，吐了一口血。' },
        { type: 'narration', text: '苏鸢猛地坐起来：' },
        { type: 'dialogue', speaker: '苏鸢', text: '裴凛——' },
        { type: 'dialogue', speaker: '裴凛', text: '没事。' },
        { type: 'narration', text: '他用袖子抹了抹，抬起头，脸色白了，但眼神是平的：' },
        { type: 'dialogue', speaker: '裴凛', text: '灵力反噬，不是第一次，养两天就好。' },
        { type: 'dialogue', speaker: '苏鸢', text: '你为什么不用药，直接用自己——' },
        { type: 'dialogue', speaker: '裴凛', text: '来不及取药。' },
        { type: 'narration', text: '他站起来，往外走，走到一半，停了脚步，背对着她，声音比平时更低，像是在说什么他不太习惯说出来的东西：' },
        { type: 'dialogue', speaker: '裴凛', text: '因为你现在死，会很麻烦。' },
        { type: 'narration', text: '停顿了一下：' },
        { type: 'dialogue', speaker: '裴凛', text: '而且，我不想再看见一次了。' },
        { type: 'narration', text: '然后他走出去了。' },
        { type: 'narration', text: '苏鸢坐在榻上，把那句话在心里过了一遍，又一遍。' },
        { type: 'thought', text: '不想再看见一次。\n\n……\n\n裴凛，你说的"一次"，\n是你师妹，\n还是所有那些你救不回来的人。\n\n你用自己的灵力压我的伤，\n吐血，还说"不是第一次"——\n\n你以前，也这样救过她吗。\n\n……救不回来的那次。\n\n裴凛，\n你在我身上，\n是不是在补一件你没有办法重来的事。' },
      ],
      choices: [
        { text: '继续——伤势渐稳，两人关系的裂缝和靠近同时进行', next: 75 },
      ]
    },

    // Scene 75: 第四幕·最大秘密·锁在守你
    75: {
      chapter: 'B线 · 第四幕 · 活的封印',
      chapterShort: '第四幕',
      content: [
        { type: 'chapter-title', text: '第四幕', sub: '— 活的封印 —' },
        { type: 'location', text: '济安医馆 · 某日' },
        { type: 'narration', text: '那天裴凛翻出他的脉案册子，把苏鸢这些天的记录摊开来，从头看，看了很长时间。' },
        { type: 'narration', text: '然后他说了一句话：' },
        { type: 'dialogue', speaker: '裴凛', text: '你的伤口在自愈。' },
        { type: 'dialogue', speaker: '苏鸢', text: '是药的效果。' },
        { type: 'dialogue', speaker: '裴凛', text: '不是。' },
        { type: 'narration', text: '他把册子推到她面前，指着某一行记录：' },
        { type: 'dialogue', speaker: '裴凛', text: '我停了药两天，观察变化——你的根节损伤不但没有扩散，反而在收口。' },
        { type: 'narration', text: '苏鸢看着那行记录，眉头皱了一下：' },
        { type: 'dialogue', speaker: '苏鸢', text: '你停了药没有告诉我？' },
        { type: 'dialogue', speaker: '裴凛', text: '告诉你，你会影响结果。' },
        { type: 'narration', text: '苏鸢盯着他，他没有避开，只是继续说：' },
        { type: 'dialogue', speaker: '裴凛', text: '那道纹路是活的。不是印记，不是封印——是某种有主动性的东西，它在根据你体内的状态，自己调整。' },
        { type: 'narration', text: '苏鸢沉默了很长时间。' },
        { type: 'thought', text: '活的。\n\n那道纹路，是活的。\n\n……\n\n贺崇玄的阵扯到了它，\n它反应了——不是被动承受，是反应。\n\n它在适应，裴凛之前说的那个词，\n不是伤口在适应，\n是它在适应。\n\n那它从什么时候开始的？\n\n……从姐姐寄进来的那一刻。\n\n从姐姐选择寄在我身上的那一刻。\n\n那道纹路，\n不是贺崇玄做的，\n是姐姐——\n\n或者，是所有寄在我身上的她们——\n\n一起做的。' },
        { type: 'narration', text: '苏鸢抬起头，看着裴凛：' },
        { type: 'dialogue', speaker: '苏鸢', text: '你的意思是，它在保护我。' },
        { type: 'dialogue', speaker: '裴凛', text: '不只是保护。' },
        { type: 'narration', text: '他把册子翻到最后几页，那里的字迹和前面不一样，更密，更乱，像是某个人在很短的时间里，把很多想法塞进去的痕迹：' },
        { type: 'dialogue', speaker: '裴凛', text: '它在整合。把你体内所有魂魄的状态，向一个更稳定的方向整合。它知道你在做什么，它在帮你准备。' },
        { type: 'narration', text: '苏鸢低下头，把手放在胸口，轻轻压了一下。' },
        { type: 'narration', text: '那道纹路下面，温热，像有什么东西在轻轻呼吸。' },
        { type: 'thought', text: '姐姐。\n\n还有你们，那些我不知道名字的她们——\n\n你们在我身上，\n不是在等散去，\n不是在等复仇，\n\n是在陪我走到那一步，\n然后一起——\n\n……\n\n我没有办法说清楚我现在的感觉。\n\n但那道纹路是温的，\n比我以为的，温得多。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '裴凛把册子合上，看着她，那双眼睛，平时是冷的，此刻是另一种，是某个人在某件事上，终于得到了某种他长久以来在找的答案，那种平静：' },
        { type: 'dialogue', speaker: '裴凛', text: '你问我为什么当医师。' },
        { type: 'narration', text: '苏鸢抬起头。' },
        { type: 'dialogue', speaker: '裴凛', text: '是因为我师父说过一句话——"没有什么是不能慢慢治好的"。' },
        { type: 'narration', text: '他顿了一下：' },
        { type: 'dialogue', speaker: '裴凛', text: '我不信，但我没有别的路走，所以一直在找能让我信这句话的证据。' },
        { type: 'narration', text: '他看着苏鸢，那双眼睛里，有苏鸢第一次在他脸上见到的东西——不是冷淡，是某种非常克制的、但确实存在的，郑重：' },
        { type: 'dialogue', speaker: '裴凛', text: '你的那道纹路，是我找了这么久，第一个让我觉得——也许他说的是对的——的东西。' },
        { type: 'narration', text: '苏鸢看着他，没有说话，只是把那只压在胸口的手，慢慢放下来。' },
        { type: 'thought', text: '裴凛。\n\n你找了这么久，\n找的不是病例，不是证据，\n是一个让你相信"治愈是可能的"的理由。\n\n……\n\n我不知道我是不是那个理由。\n\n但你在我身上看见的那道纹路，\n那道温热的、活的、在帮我准备的纹路——\n\n那是她们。\n\n那是姐姐，和那些寄在我身上的、没有名字的她们。\n\n如果你在她们身上看见了治愈的可能，\n那我很高兴。\n\n她们值得被这样看见。' },
        { type: 'div', text: '· B线第四幕 · 待续 ·' },
        { type: 'atmos', text: '伤还没好，账还没算，贺府的门还没进。' },
        { type: 'atmos', text: '但医馆的灯，今晚比往日，亮了一点点。' },
      ],
      choices: [
        { text: '伤养好了，但有些事，不能再等了。', next: 76 },
      ]
    },

    // Scene 76: B线·争执·执意离开
    76: {
      chapter: 'B线 · 第五幕 · 不送',
      chapterShort: 'B线',
      content: [
        { type: 'chapter-title', text: '第五幕', sub: '— 不送 —' },
        { type: 'location', text: '济安医馆 · 内室 · 某日午后' },
        { type: 'narration', text: '伤养到第七日，苏鸢能正常走路了。' },
        { type: 'narration', text: '她从榻上坐起来，把外衫穿好，收拾了随身带来的东西，走到内室门口。' },
        { type: 'narration', text: '裴凛坐在对面的椅子上，手里拿着卷宗，头也不抬：' },
        { type: 'dialogue', speaker: '裴凛', text: '坐回去。' },
        { type: 'dialogue', speaker: '苏鸢', text: '根节的伤已经稳了，我能走了。' },
        { type: 'dialogue', speaker: '裴凛', text: '稳了不是好了。好了之前你不能动。' },
        { type: 'narration', text: '他放下卷宗，终于抬起眼，看着她，那双绿棕色的眸子，这一刻是少见的、明确的：' },
        { type: 'dialogue', speaker: '裴凛', text: '进贺府，你说的那个阵——根节受损的人站在阵心，阵气会先找你的伤口。你知道这意味着什么。' },
        { type: 'dialogue', speaker: '苏鸢', text: '我知道。' },
        { type: 'dialogue', speaker: '裴凛', text: '知道还要去。' },
        { type: 'narration', text: '不是问句。是一种苏鸢没想到会在他脸上见到的东西——不是愤怒，比愤怒更沉，是某种他平时压得很好、今天压不住的，在意。' },
        { type: 'narration', text: '裴凛站起来，走到她面前，隔了半臂的距离，低声说：' },
        { type: 'dialogue', speaker: '裴凛', text: '我见过太多这样的人。认准了一件事，撞到头破血流为止，最后死得不明不白。' },
        { type: 'dialogue', speaker: '苏鸢', text: '我不是他们。' },
        { type: 'dialogue', speaker: '裴凛', text: '你和他们一样。' },
        { type: 'narration', text: '苏鸢没有反驳这句话，只是看着他：' },
        { type: 'dialogue', speaker: '苏鸢', text: '裴大夫，谢谢你这七天。但这件事，不是你能替我做决定的。' },
        { type: 'narration', text: '裴凛又沉默了一会儿，然后，很低，说出来的话，是他头一次说得这么直接的：' },
        { type: 'dialogue', speaker: '裴凛', text: '留下来。伤治好，我带你离开这座城。从此不必再碰贺家的事，也不必再碰任何阵，任何法器，任何把你当祭品的东西。' },
        { type: 'narration', text: '苏鸢站在那里，把这句话听完了。' },
        { type: 'thought', text: '他是认真的。\n\n他说"带你离开"——\n他想的是，从根上断开这一切，\n带我去一个这些东西找不到我的地方。\n\n他能做到。\n\n我知道他能做到。\n\n……\n\n但我不能走。\n\n不是不想，是不能。\n\n姐姐还在贺崇玄那张账里。\n那些寄在我身上的魂魄还在。\n她们不能被这样放着。\n\n我不能走。' },
        { type: 'div', text: '◆' },
      ],
      choices: [
        { text: '「我不能走。」——执意入贺府，走到最后。', next: 760 },
        { text: '……沉默，留下来。', next: 99 },
      ]
    },

    // Scene 760: B线短线·过渡·入局前的感知
    760: {
      chapter: 'B线 · 短线 · 入局',
      chapterShort: 'B线',
      content: [
        { type: 'location', text: '医馆门口 · 山路 · 傍晚' },
        { type: 'narration', text: '苏鸢把行李收好，走到医馆门口。' },
        { type: 'narration', text: '裴凛没有送她。' },
        { type: 'narration', text: '她走出门，在门口站了一下，回头，看见他还坐在那把椅子上，背对着她，没有动。' },
        { type: 'thought', text: '……裴凛。\n\n你不是不在意。\n\n你只是知道，留不住。' },
        { type: 'narration', text: '她没有再说什么，转身往山路走。' },
        { type: 'div', text: '◆' },
        { type: 'location', text: '贺府周边 · 傍晚 · 数日' },
        { type: 'narration', text: '退婚的事没有结果，贺崇玄没有明着答应，也没有拒绝，只是笑着叫她再想想。' },
        { type: 'narration', text: '苏鸢在城里盘桓了几日，白天像什么都没发生一样，偶尔经过书院，偶尔在贺府附近走动，暗地里找机会。' },
        { type: 'narration', text: '第三日，贺府里出了个空档，她混进去，摸到了地下那道门的位置，贴着门缝，把里头隐约透出来的朱砂气息记了个大概——没有进去，只是走近，把手放在门板上，探了一下。' },
        { type: 'thought', text: '阵。\n\n地下有阵，很大，很旧，纹路繁复，不是贺崇玄这种层次能独立设计的东西。\n\n……有意思。\n\n先记着。' },
        { type: 'narration', text: '她退出来，装作若无其事，出了贺府。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '就是那天之后——那种感觉出现了。' },
        { type: 'narration', text: '不是视觉，是更深处的感知：体内寄宿的魂魄们忽然同时安静了，像一群鸟在某样东西飞过时集体停止振翅，连呼吸都屏住了。' },
        { type: 'narration', text: '苏鸢停下脚步，环顾四周，什么都没看见。' },
        { type: 'thought', text: '……是什么东西？\n\n不是邪祟，不是法阵——\n魂魄们不是在恐惧，\n是在……静止。\n\n像是碰见了某种更古老的东西，\n不知道该怎么反应，\n所以选择不动。' },
        { type: 'narration', text: '那种感觉留了下来，此后三日，如影随形。' },
        { type: 'div', text: '◆' },
        { type: 'atmos', text: '第五天，傍晚。' },
      ],
      choices: [
        { text: '继续——', next: 761 },
      ]
    },

    // Scene 761: 对应原D线Scene 60/61合并·棋子·初遇
    761: {
      chapter: 'B线 · 短线 · 棋子',
      chapterShort: 'B线',
      content: [
        { type: 'location', text: '城西巷口 · 台阶 · 傍晚' },
        { type: 'narration', text: '第五天傍晚，她从书院往城西走，拐进一条少人的巷子，那种感觉忽然变得清晰——是那种被注视的重量，但又比被注视更深，更古。' },
        { type: 'narration', text: '她停下来，没有转身，只是站在那里，等。' },
        { type: 'narration', text: '巷子另一头，出现了一个人的身影。' },
        { type: 'narration', text: '黑发，长，披散着，走路极轻，像是随时可以消失在这条巷子里的那种存在。苏鸢看着他从另一头走来，停在离她五步远的地方，那双眼睛——暗红色，在日暮的光里，比任何东西都深。' },
        { type: 'narration', text: '他什么都没说，只是看了她一眼，然后俯身，把一枚白棋子放在台阶上，走了。' },
        { type: 'narration', text: '苏鸢低头，看着那枚棋子。' },
        { type: 'thought', text: '……体内的魂魄们，\n在他走近的时候全部安静了，\n在他走远之后慢慢恢复，\n像退潮。\n\n那不是恐惧。\n\n是某种比恐惧更原始的反应——\n是碰见了更根本的东西，\n本能地，静止。' },
        { type: 'narration', text: '她捡起那枚棋子，在掌心捏了一下——普通的棋子重量，但体内的魂魄们碰见它的一瞬，集体往深处退了一步。' },
        { type: 'narration', text: '第二天，她在同一个时辰，坐到附近的茶摊。' },
        { type: 'narration', text: '他已经在了，坐在斜对面的廊下，黑发垂落，姿态极度随意，像在那里坐了一辈子。见她落座，他站起来，走过来，在她对面坐下，没有开场白：' },
        { type: 'dialogue', speaker: '？', text: '你捡了。' },
        { type: 'dialogue', speaker: '苏鸢', text: '你放的。' },
        { type: 'narration', text: '他把手里一枚黑棋子放在桌上，和她袖口露出来的白棋子对着，一黑一白。' },
        { type: 'dialogue', speaker: '？', text: '你体内的那些——我见过它们原来的样子。不是这座城的，是从更深的地方来的。' },
        { type: 'narration', text: '苏鸢端着茶杯，没有表情，只是问：' },
        { type: 'dialogue', speaker: '苏鸢', text: '你是什么人。' },
        { type: 'narration', text: '他没有立刻回答，只是把那枚黑棋子转了一下，声音低，平：' },
        { type: 'dialogue', speaker: '？', text: '不是人。' },
        { type: 'thought', text: '他说的不是人。\n\n不是谦辞，不是玩笑，\n是陈述。\n\n……\n\n我信他。\n\n我不知道为什么，\n但我信他说的。' },
      ],
      choices: [
        { text: '「那你是什么？」——问下去。', next: 762 },
        { text: '沉默，把黑棋子推回去——等他主动说。', next: 762 },
      ]
    },

    // Scene 762: 对应原D线Scene 63·边界之人
    762: {
      chapter: 'B线 · 短线 · 边界之人',
      chapterShort: 'B线',
      content: [
        { type: 'chapter-title', text: '第二幕', sub: '— 边界之人 —' },
        { type: 'location', text: '城西旧宅·空院·某日傍晚' },
        { type: 'narration', text: '他带她去了城西，一处无人的空院，青苔，旧井，一张被风化到只剩轮廓的石桌。' },
        { type: 'narration', text: '他坐在石桌边沿，不坐凳，侧身，像那里是某种更高处的地方往下看的位置。苏鸢站着，把两枚棋子放在石桌上，一黑一白。' },
        { type: 'narration', text: '他低头看了一眼，然后把黑棋子拿起来，转了一下：' },
        { type: 'dialogue', speaker: '？', text: '你想知道我是什么——我说给你听。' },
        { type: 'narration', text: '苏鸢没有说话，等他。' },
        { type: 'dialogue', speaker: '？', text: '这个世界和它之外的那个地方，之间有一条线。所有活的东西在线这边，所有死了的东西穿过线去那边。这条线不是天然稳固的，需要有东西压着它——我是那个东西。' },
        { type: 'narration', text: '苏鸢听着，没有打断。' },
        { type: 'dialogue', speaker: '？', text: '我曾经是人，但久了，忘了名字，忘了来处。现在我游走在两边之间，是锁，不是钥匙。' },
        { type: 'thought', text: '锁？\n\n不是钥匙，是锁。\n\n……他在说什么。\n\n世界和世界之外之间的那条线，需要东西压着——他是那个东西。\n\n锁住两界的边界。\n\n……\n\n那钥匙是什么？\n\n谁能开这把锁？\n\n……\n\n他说他曾经是人。\n\n他说他忘了名字。\n\n这两件事，在他嘴里，\n是陈述，不是诉苦，\n像是说"今天有云，明天可能没有"那样平静。\n\n……\n\n这个人，\n在这条线上，站了多久。' },
        { type: 'dialogue', speaker: '苏鸢', text: '你为什么跟我说这些。' },
        { type: 'dialogue', speaker: '？', text: '因为你体内那些东西的来处，我知道一部分，而你要去的地方，我也知道。' },
        { type: 'narration', text: '他放下棋子，站起来：' },
        { type: 'dialogue', speaker: '？', text: '贺崇玄在地下建了一张阵，阵心需要一个众灵渡。他等你已经等了很久了。那张阵的原型，是我的——他用了我的底稿，用我的气息作为能量来源。' },
        { type: 'narration', text: '苏鸢抬起眼：' },
        { type: 'dialogue', speaker: '苏鸢', text: '他用你的东西造阵——你知道这件事多久了。' },
        { type: 'dialogue', speaker: '？', text: '二十年。' },
        { type: 'narration', text: '二十年。' },
        { type: 'narration', text: '苏鸢把这个数字放了一下，没有问为什么不早点阻止，因为她大约已经猜到了答案——' },
        { type: 'thought', text: '他被困着。\n\n某种方式，二十年。\n\n这张阵，\n不只是用了他的底稿——\n是把他锁在里面了。' },
        { type: 'dialogue', speaker: '苏鸢', text: '所以你现在出来了。' },
        { type: 'dialogue', speaker: '？', text: '阵有裂缝，我能往外走一点。但进不去，也彻底回不来——' },
        { type: 'narration', text: '他停了一下，那双暗红的眼睛里，是某种比任何苏鸢见过的人都更从容的东西：' },
        { type: 'dialogue', speaker: '？', text: '……裂缝是什么时候出现的，你知道吗。' },
        { type: 'dialogue', speaker: '苏鸢', text: '不知道。' },
        { type: 'narration', text: '他沉默了一会儿，然后，极平静地：' },
        { type: 'dialogue', speaker: '？', text: '是你进过那间密室，碰过阵的节点的那天。' },
        { type: 'narration', text: '苏鸢站在那里，把这句话想了一遍。' },
        { type: 'thought', text: '……是那天。\n\n她贴着地下那道门，把手放上去探阵——\n\n那时只是以为自己没有进去，没有动到什么。\n\n……\n\n只是走近，\n只是摸了一下门板——\n\n就已经——\n\n……\n\n他说是我。\n\n他等了多久，\n等到一个人无意间，\n让那条缝出现了。' },
      ],
      choices: [
        { text: '「你被困在贺崇玄的阵里——你要我怎么帮你。」', next: 763 },
        { text: '「那我们合作——你知道的东西，我需要。」', next: 763 },
      ]
    },

    // Scene 763: 对应原D线Scene 64·仪式前夜
    763: {
      chapter: 'B线 · 短线 · 仪式前夜',
      chapterShort: 'B线',
      content: [
        { type: 'chapter-title', text: '第三幕', sub: '— 仪式前夜 —' },
        { type: 'location', text: '城西空院·入贺府前一夜' },
        { type: 'narration', text: '仪式的日期，苏鸢已经确认了。' },
        { type: 'narration', text: '入贺府那天，她去找他，不是为了话别，是为了把最后一件事说清楚。' },
        { type: 'narration', text: '他在那个空院里，坐在旧井台边，像她每次来都在的样子，不知道在想什么，低着头，发垂下来，遮住了脸的大半。' },
        { type: 'narration', text: '苏鸢走进来，在他对面站定：' },
        { type: 'dialogue', speaker: '苏鸢', text: '我明天进贺府。仪式在下月初一。我在阵心，你在外面——你说的那件事，外面能做到什么，我需要知道。' },
        { type: 'narration', text: '那个人抬起头，那双暗红的眼睛在夜里沉着，看了她一会儿：' },
        { type: 'dialogue', speaker: '？', text: '阵的核心能量来自我，贺崇玄用锁魂井把我锁在暗门后面，阵的纹路走向是围着那个中心画的。你进去，在阵心改节点，把朱砂走向反转——阵气会开始认我，而不是认贺崇玄。' },
        { type: 'dialogue', speaker: '苏鸢', text: '然后呢。' },
        { type: 'dialogue', speaker: '？', text: '然后阵会开始把它吸进去的东西往外推，包括贺崇玄。他在阵里，就会被阵锁住。' },
        { type: 'dialogue', speaker: '苏鸢', text: '你出得来吗。' },
        { type: 'narration', text: '短暂的沉默。' },
        { type: 'dialogue', speaker: '？', text: '如果节点改对了，锁魂井的封印会松。我能出来。' },
        { type: 'narration', text: '苏鸢点头，然后问出来那个她想了很久的问题：' },
        { type: 'dialogue', speaker: '苏鸢', text: '你帮我——代价是什么。' },
        { type: 'narration', text: '他沉默了更长时间。然后，低声：' },
        { type: 'dialogue', speaker: '？', text: '没有代价。' },
        { type: 'narration', text: '苏鸢等着，知道还有下半句。' },
        { type: 'dialogue', speaker: '？', text: '我帮你，不是因为要什么。是因为那个阵，用了我的命，\n是用他自己的某种存续——' },
        { type: 'narration', text: '他停了一下，最后说：' },
        { type: 'dialogue', speaker: '？', text: '是因为有人，在做一件对的事。我不想让她绊在那些不必要的麻烦上。' },
        { type: 'thought', text: '"有人在做一件对的事。"\n\n他这么说。\n\n……\n\n他知道我要去做什么，\n他知道那件事值得，\n然后他决定帮我。\n\n没有代价，没有交换，\n只是——对的事。\n\n……\n\n这个在两界之间站了多少年的人，\n他对"对的事"的定义，\n和活着的人一样吗。\n\n还是更重，更简单？' },
        { type: 'div', text: '◆' },
        { type: 'atmos', text: '入贺府。' },
        { type: 'atmos', text: '一切，从明天开始。' },
      ],
      choices: [
        { text: '天亮，入贺府——终章。', next: 65 },
      ]
    },

    // Scene 80: C线·第一幕·集市初遇
    80: {
      chapter: 'C线 · 第一幕 · 异国面孔',
      chapterShort: 'C线',
      content: [
        { type: 'chapter-title', text: 'C线', sub: '— 异国面孔 —' },
        { type: 'location', text: '街市 · 集市 · 午后' },
        { type: 'narration', text: '集市比平日热闹，苏鸢用袖子压着手臂的伤口，在人群里挤进去，找她要买的几样东西。' },
        { type: 'narration', text: '买好了纸和墨，正要往回走，在一个卖旧书旧物的摊子前停了一下——摊位上压着一本她认得的书，书脊上写着三个字，是贺崇玄早年写的，市面上已经不多见了。' },
        { type: 'narration', text: '她蹲下来，把书翻开，看了两页，摊主报了个价，正在还价——' },
        { type: 'narration', text: '旁边忽然来了个人，蹲在她旁边，拿起摊上另一本书翻了翻，然后用很流利、但声调有点奇的官话，比苏鸢早一步报了个更高的价，把她要的那本书拦下来，又替她付了差价。' },
        { type: 'narration', text: '苏鸢抬头，看见一张陌生的脸。' },
        { type: 'narration', text: '年岁不大，五官精致，皮肤白，发色是深紫，微微有弧度，束得松，几缕垂在脸侧，不是这里的人会有的长相。他脸上带着一种漫不经心的、快活的笑，像是生来就觉得一切都很有趣的人。' },
        { type: 'narration', text: '然后苏鸢看见了他的眼睛——紫色的，深的，带着一种她在这条街上从没见过的颜色，像某种产自异域的宝石，美得有点不真实。' },
        { type: 'thought', text: '……异国人。\n\n紫色的眼睛。\n\n这个人，为什么会在这条街上。' },
        { type: 'dialogue', speaker: '罗奕', text: '这本是我买了，但那本——' },
        { type: 'narration', text: '他把苏鸢要的那本贺崇玄的书递给摊主，笑着说：' },
        { type: 'dialogue', speaker: '罗奕', text: '她要的那本，按她出的价卖给她，差价我补。' },
        { type: 'narration', text: '苏鸢接过书，平静地看着他，没有道谢，只是问：' },
        { type: 'dialogue', speaker: '苏鸢', text: '为什么？' },
        { type: 'narration', text: '他蹲在那里，仰头看她，笑意不变：' },
        { type: 'dialogue', speaker: '罗奕', text: '你那本是贺崇玄写的，你买它，要么是真的喜欢玄学，要么是在查他。' },
        { type: 'narration', text: '他站起来，把书递给她：' },
        { type: 'dialogue', speaker: '罗奕', text: '是后者的话，我们可以聊一聊。' },
        { type: 'narration', text: '苏鸢接过书，平静地看着他，没有否认，也没有确认。' },
        { type: 'dialogue', speaker: '罗奕', text: '我叫罗奕。你体内的那些魂魄里，有一缕，我认识。' },
        { type: 'narration', text: '苏鸢的手，微微收紧了那本书。' },
        { type: 'thought', text: '他看出来了——我是灵异体。\n\n而且他认识体内某缕魂。\n\n这个人……\n\n不是普通人。' },
        { type: 'narration', text: '她抬眼，直视着他：' },
        { type: 'dialogue', speaker: '苏鸢', text: '你认识谁。' },
        { type: 'dialogue', speaker: '罗奕', text: '先去把你手臂的伤处理一下，边走边说。' },
        { type: 'narration', text: '他已经看见了她袖口洇出来的血迹，说得自然，像在说"先吃饭再干活"，理所当然的语气。' },
        { type: 'narration', text: '苏鸢站在集市的人群里，看着这个笑起来像是什么都不在乎的异国男人，想了一秒，跟上去了。' },
      ],
      choices: [
        { text: '「你说认识体内某缕魂——说清楚。」——先问这件事', next: 81 },
        { text: '跟他走，先听他说——来者有备，看看他知道多少', next: 81 },
      ]
    },

    // Scene 81: 茶摊·罗奕说起那个小妹妹
    81: {
      chapter: 'C线 · 第一幕 · 异国面孔',
      content: [
        { type: 'location', text: '街角茶摊 · 午后' },
        { type: 'narration', text: '罗奕找了条街角的茶摊坐下，叫了两盏茶，顺手取出一块布，把苏鸢的手臂重新包了一道，手法干净利落，不像是第一次做这种事。' },
        { type: 'narration', text: '苏鸢看着他的手，那双手太干净，不像武人，但处理伤口的方式，太稳。' },
        { type: 'thought', text: '……见过伤的人。\n\n见过很多种。' },
        { type: 'narration', text: '包扎完，他拿起茶，漫不经心地喝了一口，然后开口：' },
        { type: 'dialogue', speaker: '罗奕', text: '大约三年前，我刚到这里，在一条卖糖人的街上。' },
        { type: 'narration', text: '他说话的方式，和苏鸢预想的不一样——不是交换情报的语气，是在讲一件他自己的事，有点随意，但随意里有什么东西，是真实的。' },
        { type: 'dialogue', speaker: '罗奕', text: '有个小女孩，买了糖人和糖葫芦，追着前面的伙伴跑，差点在我面前跌倒，我扶了她一下。' },
        { type: 'narration', text: '他停了一下，那双紫色的眸子低下来，看着茶盏：' },
        { type: 'dialogue', speaker: '罗奕', text: '她把糖人塞给我，说——' },
        { type: 'narration', text: '他笑了一下，那个笑和他平时的笑不一样，不是那种游刃有余的、生意人的笑，是某种更旧的、更真实的东西：' },
        { type: 'dialogue', speaker: '罗奕', text: '「你的眼睛很漂亮。」' },
        { type: 'narration', text: '苏鸢没有动。' },
        { type: 'dialogue', speaker: '罗奕', text: '那时候我刚被流放出来，家族政变，一无所有，在一条陌生的街上，被一个不认识的小女孩说眼睛漂亮。' },
        { type: 'narration', text: '他把茶盏放下，抬起眼，直视苏鸢：' },
        { type: 'dialogue', speaker: '罗奕', text: '后来她失踪了，官府说是自行离家，我查了很久，查到的东西……不适合在这里说。' },
        { type: 'narration', text: '苏鸢盯着他，把这些话在心里过了一遍，然后很平静地说：' },
        { type: 'dialogue', speaker: '苏鸢', text: '她寄在我身上。' },
        { type: 'narration', text: '罗奕的手，在桌上，停了一下。' },
        { type: 'narration', text: '他没有说话，只是看着苏鸢，那双紫色的眼睛里，有什么东西，沉下去了一层，是苏鸢在他脸上第一次看见的、和那个漫不经心的笑完全不同的东西。' },
        { type: 'dialogue', speaker: '苏鸢', text: '她在最深处，很安静，一直都在。' },
        { type: 'narration', text: '罗奕沉默了很长时间。' },
        { type: 'narration', text: '然后他端起茶，喝了一口，把那个表情压下去，换回了那副漫不经心，但这一次，苏鸢知道，那副漫不经心底下有什么了：' },
        { type: 'dialogue', speaker: '罗奕', text: '好，我们谈谈。' },
        { type: 'narration', text: '他把茶盏推开，正对着苏鸢，那双眼睛里是生意人的专注：' },
        { type: 'dialogue', speaker: '罗奕', text: '你查贺崇玄，我有你查不到的东西。你有我想找的答案。' },
        { type: 'narration', text: '他轻轻笑了一下：' },
        { type: 'dialogue', speaker: '罗奕', text: '这是笔公平的买卖。' },
        { type: 'thought', text: '公平的买卖。\n\n他说这句话，\n嘴角还带着笑，\n但那双眼睛，\n一点都不轻松。\n\n罗奕，\n你查那个小妹妹查了三年，\n查到了什么。\n\n……你手里有多少东西。' },
      ],
      choices: [
        { text: '「你手里有什么——先让我知道你能拿出什么。」', next: 82 },
        { text: '「公平的买卖，那规则呢。」——先谈清楚条件再说', next: 82 },
      ]
    },

    // Scene 82: 第二幕·地下世界入口·黑市拍卖会
    82: {
      chapter: 'C线 · 第二幕 · 地下拍卖',
      chapterShort: '第二幕',
      content: [
        { type: 'chapter-title', text: '第二幕', sub: '— 地下拍卖 —' },
        { type: 'location', text: '城中某处 · 数日后 · 夜' },
        { type: 'narration', text: '罗奕给了她三天。' },
        { type: 'narration', text: '三天之内，他说，会有一场拍卖，那里有她需要的东西——与贺崇玄相关的封印器物，以及，更重要的，知情者。' },
        { type: 'narration', text: '他说这些的时候，语气是随意的，像在说今晚吃什么，但他给她的那张纸，上面只有一个地址和一个时辰，没有别的。' },
        { type: 'dialogue', speaker: '罗奕', text: '换身不起眼的衣服，别带太值钱的东西——不，等等。' },
        { type: 'narration', text: '他重新看了她一眼，语气变了一点：' },
        { type: 'dialogue', speaker: '罗奕', text: '你怎么打扮都会起眼，算了。跟紧我就行。' },
        { type: 'div', text: '◆' },
        { type: 'location', text: '城西废弃织造坊 · 地下 · 三日后夜' },
        { type: 'narration', text: '入口是一条很深的楼梯，灯是红色的，从上往下，越往深处越亮，越亮越红，像走进某种活物的腹腔。' },
        { type: 'narration', text: '苏鸢跟着罗奕走下去，听见下面已经有声音了——人声，压低的，相互试探的那种人声，和集市的嘈杂完全不同，是同一种秘密的人聚在一起，才会有的声音。' },
        { type: 'narration', text: '然后大厅出现了。' },
        { type: 'narration', text: '比她预想的大。圆形，层叠的座位往上延伸，中央是一个高台，台上现在空着，台边挂着几盏深红的灯，把整个厅染成暗血的颜色。' },
        { type: 'narration', text: '座位上已经坐了一半的人，有穿绸缎的富商，有带面具的，有苏鸢认不出来历的各色人，他们手边都有一块黑色的牌子，正面什么都没写。' },
        { type: 'thought', text: '……这个地方，\n\n和贺崇玄的书房、书院的特藏室，\n是完全不同的另一个世界。\n\n同样的秘密，在这里，是明码标价的东西。' },
        { type: 'narration', text: '罗奕在她旁边，找了个侧面的位置坐下，把她挡在内侧，环顾了一圈，表情是放松的，是一个在自己地盘上的人的放松：' },
        { type: 'dialogue', speaker: '罗奕', text: '今晚的拍品我提前看过，第三件，第七件，和第十一件，你需要关注。' },
        { type: 'dialogue', speaker: '苏鸢', text: '为什么是这三件。' },
        { type: 'dialogue', speaker: '罗奕', text: '第三件是一枚封印符，来源是三年前一批失踪案的善后处理，有人把事主留下的东西拿出来变现——' },
        { type: 'narration', text: '他没有继续说，只是看了她一眼：' },
        { type: 'dialogue', speaker: '罗奕', text: '你自己想。' },
        { type: 'narration', text: '苏鸢想到了，手微微收紧。' },
        { type: 'thought', text: '善后处理——\n\n有人在处理受害者留下的痕迹。\n\n把那些东西，拿出来卖。\n\n……那枚封印符，\n是谁的遗物。' },
        { type: 'narration', text: '灯光忽然暗了三分，高台上的侧幕，从里面被推开了。' },
        { type: 'narration', text: '有人走出来，站到台上。' },
        { type: 'narration', text: '是罗奕。' },
        { type: 'narration', text: '苏鸢愣了一下——她旁边的位置，已经空了，她甚至没有察觉他什么时候离开的。' },
        { type: 'narration', text: '台上的罗奕，和刚才坐在她旁边的罗奕，是同一个人，但不是同一种气场。' },
        { type: 'narration', text: '他站在台上，红灯把他的发色照得更深，那双紫色的眼睛在灯光里扫了一圈，声音不大，但整个厅都安静了：' },
        { type: 'dialogue', speaker: '罗奕', text: '各位，今晚的拍卖，照旧规矩，什么都不存在，大家都不认识。' },
        { type: 'narration', text: '有人轻声笑了，显然是熟面孔。' },
        { type: 'dialogue', speaker: '罗奕', text: '第一件——一段取自百年古井的井骨，封于黑玉匣，买家自行负责保管风险。起价，三百两。' },
        { type: 'narration', text: '苏鸢坐在暗处，看着台上的他，一件一件地推进，声音始终是那个漫不经心的轻松，但控场极稳，哪件东西放多久，哪个竞价要停顿，他掌得一分不差。' },
        { type: 'thought', text: '这个地方，\n\n是他的。\n\n他不是客人，不是中间人，\n他是这里的主持，\n是规则的制定者。\n\n罗奕——\n\n你在这里，\n比在集市上，\n更真实。' },
        { type: 'narration', text: '第三件拍品出来了，是一枚符，压在一块薄玉里，那块玉已经有了裂缝，符纸在玉缝里，泛着极淡的光。' },
        { type: 'narration', text: '苏鸢看见那枚符，体内的魂魄们，同时动了一下。' },
        { type: 'narration', text: '是某种认出来的反应。' },
        { type: 'thought', text: '……她们认识这个东西。\n\n或者——\n认识这个东西原来的主人。' },
        { type: 'narration', text: '台上，罗奕的视线，在介绍第三件拍品的时候，从全场扫过，在苏鸢所在的方向，停了一秒。' },
        { type: 'narration', text: '然后他说了一句话，声音里带着某种苏鸢听见就觉得不对劲的东西：' },
        { type: 'dialogue', speaker: '罗奕', text: '各位——今晚的真正珍品，好像自己走进来了。' },
        { type: 'narration', text: '整个厅的目光，慢慢转向苏鸢所在的方向。' },
      ],
      choices: [
        { text: '不动——他在试探你，让他先说完', next: 83 },
        { text: '站起来——接他的话，看他打算怎么收这个场', next: 821 },
      ]
    },


    // Scene 821: C线·拍卖场·站起来
    821: {
      chapter: 'C线 · 第二幕 · 地下拍卖',
      chapterShort: 'C线',
      content: [
        { type: 'location', text: '地下拍卖厅 · 同夜' },
        { type: 'narration', text: '苏鸢站起来了。' },
        { type: 'narration', text: '不是仓皇，不是被人看穿的慌乱，是那种刻意的、慢条斯理的起身——她把手里的黑牌握稳，抬起头，往台上看。' },
        { type: 'narration', text: '台上的罗奕愣了一秒。' },
        { type: 'narration', text: '只有一秒，然后他的眼睛里，有什么东西，亮起来，是那种碰见了比预期更有意思的东西，忍不住的一下。' },
        { type: 'narration', text: '厅里的目光全在她身上，苏鸢不去看它们，只是对着台上，平静地开口：' },
        { type: 'dialogue', speaker: '苏鸢', text: '珍品是不会自己走进来的。' },
        { type: 'narration', text: '她停了一下：' },
        { type: 'dialogue', speaker: '苏鸢', text: '除非它知道自己要找什么。' },
        { type: 'narration', text: '厅里沉默了一瞬，然后有几声轻笑，有人低声议论，气氛奇异地松动了一点。' },
        { type: 'narration', text: '罗奕在台上，看着她，那双紫色眸子里的光没有散，他慢慢地，勾起嘴角：' },
        { type: 'dialogue', speaker: '罗奕', text: '……看来这位，不只是沉得住气。' },
        { type: 'narration', text: '他把话题顺势带回来，继续第三件拍品。苏鸢重新坐下，手里的黑牌放在膝上，心跳平稳。' },
        { type: 'thought', text: '接住了。\n\n……\n\n他在试探，我接住了，\n现在他知道我不是闯进来的傻瓜，\n也不是只会装哑巴的猎物。\n\n这笔账，\n先记着。' },
        { type: 'narration', text: '苏鸢举了牌，最后把那枚符拍下来了，价格不低，她没有犹豫。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '拍卖结束后，罗奕从侧门出来，找到她，接过那枚符看了一眼，然后还给她：' },
        { type: 'dialogue', speaker: '罗奕', text: '你体内的魂魄认出这个了。' },
        { type: 'narration', text: '不是问句。' },
        { type: 'dialogue', speaker: '苏鸢', text: '嗯。' },
        { type: 'dialogue', speaker: '罗奕', text: '这枚符的来源，我查过。三年前，一个十岁左右的女孩，在城东失踪，这是她随身带着的平安符，被人从她身上取下来，辗转到了黑市。' },
        { type: 'narration', text: '苏鸢低头看着掌心里那枚符，玉已经有了裂缝，像是某个曾经完整的东西，被什么撞碎了。' },
        { type: 'thought', text: '十岁的女孩。\n\n城东失踪。\n\n……她在我最深处，\n一直都很安静，\n比其他的都安静，\n像是在等什么。\n\n等我找到这个吗。' },
      ],
      choices: [
        { text: '继续听罗奕说——', next: 84 },
      ]
    },


    // Scene 83: 博弈·第一次交易
    83: {
      chapter: 'C线 · 第二幕 · 地下拍卖',
      content: [
        { type: 'location', text: '地下拍卖厅 · 同夜' },
        { type: 'narration', text: '苏鸢没有动。' },
        { type: 'narration', text: '她坐在那里，让所有目光压过来，把手里的黑牌放在膝上，平静地往台上看，像是对他说的话没有任何反应。' },
        { type: 'narration', text: '台上，罗奕看着她，那双紫色的眼睛里，有什么东西，微微亮了一下——是那种碰见了比预期更有意思的东西，忍不住的一下。' },
        { type: 'dialogue', speaker: '罗奕', text: '……看来这位，比较沉得住气。' },
        { type: 'narration', text: '厅里有几声轻笑，气氛松了一点，他顺势把话题带回来，继续第三件拍品。' },
        { type: 'narration', text: '苏鸢举了牌，最后把那枚符拍下来了，价格不低，但她没有犹豫。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '拍卖结束后，罗奕从侧门出来，找到她，接过那枚符看了一眼，然后还给她：' },
        { type: 'dialogue', speaker: '罗奕', text: '你体内的魂魄认出这个了。' },
        { type: 'narration', text: '不是问句。' },
        { type: 'dialogue', speaker: '苏鸢', text: '嗯。' },
        { type: 'dialogue', speaker: '罗奕', text: '这枚符的来源，我查过。三年前，一个十岁左右的女孩，在城东失踪，这是她随身带着的平安符，被人从她身上取下来，辗转到了黑市。' },
        { type: 'narration', text: '苏鸢低头看着掌心里那枚符，那块玉已经有了裂缝，像是某个曾经完整的东西，被什么撞碎了。' },
        { type: 'thought', text: '十岁的女孩。\n\n城东失踪。\n\n……她在我最深处，\n一直都很安静，\n比其他的都安静，\n像是在等什么。\n\n等我找到这个吗。' },
        { type: 'narration', text: '罗奕在旁边，看着她，这次他没有笑，只是等：' },
        { type: 'dialogue', speaker: '罗奕', text: '她叫什么？' },
        { type: 'narration', text: '苏鸢闭上眼，往最深处问了一下，然后睁眼：' },
        { type: 'dialogue', speaker: '苏鸢', text: '她没有告诉我名字。但她……听见你说话，动了一下。' },
        { type: 'narration', text: '罗奕沉默了。' },
        { type: 'narration', text: '很长时间的沉默，长到苏鸢以为他不打算再说什么了，然后他低声开口：' },
        { type: 'dialogue', speaker: '罗奕', text: '她叫阿稚。我给她起的，因为不知道她真正的名字。' },
        { type: 'narration', text: '他把视线移开，看向别处，那双紫色的眸子在暗处，比白天更深，带着某种苏鸢在他身上第一次看见的——不是生意人的锐利，是某件旧事在心里留下来的、沉的重量：' },
        { type: 'dialogue', speaker: '罗奕', text: '她害过我什么都没有，她只是给了我一个糖人，说我眼睛漂亮。' },
        { type: 'narration', text: '苏鸢把那枚符，握在掌心，轻轻压了一下。' },
        { type: 'thought', text: '阿稚。\n\n……\n\n你在我这里，\n听见他了吗。' },
        { type: 'narration', text: '她感觉到了，最深处，那缕最安静的魂魄，动了一下，很轻，像一个孩子在黑暗里悄悄探出手，摸到了什么，然后缩回去了。' },
        { type: 'narration', text: '苏鸢抬起头：' },
        { type: 'dialogue', speaker: '苏鸢', text: '你说要做买卖——你要的那个答案，我给你。她在，她一直都在，她安静，不是因为消散了，是因为在等。' },
        { type: 'narration', text: '她顿了一下：' },
        { type: 'dialogue', speaker: '苏鸢', text: '现在该你了——你查她的事，查到了什么。' },
        { type: 'narration', text: '罗奕看着她，那双眼睛里，那个生意人的评估和那件旧事的重量，同时都在，然后他轻轻笑了一下：' },
        { type: 'dialogue', speaker: '罗奕', text: '你很会谈判。' },
        { type: 'dialogue', speaker: '苏鸢', text: '你教的。' },
        { type: 'narration', text: '他笑得更开了一点，然后收起那个笑，正色：' },
        { type: 'dialogue', speaker: '罗奕', text: '阿稚的案子，是封印派的人做的，不是贺崇玄，但和贺崇玄有交集——同一张网，不同的结。你查贺崇玄，我查封印派，我们往中间走，会在同一个地方碰上。' },
        { type: 'thought', text: '同一张网，不同的结。\n\n……\n\n罗奕，\n你查了三年，\n已经看见这张网的轮廓了。\n\n而我一直只看着贺崇玄这一个节点。\n\n……这个人，\n比我以为的，\n有用得多。\n\n也危险得多。' },
      ],
      choices: [
        { text: '「那我们往中间走——你下一步怎么打算。」', next: 84 },
      ]
    },

    // Scene 84: 第三幕·封井黑市·世界观扩展
    84: {
      chapter: 'C线 · 第三幕 · 那张网',
      chapterShort: '第三幕',
      content: [
        { type: 'chapter-title', text: '第三幕', sub: '— 那张网 —' },
        { type: 'location', text: '城中某处密室 · 夜' },
        { type: 'narration', text: '罗奕带她去了他真正的地方。' },
        { type: 'narration', text: '不是拍卖厅，是拍卖厅后面的一间屋子，没有多余的东西，一张长桌，桌上摆着各种档案、地图、和苏鸢认不出来历的器物，墙上钉着一张很大的纸，上面是密密麻麻的线和名字。' },
        { type: 'narration', text: '苏鸢走进来，把那张纸从头到尾看了一遍，看了很长时间，然后说：' },
        { type: 'dialogue', speaker: '苏鸢', text: '这是一张网。' },
        { type: 'dialogue', speaker: '罗奕', text: '封井黑市的流通图。' },
        { type: 'narration', text: '他站在她旁边，用手指点了几个节点：' },
        { type: 'dialogue', speaker: '罗奕', text: '封井体系本来是为了压制失控的井气，管控灵异事件，这部分你可能从镇异司那里听过一些。但在那个体系的外面，有另一套——有人在偷井符，倒卖封印器，研究井气本身的禁术用途。' },
        { type: 'narration', text: '他在一个节点上停下：' },
        { type: 'dialogue', speaker: '罗奕', text: '贺崇玄的《寄魂典》，核心原理来自某种古代井器的残本，那个残本三十年前在黑市流通过，买家是他的一个门生，后来转手到了他手上。' },
        { type: 'thought', text: '……所以贺崇玄的研究，\n\n根不在他自己，\n根在更早的某样东西，\n那样东西，从黑市里来的。\n\n他研究了二十年的东西，\n是从这张网上截取的一段。' },
        { type: 'narration', text: '苏鸢看着那张图，手指顺着一条线往下找，找到一个名字，停住：' },
        { type: 'dialogue', speaker: '苏鸢', text: '这里——封印派和贺崇玄的交集，在哪个节点上。' },
        { type: 'narration', text: '罗奕沉默了一下，然后在另一处点了一下：' },
        { type: 'dialogue', speaker: '罗奕', text: '灵体供应。贺崇玄需要寄魂体作为实验宿主，封印派在提供渠道——他们用另一套方式猎取合适体质的女孩，贺崇玄用了他们的名单，他们用了贺崇玄的研究成果作为交换。' },
        { type: 'narration', text: '苏鸢站在那张图前，把这句话在心里过了一遍，然后又过了一遍。' },
        { type: 'thought', text: '名单。\n\n合适体质的女孩。\n\n姐姐——\n\n你是从名单上来的。\n\n不是贺崇玄偶然发现了你，\n是有人把你送到他面前的。\n\n……\n\n这件事，\n比我以为的，\n大得多。\n\n贺崇玄只是其中一个。\n\n那我要找的，\n不只是他。' },
        { type: 'narration', text: '她没有说话，只是站在那里，把那张图看了很久。' },
        { type: 'narration', text: '罗奕在旁边，没有催，只是等着，然后轻声说：' },
        { type: 'dialogue', speaker: '罗奕', text: '我来这里，原来是做生意的，不是来查案的。' },
        { type: 'narration', text: '他停了一下：' },
        { type: 'dialogue', speaker: '罗奕', text: '但有人开始在黑市里动手——垄断井符供应，清理不配合的中间人，操控封印器流通，这已经不是普通的生意竞争，有人想控制这整张网。' },
        { type: 'dialogue', speaker: '苏鸢', text: '所以你开始查。' },
        { type: 'dialogue', speaker: '罗奕', text: '所以我开始查。' },
        { type: 'narration', text: '他看着苏鸢，那双紫色的眼睛，第一次，是真正认真的：' },
        { type: 'dialogue', speaker: '罗奕', text: '你我查的，是同一件事的两面。' },
        { type: 'narration', text: '苏鸢转过头，对着他，平静地说：' },
        { type: 'dialogue', speaker: '苏鸢', text: '我不关心黑市，我只关心那些欠债的人还债。' },
        { type: 'dialogue', speaker: '罗奕', text: '我不关心谁杀了谁，我只关心这张网被谁控制。' },
        { type: 'narration', text: '两个人对视了一会儿，然后罗奕先笑了：' },
        { type: 'dialogue', speaker: '罗奕', text: '我本来只是想赚钱。结果生意做到了世界末日。' },
        { type: 'narration', text: '苏鸢没有笑，但她也没有别开眼：' },
        { type: 'dialogue', speaker: '苏鸢', text: '那我们各取所需。' },
        { type: 'dialogue', speaker: '罗奕', text: '各取所需。' },
        { type: 'narration', text: '他把手伸出来，掌心朝上，像某种她不熟悉的礼节：' },
        { type: 'dialogue', speaker: '罗奕', text: '我从不做亏本的买卖。但你——' },
        { type: 'narration', text: '他停顿了一下，那双眸子里，有什么东西，既是生意人的评估，又不只是生意人的评估：' },
        { type: 'dialogue', speaker: '罗奕', text: '是个例外。' },
        { type: 'narration', text: '苏鸢看着那只伸出来的手，想了一秒，把手叠上去。' },
        { type: 'thought', text: '例外。\n\n……\n\n罗奕，你说这句话，\n是生意上的例外，\n还是别的什么。\n\n……先不去想这件事。\n\n阿稚在我最深处，\n安静地等着。\n\n这件事先做完。\n\n其他的，\n等做完了再说。' },
        { type: 'div', text: '· C线第三幕 · 待续 ·' },
        { type: 'atmos', text: '那张网还没有名字，但它已经有了轮廓。' },
        { type: 'atmos', text: '而走进这张网的两个人，各自带着一件未了的事，往同一个方向走。' },
      ],
      choices: [
        { text: '——继续', next: 85 },
      ]
    },


    // Scene 85: C线·第四幕·阿稚指引
    85: {

      chapterShort: 'C线',
      content: [
        { type: 'chapter-title', text: '第四幕', sub: '— 她去过的地方 —' },
        { type: 'location', text: '旧城区 · 午后' },
        { type: 'narration', text: '那天苏鸢在街上走，没有目的地，只是在想事情。' },
        { type: 'narration', text: '然后她感觉到了。' },
        { type: 'narration', text: '不是声音，不是视觉，是体内最深处那一缕极轻的气息，忽然往一个方向动了一下——像是某个沉睡很久的人，在梦里伸了伸手。' },
        { type: 'thought', text: '……阿稚？\n\n是你在指引我。' },
        { type: 'narration', text: '苏鸢停下脚步，把心静了静，然后跟着那个方向走。' },
        { type: 'narration', text: '走进了旧城，穿过两条窄巷，拐进一处老旧的院落——青砖墙，枯藤，院里晒着衣裳。一个女孩坐在台阶上，看起来十二三岁，正在拿一根树枝划地，神情出神。' },
        { type: 'narration', text: '苏鸢在院门口站定，那个女孩感觉到有人，抬起头，看了她一眼，没有说话。' },
        { type: 'narration', text: '苏鸢想了一下，开口：' },
        { type: 'dialogue', speaker: '苏鸢', text: '你认识……一个叫阿稚的女孩子吗。一个失踪的小女孩。' },
        { type: 'narration', text: '那个女孩手里的树枝停了。' },
        { type: 'narration', text: '很长的沉默。然后她重新低下头，声音很轻：' },
        { type: 'dialogue', speaker: '女孩', text: '她不叫阿稚。——你是谁。' },
        { type: 'dialogue', speaker: '苏鸢', text: '是……认识她的人。' },
        { type: 'narration', text: '又是沉默。苏鸢没有催，只是在门口站着，等。' },
        { type: 'narration', text: '最后，那个女孩抬起头，看着她，那双眼睛里有一种年纪不相称的、已经认过命的平静：' },
        { type: 'dialogue', speaker: '女孩', text: '进来吧。' },
      ],
      choices: [
        { text: '进去——', next: 86 },
      ]
    },

    // Scene 86: C线·第四幕·玩伴的记忆
    86: {
      chapter: 'C线 · 第四幕 · 她去过的地方',
      chapterShort: 'C线',
      content: [
        { type: 'location', text: '旧城院落 · 台阶 · 午后' },
        { type: 'narration', text: '女孩叫小鱼，是阿稚从前在这条巷子里最好的朋友，两家就隔着一道墙，从小一起在院子里追猫。' },
        { type: 'narration', text: '她说起阿稚，声音没什么起伏，像是把这件事放了很久，久到它变成了一块石头，沉甸甸地压着，但不再流血了。' },
        { type: 'dialogue', speaker: '小鱼', text: '阿稚走那天，我在窗口看见了。' },
        { type: 'narration', text: '苏鸢没有说话，等她继续。' },
        { type: 'dialogue', speaker: '小鱼', text: '来了个人，穿深色的衣服，跟阿稚说了什么，阿稚就跟他走了。我那时候觉得奇怪——阿稚走的时候是笑着的，不是被拖走的，像是……像是有人许了她一件她非常想要的事情。' },
        { type: 'thought', text: '笑着走的。\n\n阿稚。\n\n你以为去的是一个好地方。\n\n……' },
        { type: 'narration', text: '苏鸢把掌心里的茶杯握了握，低声问：' },
        { type: 'dialogue', speaker: '苏鸢', text: '那个人……你还记得他身上有什么特别的吗。' },
        { type: 'narration', text: '小鱼想了很久，然后皱眉：' },
        { type: 'dialogue', speaker: '小鱼', text: '衣领这里……有个绣纹，我记得，因为我从没见过那个纹样。像两条蛇绕在一起，又不像蛇，是那种……' },
        { type: 'narration', text: '她拿树枝在地上划了两下，一个歪歪扭扭的符号。' },
        { type: 'narration', text: '像两个圆圈，首尾相扣，无始无终。' },
        { type: 'narration', text: '苏鸢盯着那个符号看了很久，没有说话。' },
        { type: 'thought', text: '∞。\n\n……这个符号。\n\n罗奕见过。\n\n我确定他见过。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '她谢过小鱼，走出那条巷子，在一个路口站了一会儿。' },
        { type: 'narration', text: '然后她去找罗奕。' },
      ],
      choices: [
        { text: '去找罗奕——', next: 87 },
      ]
    },

    // Scene 87: C线·第四幕·∞
    87: {
      chapter: 'C线 · 第四幕 · ∞',
      chapterShort: 'C线',
      content: [
        { type: 'chapter-title', text: '第四幕', sub: '— ∞ —' },
        { type: 'location', text: '西港茶馆二楼 · 黄昏' },
        { type: 'narration', text: '罗奕坐在靠窗的位子，手边是一壶还冒着热气的茶，见她进来，没有问她去哪了，只是把对面的杯子推过来。' },
        { type: 'narration', text: '苏鸢坐下，在纸上画了那个符号，推给他。' },
        { type: 'narration', text: '罗奕低头看了一眼。' },
        { type: 'narration', text: '他的表情没有变，但那双紫色眸子里有什么东西，收紧了一下。' },
        { type: 'dialogue', speaker: '罗奕', text: '你从哪里看到这个。' },
        { type: 'narration', text: '苏鸢把小鱼说的那些原原本本讲了——阿稚被带走那天，那个人衣领上的纹样。' },
        { type: 'narration', text: '罗奕听完，拿起那张纸，对着光看了一会儿，然后放下：' },
        { type: 'dialogue', speaker: '罗奕', text: '封印派。' },
        { type: 'dialogue', speaker: '苏鸢', text: '你知道这个派别。' },
        { type: 'dialogue', speaker: '罗奕', text: '知道一点。这个符号叫「无端」，是他们的标记。无始无终，没有起点没有终点——他们信的就是这个，觉得自己游走于世界规则之外，谁都管不了他们。' },
        { type: 'narration', text: '苏鸢把这句话想了一遍：' },
        { type: 'dialogue', speaker: '苏鸢', text: '和玄门是同一路人？' },
        { type: 'dialogue', speaker: '罗奕', text: '不，比玄门更危险。玄门还有门派、师承、规矩，有人知道他们在哪。封印派没有固定据点，核心人物游走于各地，真正的高层从没在明处出现过。' },
        { type: 'narration', text: '他把茶杯转了一下：' },
        { type: 'dialogue', speaker: '罗奕', text: '贺崇玄那边用的几个术式，我一直觉得来历奇怪，不像是他自己研究出来的——现在看来，他和封印派之间有没有往来，值得查一查。' },
        { type: 'thought', text: '贺崇玄和封印派。\n\n……\n\n如果贺崇玄只是这张网的一小节——\n那么姐姐的事，\n比我以为的要大得多。\n\n……但我现在只有一件事能做。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '就在这时候，楼梯上传来脚步声，苏鸢抬起头——' },
        { type: 'narration', text: '来人是沈时序。' },
        { type: 'narration', text: '他显然认出了苏鸢，停了一下，目光落在她对面的罗奕身上，那双蓝眸里，有东西过了一遍，然后压下去了。' },
        { type: 'narration', text: '罗奕侧过头，看他，那双紫色的眸子里倒是坦然——打量，评估，然后扬了扬眉：' },
        { type: 'dialogue', speaker: '罗奕', text: '……哦，是玄门的人。' },
        { type: 'narration', text: '不是问句，是陈述。沈时序在茶馆另一张桌子旁站定，没有坐下，只是看着那张纸上的符号，沉默了一会儿：' },
        { type: 'dialogue', speaker: '沈时序', text: '这个符号，你们从哪里得到的。' },
        { type: 'dialogue', speaker: '罗奕', text: '问得有意思。你认识这个？' },
        { type: 'narration', text: '沈时序没有回答，只是看着苏鸢：' },
        { type: 'dialogue', speaker: '沈时序', text: '我在镇异司的旧档里见过这个纹样，记录在「异术来源不明案」的卷宗里，出没地点横跨三个城，最早的记录是四十年前。' },
        { type: 'narration', text: '他停了一下：' },
        { type: 'dialogue', speaker: '沈时序', text: '这个派别不在玄门的管辖范围内。我们知道他们存在，但一直找不到核心人物。' },
        { type: 'narration', text: '罗奕侧头看了沈时序一眼，那双眸子里，有一种局外人的、不带恶意的审视：' },
        { type: 'dialogue', speaker: '罗奕', text: '玄门找了四十年没找到，有意思。那我们说的是同一批人。' },
        { type: 'thought', text: '沈时序。\n\n……你知道的，比我以为的多。\n\n四十年。\n\n这条线，\n不是现在才有的。' },
      ],
      choices: [
        { text: '继续——分歧', next: 88 },
      ]
    },

    // Scene 88: C线·第四幕·分歧
    88: {
      chapter: 'C线 · 第四幕 · 不同的路',
      chapterShort: 'C线',
      content: [
        { type: 'location', text: '西港茶馆二楼 · 黄昏' },
        { type: 'narration', text: '沈时序说完，没有多留，走了。' },
        { type: 'narration', text: '茶馆里重新只剩他们两个。' },
        { type: 'narration', text: '罗奕把那张画着∞的纸折起来，收进袖里，然后看着苏鸢，语气很平：' },
        { type: 'dialogue', speaker: '罗奕', text: '你现在知道了——贺崇玄背后有更大的东西。' },
        { type: 'dialogue', speaker: '苏鸢', text: '我知道。' },
        { type: 'dialogue', speaker: '罗奕', text: '那你也应该知道，现在去动贺崇玄，等于提前告诉封印派有人在查他们，他们会消失。' },
        { type: 'narration', text: '苏鸢没有立刻说话，只是看着桌上那个空了的茶杯。' },
        { type: 'dialogue', speaker: '罗奕', text: '我的建议是先跟着封印派的线，找到他们的核心，拿到全部的东西，再一起清算。贺崇玄跑不了，他动不了——等拿到更大的筹码，再回来找他，是更稳的路。' },
        { type: 'narration', text: '他说这些话的时候，语气是真的平稳，没有催促，没有施压，是那种"我把逻辑摆在这里了，你自己看"的洒脱。' },
        { type: 'narration', text: '苏鸢把他这番话在心里转了一遍。' },
        { type: 'thought', text: '他说的对。\n\n从战略上讲，他完全对。\n\n……但是——\n\n那些女孩现在还在那里。\n\n姐姐的名字现在还记在贺崇玄的账里。\n\n我等不了。\n\n我知道我等不了。\n\n不是不懂道理，是做不到。' },
        { type: 'narration', text: '她抬起头，看着罗奕：' },
        { type: 'dialogue', speaker: '苏鸢', text: '我听你的道理，你说的都对。但我还是要去找贺崇玄。' },
        { type: 'narration', text: '罗奕没有叹气，没有"你不听劝"那种表情，只是看了她一会儿，嘴角微微勾了一下：' },
        { type: 'dialogue', speaker: '罗奕', text: '……我就知道你会这么说。' },
        { type: 'dialogue', speaker: '苏鸢', text: '那你为什么还要说。' },
        { type: 'dialogue', speaker: '罗奕', text: '话说了，你愿不愿意听是你的事。我这边的义务算尽到了。' },
        { type: 'narration', text: '苏鸢看着他，这个人，他笑着说这句话，但那双眸子里，不是真的毫无波澜。' },
        { type: 'thought', text: '罗奕。\n\n你知道我会不听的。\n\n你早就知道了，还是说了。\n\n……' },
        { type: 'narration', text: '罗奕站起来，把外衫整了整：' },
        { type: 'dialogue', speaker: '罗奕', text: '封印派那条线，我得追。他们的核心势力在动，再不跟就跟丢了。' },
        { type: 'narration', text: '他往门口走了两步，然后停下来，没有回头，只是侧着脸，声音还是那个懒洋洋的调子：' },
        { type: 'dialogue', speaker: '罗奕', text: '苏鸢。你找贺崇玄的那条路——走完了，小心别被更大的网绊住。' },
        { type: 'narration', text: '苏鸢没有说"好"，没有说"我知道了"，只是把那只空茶杯放回托盘上，轻轻地，应了一声：' },

        { type: 'narration', text: '沉默了一会儿，他把手从门框上收回来，重新转过身，那双眸子看着苏鸢，有什么东西在里面转了一圈。' },
        { type: 'narration', text: '然后他走回来，重新在她对面坐下：' },

    // Scene 890: C线·第五幕·换个打法
    890: {
      chapter: 'C线 · 第五幕 · 换个打法',
      chapterShort: 'C线',
      content: [
        { type: 'chapter-title', text: '第五幕', sub: '— 换个打法 —' },
        { type: 'location', text: '西港茶馆二楼 · 夜' },
        { type: 'dialogue', speaker: '罗奕', text: '我一直不建议动他，' },
        { type: 'narration', text: '他把茶杯推到一边，撑着桌子，那双紫色眸子里有什么东西重新聚拢：' },
        { type: 'dialogue', speaker: '罗奕', text: '我一直不建议动他，是因为动刀太蠢。但你坚持要他付一部分账——那就让他付，用他能理解的方式。' },
        { type: 'narration', text: '他把那张画着∞的纸重新取出来，展在桌上：' },
        { type: 'dialogue', speaker: '罗奕', text: '贺崇玄从封印派拿了东西——材料、术式、也许还有更多。黑市里走的货我能查到来源，这条线我已经摸了一半，剩下一半，三天够了。' },
        { type: 'dialogue', speaker: '苏鸢', text: '然后呢。' },
        { type: 'dialogue', speaker: '罗奕', text: '然后我用我的身份，把这件事捅出去。' },
        { type: 'narration', text: '他的语气平静，像在谈一笔寻常生意：' },
        { type: 'dialogue', speaker: '罗奕', text: '我来自潍蕤，名义上还有外交豁免。我若拿着证据，绕过玄门，直接走官府那条线——贺崇玄的秘密研究就会在他没准备好的时候曝光。他的局，花了多少年，你比我清楚。' },
        { type: 'thought', text: '他说的没错。\n\n贺崇玄最怕的不是刀，\n是曝光。\n\n他的研究需要时间，需要遮掩，\n需要这座城里没有人真正动他。\n\n一旦有人把矛头挑明，\n他就必须收手，或者逃——\n\n他不会逃的。\n\n他经营这里太久了。\n\n所以他只能谈。' },
        { type: 'dialogue', speaker: '苏鸢', text: '你要他拿什么换。' },
        { type: 'dialogue', speaker: '罗奕', text: '他手里关押的人，放几个，这是你要的。然后——' },
        { type: 'narration', text: '他停了一下，那双眸子看着她，语气里有一种少见的认真：' },
        { type: 'dialogue', speaker: '罗奕', text: '你姐姐的档案。他的名册里如果有记录，我要他把那页纸交出来。' },
        { type: 'narration', text: '苏鸢没有说话。' },
        { type: 'thought', text: '他记得。\n\n阿稚的事，姐姐的事，\n他都记得。\n\n……\n\n罗奕，\n你这个人，\n什么时候开始，\n不只是在帮自己了。' },
        { type: 'atmos', text: '夜风从窗缝里钻进来，把桌上的纸角压了压。' },

      choices: [
        { text: '「三天，我等你。」', next: 891 },
      ]
    },

    // Scene 891: C线·第五幕·贺府书房
    891: {
      chapter: 'C线 · 第五幕 · 谈判',
      chapterShort: 'C线',
      content: [
        { type: 'location', text: '贺府 · 书房 · 三日后 · 黄昏' },
        { type: 'narration', text: '三天后，罗奕如约。' },
        { type: 'narration', text: '他拿来的东西，苏鸢没有全看——她只需要知道够不够用，而显然够了，因为贺崇玄在看过那几页文书之后，沉默了很长时间。' },
        { type: 'narration', text: '书房里只有三个人：贺崇玄坐在主位，苏鸢和罗奕站在桌对面。油灯的光昏黄，把贺崇玄那张脸照得深深浅浅。' },
        { type: 'narration', text: '贺崇玄抬起眼，看着罗奕，那双眼睛里，有什么东西在评估，在计算，但表面上仍是一贯的温和：' },

        { type: 'dialogue', speaker: '罗奕', text: '前任三等领事。头衔还在，关系还在，够用。' },
        { type: 'narration', text: '他站在那里，身上没有武器，两手都是空的，但整个人的气势却比站在那里拎刀的人还要令人难以忽视——因为他根本不需要任何一样东西，他本身就是筹码。' },
        { type: 'narration', text: '贺崇玄把那几页文书合拢，不紧不慢地放回桌上：' },
        { type: 'dialogue', speaker: '贺崇玄', text: '老夫做学问，从不干涉他人，也不曾害人性命。这几张纸，说明不了什么。' },
        { type: 'dialogue', speaker: '罗奕', text: '您说得对，这几张纸单独拿出来，的确说明不了什么。' },
        { type: 'narration', text: '他微微一笑：' },
        { type: 'dialogue', speaker: '罗奕', text: '但加上西港拍卖行的出货记录，加上贵府过去三年的采购清单，加上那几位失踪姑娘家属的证词——就很有意思了。这些材料我都有，只是今天带来的是其中一部分，剩下的，留着备用。' },
        { type: 'narration', text: '贺崇玄看了他很长时间，没有说话。' },
        { type: 'narration', text: '苏鸢站在旁边，把自己变成一块石头——这是罗奕的牌局，她只是坐在桌边见证的人。' },
        { type: 'thought', text: '贺崇玄。\n\n你现在在算什么。\n\n你在算这个人的话有几分真，\n你在算他背后有多少东西，\n你在算若现在翻脸，代价是多少。\n\n……\n\n但你翻不了桌。\n\n你的研究还没做完，\n你的局还没收网，\n你现在不能让任何人把灯打翻。\n\n所以你只能谈。' },
        { type: 'narration', text: '贺崇玄最终，极轻地叹了口气，然后抬起头：' },
        { type: 'dialogue', speaker: '贺崇玄', text: '你们想要什么。' },
        { type: 'div', text: '◆' },
        { type: 'narration', text: '罗奕说了两件事，语气和谈论天气一样平静。' },
        { type: 'narration', text: '贺崇玄听完，重新拿起那几页文书，翻了翻，放下：' },
        { type: 'dialogue', speaker: '贺崇玄', text: '关押之人，老夫可以放几个。名册——' },
        { type: 'narration', text: '他停顿了一下，那双眼睛落在苏鸢身上，温和，探究，像是第一次真正把她看清楚：' },
        { type: 'dialogue', speaker: '贺崇玄', text: '苏鸢。你来贺府，从一开始，就是为了这件事。' },
        { type: 'narration', text: '不是问句。' },
        { type: 'narration', text: '苏鸢没有否认，也没有确认，只是平静地看着他：' },
        { type: 'dialogue', speaker: '苏鸢', text: '名册。' },
        { type: 'narration', text: '贺崇玄看了她很久。然后他从书架最里层取出一本薄薄的册子，翻到某一页，将其撕下，推过桌面。' },
        { type: 'narration', text: '苏鸢把那一页纸拿起来。' },
        { type: 'narration', text: '一行字，简短——一个名字，和一个时间。仅此而已。' },
        { type: 'narration', text: '苏霜。' },
        { type: 'narration', text: '苏鸢把那张纸叠起来，收进袖里，手没有抖。' },
        { type: 'thought', text: '姐姐。\n\n你在他的名册里。\n\n你被他带走，这件事，现在是真的，\n是有据可查的真的。\n\n但是之后——\n之后的事，\n这张纸什么也没有写。\n\n你去了哪里，发生了什么，\n这一页纸只是开头，\n不是答案。\n\n……\n\n先记着这一步。' },
        { type: 'narration', text: '贺崇玄收回目光，重新坐好，那副温和的神情又回到脸上：' },
        { type: 'dialogue', speaker: '贺崇玄', text: '二位，还有别的事吗。' },
        { type: 'narration', text: '罗奕站起来，扣好衣扣，微微欠身——不卑不亢，甚至带着一丝漫不经心的优雅：' },
        { type: 'dialogue', speaker: '罗奕', text: '没有了。老先生保重。' },
        { type: 'atmos', text: '他们走出书房，走过贺府的回廊，走出那扇朱漆大门。' },
        { type: 'atmos', text: '暮色里，有几个女孩陆续从侧门走出来，神情茫然，不知道该往哪里走。' },
        { type: 'narration', text: '苏鸢停下脚步，看着她们。' },
        { type: 'thought', text: '几个。\n\n只有几个。\n\n不是全部。\n\n但今天，这几个，是真的出来了。\n\n……先记着这一步。' },
      ],
      choices: [
